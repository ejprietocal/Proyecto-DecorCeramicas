<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Decorcerámica ERP — Movimientos</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="screen-app" class="screen active">
<div class="wrap">
<aside class="sidebar" id="sb">
<div class="sb-logo"><div class="sb-logo-ic"><i class="ri-building-2-line"></i></div><div class="sb-logo-t">Decorcerámica<small>ERP OPERACIÓN</small></div></div>
<div class="sb-scroll" id="sbMenu"></div>
<div class="sb-user"><div class="sb-av" id="sbAv"></div><div class="sb-ui"><div class="sb-un" id="sbNm"></div><div class="sb-ur" id="sbRl"></div></div><i class="ri-logout-circle-r-line sb-out" onclick="logout()"></i></div>
</aside>
<div class="sb-bd" id="sbBd" onclick="closeSb()"></div>
<main class="main">
<div class="topbar">
<div class="tb-l"><button class="m-tog" onclick="togSb()"><i class="ri-menu-line"></i></button><i id="tbIc" style="font-size:18px;color:var(--rojo)"></i><div><h2 id="tbTt"></h2><div class="tb-crumb" id="tbCr"></div></div></div>
<div class="tb-r"><div class="tb-btn"><i class="ri-notification-3-line"></i><span class="tb-badge" id="tbNot">0</span></div><div class="tb-prof" onclick="logout()"><div class="tb-av" id="tbAv"></div><span class="tb-n" id="tbNm"></span><i class="ri-logout-circle-r-line" style="color:#94A3B8;font-size:14px"></i></div></div>
</div>
<div id="pg"></div>
</main>
</div>
</div>
<div class="mov" id="modal"><div class="mox"><div class="moh"><h3 id="mTit"></h3><span class="xb" onclick="closeMod()">&times;</span></div><div class="mob" id="mBod"></div><div class="mof" id="mFot"></div></div></div>
<div class="toast" id="toast"><i class="ri-checkbox-circle-fill"></i><span id="toastMsg"></span></div>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/helpers.js"></script>
<script src="js/operations.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
renderShell('movimientos');
$('pg').innerHTML=function(){
  const tipClass={Entrada:'tl-e',Salida:'tl-s',Transferencia:'tl-t',Ajuste:'tl-a'};
  const tipIc={Entrada:'ri-arrow-down-line',Salida:'ri-arrow-up-line',Transferencia:'ri-arrow-left-right-line',Ajuste:'ri-settings-3-line'};
  const tipBadge={Entrada:'bg',Salida:'bb',Transferencia:'bi',Ajuste:'bp'};
  const items=DB.movimientos.map(m=>'<div class="tl-item '+(tipClass[m.tipo]||'tl-a')+'"><div class="tl-dot"><i class="'+(tipIc[m.tipo]||'ri-circle-line')+'"></i></div><div class="tl-card"><div class="tl-top"><div style="font-size:14px;font-weight:700;color:var(--ink)">'+m.n+'</div><span class="badge '+(tipBadge[m.tipo]||'bs')+'">'+m.tipo+'</span></div><div class="tl-meta"><span><i class="ri-stack-line"></i> '+fmt(m.cant)+' '+m.u+'</span><span><i class="ri-store-2-line"></i> '+m.bodega+'</span><span><i class="ri-user-line"></i> '+m.resp+'</span><span><i class="ri-links-line"></i> '+m.ref+'</span><span><i class="ri-time-line"></i> '+m.f+'</span></div></div></div>').join('');
  const noMov=!DB.movimientos.length;
  return '<div class="page th-mov"><div class="hero"><div class="hero-ic"><i class="ri-swap-box-line"></i></div><h1>Movimientos de Bodega</h1><p>Trazabilidad de entradas, salidas, transferencias y ajustes. Cada acción del sistema queda registrada aquí.</p></div><div class="body"><div class="grid"><div class="stat c3"><div class="stat-ic" style="background:#15803D"><i class="ri-arrow-down-line"></i></div><div class="stat-n">'+DB.movimientos.filter(m=>m.tipo==='Entrada').length+'</div><div class="stat-l">Entradas</div></div><div class="stat c3"><div class="stat-ic" style="background:#1D4ED8"><i class="ri-arrow-up-line"></i></div><div class="stat-n">'+DB.movimientos.filter(m=>m.tipo==='Salida').length+'</div><div class="stat-l">Salidas</div></div><div class="stat c3"><div class="stat-ic" style="background:#0369A1"><i class="ri-arrow-left-right-line"></i></div><div class="stat-n">'+DB.movimientos.filter(m=>m.tipo==='Transferencia').length+'</div><div class="stat-l">Transferencias</div></div><div class="stat c3"><div class="stat-ic" style="background:#7C3AED"><i class="ri-settings-3-line"></i></div><div class="stat-n">'+DB.movimientos.filter(m=>m.tipo==='Ajuste').length+'</div><div class="stat-l">Ajustes</div></div><div class="card c12">'+(noMov?'<div class="empty"><i class="ri-swap-box-line"></i><h3>Sin movimientos</h3><p>Los movimientos aparecen aquí cuando recibes OC, despachas pedidos o haces transferencias.</p></div>':'<div class="tl">'+items+'</div>')+'</div></div></div></div>';
}();
</script>
</body>
</html>
