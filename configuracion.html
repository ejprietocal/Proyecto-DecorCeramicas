<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Decorcerámica ERP — Configuración</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=6">
<style>
.cfg-wrap{display:grid;grid-template-columns:200px 1fr;gap:0;background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;min-height:500px}
.cfg-side{background:var(--neutral-bg);border-right:1px solid var(--line);padding:8px 0}
.cfg-item{padding:10px 16px;cursor:pointer;font-size:12px;font-weight:600;color:var(--mut);display:flex;align-items:center;gap:8px;transition:.1s;border-left:3px solid transparent}
.cfg-item:hover{background:var(--bg);color:var(--ink)}
.cfg-item.sel{background:var(--surface);color:var(--rojo);border-left-color:var(--rojo)}
.cfg-item i{font-size:15px}
.cfg-body{padding:20px 24px;overflow-y:auto;max-height:calc(100vh - 260px)}
.cfg-body h3{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:4px}
.cfg-body .sub{font-size:11.5px;color:var(--mut);margin-bottom:16px}
.cfg-table{width:100%;border-collapse:collapse;font-size:12px}
.cfg-table th{text-align:left;padding:8px 10px;font-size:9.5px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--line);background:var(--neutral-bg)}
.cfg-table td{padding:7px 10px;border-bottom:1px solid var(--line);color:var(--ink)}
.cfg-table tr:hover td{background:var(--bg)}
.cfg-acts{display:flex;gap:4px}
.cfg-acts button{width:26px;height:26px;border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.12s}
.cfg-edit{background:var(--rojo-l);color:var(--rojo)}.cfg-edit:hover{background:var(--rojo);color:#fff}
.cfg-del{background:var(--danger-bg);color:var(--danger-txt)}.cfg-del:hover{background:var(--danger-txt);color:#fff}
.empty-sm{text-align:center;padding:30px 10px;color:var(--mut);font-size:12px}
.empty-sm i{font-size:28px;display:block;margin-bottom:6px;opacity:.4}
.sw{position:relative;display:inline-flex;align-items:center;width:36px;height:20px;cursor:pointer}
.sw input{opacity:0;width:0;height:0}
.sw .swsl{position:absolute;top:0;left:0;right:0;bottom:0;background:var(--mut);border-radius:10px;transition:.2s}
.sw .swsl::before{content:'';position:absolute;width:16px;height:16px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:.2s}
.sw input:checked+.swsl{background:var(--success-txt)}
.sw input:checked+.swsl::before{transform:translateX(16px)}
.sw.locked .swsl{opacity:.4;cursor:not-allowed}
.u-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.u-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:.15s}
.u-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.u-card-h{padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line)}
.u-av{width:40px;height:40px;border-radius:11px;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.u-info{flex:1;min-width:0}
.u-n{font-size:14px;font-weight:700;color:var(--ink)}
.u-r{font-size:11px;color:var(--mut);margin-top:1px}
.u-login{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;background:var(--info-bg);color:var(--info-txt);white-space:nowrap}
.u-card-b{padding:10px 16px 14px}
.u-perms{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.u-perm{font-size:9.5px;font-weight:600;padding:3px 8px;border-radius:5px;display:flex;align-items:center;gap:4px}
.u-perm.on{background:var(--success-bg);color:var(--success-txt)}
.u-perm.off{background:var(--neutral-bg);color:var(--neutral-txt)}
.u-card-f{display:flex;gap:6px;justify-content:flex-end;border-top:1px solid var(--line);padding:8px 16px}
.u-card-f .btn{padding:5px 10px;font-size:10.5px}
.col2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.col-box{border:1px solid var(--line);border-radius:10px;padding:10px;max-height:250px;overflow-y:auto}
.col-box h5{font-size:11px;font-weight:700;color:var(--ink);margin-bottom:6px}
.col-row{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:6px;margin-bottom:2px;background:var(--bg);font-size:12px}
.col-row .btn{padding:2px 7px;font-size:10px}
@media(max-width:860px){.cfg-wrap{grid-template-columns:1fr}.cfg-side{display:flex;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);padding:4px}.cfg-item{white-space:nowrap;border-left:none;border-bottom:3px solid transparent;padding:8px 12px}.cfg-item.sel{border-left:none;border-bottom-color:var(--rojo)}}
</style>
</head>
<body>
<div id="screen-app" class="screen active">
<div class="wrap">
<aside class="sidebar" id="sb">
<div class="sb-logo"><div class="sb-logo-ic"><i class="ri-building-2-line"></i></div><div class="sb-logo-t">Decorcerámica<small>ERP OPERACIÓN</small></div></div>
<div class="sb-scroll" id="sbMenu"></div>
<div class="sb-user"><div class="sb-av" id="sbAv"></div><div class="sb-ui"><div class="sb-un" id="sbNm"></div><div class="sb-ur" id="sbRl"></div></div><i class="ri-logout-circle-r-line sb-out" onclick="logout()"></i></div>
</aside>
<div class="sb-bd" id="sbBd" onclick="closeSb()"></div>
<main class="main">
<div class="topbar">
<div class="tb-l"><button class="m-tog" onclick="togSb()"><i class="ri-menu-line"></i></button><i id="tbIc" style="font-size:18px;color:var(--rojo)"></i><div><h2 id="tbTt"></h2><div class="tb-crumb" id="tbCr"></div></div></div>
<div class="tb-r"><div class="tb-btn"><i class="ri-notification-3-line"></i><span class="tb-badge" id="tbNot">0</span></div><div class="tb-prof" onclick="logout()"><div class="tb-av" id="tbAv"></div><span class="tb-n" id="tbNm"></span><i class="ri-logout-circle-r-line" style="color:var(--ph);font-size:14px"></i></div></div>
</div>
<div id="pg"></div>
</main>
</div>
</div>
<div class="mov" id="modal"><div class="mox"><div class="moh"><h3 id="mTit"></h3><span class="xb" onclick="closeMod()">&times;</span></div><div class="mob" id="mBod"></div><div class="mof" id="mFot"></div></div></div>
<div class="toast" id="toast"><i class="ri-checkbox-circle-fill"></i><span id="toastMsg"></span></div>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/helpers.js"></script>
<script src="js/operations.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
renderShell('configuracion');
let cfgSec='usuarios';
const CFG_SECS=[
  {id:'usuarios',ic:'ri-shield-user-line',n:'Usuarios y Roles'},
  {id:'grupos',ic:'ri-exchange-line',n:'Grupos de Conversión'},
  {id:'unidades',ic:'ri-ruler-line',n:'Unidades de Medida'},
  {id:'categorias',ic:'ri-grid-line',n:'Categorías'},
  {id:'prefijos',ic:'ri-file-list-3-line',n:'Prefijos'},
  {id:'pos',ic:'ri-store-2-line',n:'Puntos de Venta'},
  {id:'general',ic:'ri-settings-4-line',n:'General'}
];
function renderCfg(){
  const side=CFG_SECS.map(s=>'<div class="cfg-item '+(cfgSec===s.id?'sel':'')+'" onclick="cfgSec=\''+s.id+'\';renderCfg()"><i class="'+s.ic+'"></i>'+s.n+'</div>').join('');
  let body='';
  switch(cfgSec){
    case'usuarios':body=renderUsuarios();break;
    case'grupos':body=renderGrupos();break;
    case'unidades':body=renderUnidades();break;
    case'categorias':body=renderCategorias();break;
    case'prefijos':body=renderPrefijos();break;
    case'pos':body=renderPOS();break;
    case'general':body=renderGeneral();break;
  }
  $('pg').innerHTML='<div class="page th-usr"><div class="body"><div class="cfg-wrap"><div class="cfg-side">'+side+'</div><div class="cfg-body">'+body+'</div></div></div></div>';
}

/* ==================== 1. USUARIOS Y ROLES ==================== */
function togglePerm(uid,mod){
  if(!PERMS[uid])PERMS[uid]=['dashboard'];
  const idx=PERMS[uid].indexOf(mod);
  if(idx>-1)PERMS[uid].splice(idx,1);else PERMS[uid].push(mod);
  saveDB();
}
function renderUsuarios(){
  const total=USERS.length,conPermisos=Object.keys(PERMS).length,totalMods=Object.keys(MODS).length;
  const usrCards=USERS.map((u,i)=>{
    const mods=PERMS[u.id]||['dashboard'];
    const permPills=Object.keys(MODS).map(k=>{
      const on=mods.includes(k);
      return '<span class="u-perm '+(on?'on':'off')+'"><i class="'+MODS[k].ic+'"></i>'+MODS[k].n+'</span>';
    }).join('');
    return '<div class="u-card"><div class="u-card-h"><div class="u-av" style="background:'+u.c+'">'+u.in+'</div><div class="u-info"><div class="u-n">'+u.n+'</div><div class="u-r">'+u.r+'</div></div><span class="u-login">Login: '+(i+1)+'</span></div><div class="u-card-b"><div class="u-perms">'+permPills+'</div></div><div class="u-card-f"><button class="btn btn-o btn-sm" onclick="modalEditarPermisos(\''+u.id+'\')"><i class="ri-edit-line"></i> Editar permisos</button></div></div>';
  }).join('');
  return '<h3><i class="ri-shield-user-line" style="color:var(--rojo)"></i> Usuarios y Roles</h3><div class="sub">Gestión de accesos al sistema. Dashboard es obligatorio. Edita permisos desde cada tarjeta.</div>'+
  '<button class="btn btn-blue btn-sm" onclick="modalNuevoUsuario()" style="margin-bottom:16px"><i class="ri-user-add-line"></i> Nuevo Usuario</button>'+
  '<div style="background:var(--warn-bg);border:1px solid var(--warn-bd);color:var(--warn-txt);font-size:12px;padding:10px 14px;border-radius:10px;margin-bottom:16px;display:flex;gap:8px"><i class="ri-lightbulb-flash-line"></i><span>Los cambios de permisos son en vivo. Login con los números 1–'+total+'.</span></div><div class="u-grid">'+usrCards+'</div>';
}
function modalEditarPermisos(uid){
  const u=USERS.find(x=>x.id===uid);if(!u)return;
  const mods=PERMS[uid]||['dashboard'];
  const toggles=Object.keys(MODS).map(k=>{
    const on=mods.includes(k),lk=k==='dashboard';
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:7px;background:var(--bg);margin-bottom:3px"><span style="display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink)"><i class="'+MODS[k].ic+'" style="color:var(--mut);width:14px"></i>'+MODS[k].n+'</span><label class="sw '+(lk?'locked':'')+'"><input type="checkbox" '+(on?'checked':'')+' '+(lk?'disabled':'')+' onchange="togglePerm(\''+uid+'\',\''+k+'\')"><span class="swsl"></span></label></div>';
  }).join('');
  openMod('<i class="ri-shield-user-line"></i> Permisos: '+u.n,'<div style="max-height:380px;overflow-y:auto;padding-right:4px">'+toggles+'</div>','<button class="btn btn-o btn-sm" onclick="closeMod()">Cerrar</button><button class="btn btn-sm" style="background:var(--rojo);color:#fff" onclick="closeMod();renderCfg()"><i class="ri-check-line"></i> Guardar</button>');
}
function modalNuevoUsuario(){
  const mOpts=Object.keys(MODS).filter(k=>k!=='dashboard').map(k=>'<div style="display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:7px;background:var(--bg);margin-bottom:3px"><input type="checkbox" class="nuMod" value="'+k+'" style="accent-color:var(--rojo)"><span style="font-size:12.5px;color:var(--ink)"><i class="'+MODS[k].ic+'" style="color:var(--mut);width:14px;margin-right:4px"></i>'+MODS[k].n+'</span></div>').join('');
  openMod('<i class="ri-user-add-line"></i> Crear Usuario','<div class="ff"><label>Nombre completo</label><input id="nuN" placeholder="Ej: Andrés Felipe Bravo"></div><div class="ff"><label>Cargo / Rol</label><input id="nuR" placeholder="Ej: Auxiliar de Bodega"></div><div class="ff"><label>Módulos con acceso (Dashboard incluido siempre)</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:4px">'+mOpts+'</div></div>','<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-sm" style="background:var(--rojo);color:#fff" onclick="crearUsuario()"><i class="ri-check-line"></i> Crear usuario</button>');
}
function crearUsuario(){
  const nm=$('nuN').value.trim(),rl=$('nuR').value.trim();
  if(!nm||!rl){toast('Completa nombre y cargo','warn');return}
  const pts=nm.split(' ');const init=((pts[0]||'')[0]+((pts[1]||pts[0]||'')[0])).toUpperCase();
  const id='u'+Date.now();
  const mods=['dashboard',...[...document.querySelectorAll('.nuMod:checked')].map(c=>c.value)];
  const colors=['#D9383A','#0369A1','#15803D','#B45309','#2D3748','#3B82F6','#1E293B','#64748B'];
  USERS.push({id,n:nm,r:rl,in:init,c:colors[USERS.length%colors.length]});
  PERMS[id]=mods;
  closeMod();saveDB();renderCfg();toast('Usuario creado. Login #'+USERS.length,'ok');
}

/* ==================== 2. GRUPOS DE CONVERSIÓN ==================== */
function renderGrupos(){
  const rows=DB.config.grupos_conversion.map(g=>{
    const base=g.unidades.find(u=>u.factor===1);
    return '<tr><td><b>'+g.nombre+'</b></td><td>'+(g.descripcion||'—')+'</td><td>'+(base?base.codigo:'—')+'</td><td>'+g.unidades.map(u=>'<span class="badge bs" style="margin:1px;font-size:9px">'+u.codigo+' ×'+u.factor+'</span>').join(' ')+'</td><td><div class="cfg-acts"><button class="cfg-edit" onclick="modalEditarGrupo(\''+g.id+'\')"><i class="ri-pencil-line"></i></button><button class="cfg-del" onclick="eliminarGrupo(\''+g.id+'\')"><i class="ri-delete-bin-line"></i></button></div></td></tr>';
  }).join('');
  return '<h3><i class="ri-exchange-line" style="color:var(--rojo)"></i> Grupos de Conversión</h3><div class="sub">Catálogo global de grupos de unidades (estilo Siigo). Los productos se asocian a un grupo y heredan sus unidades y factores de conversión.</div>'+
  '<button class="btn btn-blue btn-sm" onclick="modalNuevoGrupo()" style="margin-bottom:10px"><i class="ri-add-line"></i> Nuevo Grupo</button>'+
  '<table class="cfg-table"><thead><tr><th>Nombre</th><th>Descripción</th><th>Base</th><th>Unidades</th><th></th></tr></thead><tbody>'+(rows||'<tr><td colspan="5"><div class="empty-sm">Sin grupos definidos</div></td></tr>')+'</tbody></table>';
}
function modalNuevoGrupo(){
  const unidadOpts=DB.config.unidades.map(u=>'<option value="'+u.id+'">'+u.codigo+' — '+u.nombre+'</option>').join('');
  openMod('<i class="ri-exchange-line"></i> Nuevo Grupo de Conversión','<div class="ff"><label>Nombre *</label><input id="gcNom" placeholder="Ej: Cerámicas por Caja"></div><div class="ff"><label>Descripción</label><input id="gcDesc" placeholder="Unidades y cajas para cerámicas"></div><div class="ff"><label>Unidad Base *</label><select id="gcBase">'+unidadOpts+'</select></div>','<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="crearGrupo()"><i class="ri-check-line"></i> Crear</button>');
}
function crearGrupo(){
  const nom=$('gcNom').value.trim(),base=$('gcBase').value;
  if(!nom||!base){toast('Completa nombre y unidad base','warn');return}
  if(DB.config.grupos_conversion.find(g=>g.nombre.toLowerCase()===nom.toLowerCase())){toast('Ya existe un grupo con ese nombre','warn');return}
  const u=DB.config.unidades.find(x=>x.id===base);
  const id='gc-'+String(DB.config.grupos_conversion.length+1).padStart(3,'0');
  DB.config.grupos_conversion.push({id,nombre:nom,descripcion:$('gcDesc').value.trim(),unidad_base_id:base,unidades:[{unidad_id:base,factor:1,codigo:u?u.codigo:'UND'}]});
  closeMod();saveDB();renderCfg();toast('Grupo de conversión creado','ok');
}
function modalEditarGrupo(id){
  const g=DB.config.grupos_conversion.find(x=>x.id===id);if(!g)return;
  window.gcEdit=id;
  const unidadOpts=DB.config.unidades.map(u=>'<option value="'+u.id+'" '+(u.id===g.unidad_base_id?'selected':'')+'>'+u.codigo+' — '+u.nombre+'</option>').join('');
  const renderUnits=()=>g.unidades.map((ug,i)=>{
    const uOpts=DB.config.unidades.map(u=>'<option value="'+u.id+'" '+(u.id===ug.unidad_id?'selected':'')+'>'+u.codigo+' — '+u.nombre+'</option>').join('');
    const base=ug.factor===1;
    return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><select style="flex:1" onchange="changeGcUnidad('+i+',this.value)">'+uOpts+'</select><input type="number" style="width:70px" value="'+ug.factor+'" min="1" step="0.001" onchange="changeGcFactor('+i+',parseFloat(this.value)||1)"><button class="btn btn-o btn-sm" style="color:var(--danger-txt)" '+(base?'disabled':'')+' onclick="removeGcUnidad('+i+')">×</button></div>';
  }).join('');
  const buildList=(prods,asig)=>prods.map(p=>'<div class="col-row"><span>'+p.n+' <small style="color:var(--mut)">('+p.sku+')</small></span>'+(asig?'<button class="btn btn-o btn-sm" onclick="desasignarProductoDeGrupo(\''+id+'\',\''+p.sku+'\')"><i class="ri-arrow-go-back-line"></i></button>':'<button class="btn btn-blue btn-sm" onclick="asignarProductoAGrupo(\''+id+'\',\''+p.sku+'\')"><i class="ri-link"></i></button>')+'</div>').join('')||'<div class="empty-sm">Sin productos</div>';
  const prodAsig=DB.productos.filter(p=>p.grupo_conversion_id===id);
  const prodDisp=DB.productos.filter(p=>!p.grupo_conversion_id);
  openMod('<i class="ri-exchange-line"></i> Editar Grupo: '+g.nombre,
    '<div class="ff"><label>Nombre</label><input id="gcNomE" value="'+g.nombre+'"></div><div class="ff"><label>Descripción</label><input id="gcDescE" value="'+(g.descripcion||'')+'"></div><div class="ff"><label>Unidad Base</label><select id="gcBaseE">'+unidadOpts+'</select></div>'+
    '<div style="margin:12px 0"><h5 style="font-size:12px;font-weight:700;color:var(--ink);margin-bottom:6px">Unidades del Grupo</h5><div id="gcUnitList">'+renderUnits()+'</div><button class="btn btn-blue btn-sm" onclick="addGcUnidad()"><i class="ri-add-line"></i> Agregar unidad</button></div>'+
    '<div style="margin-top:12px"><h5 style="font-size:12px;font-weight:700;color:var(--ink);margin-bottom:6px">Productos Asignados ('+prodAsig.length+')</h5><div class="col2"><div class="col-box"><h5>Asignados ('+prodAsig.length+')</h5>'+buildList(prodAsig,true)+'</div><div class="col-box" style="border:1px dashed var(--line)"><h5>Disponibles ('+prodDisp.length+')</h5>'+buildList(prodDisp,false)+'</div></div></div>',
    '<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="guardarGrupo(\''+id+'\')"><i class="ri-check-line"></i> Guardar</button>'
  );
}
function changeGcUnidad(i,val){
  const g=DB.config.grupos_conversion.find(x=>x.id===window.gcEdit);if(!g||!g.unidades[i])return;
  if(g.unidades.some((u,j)=>u.unidad_id===val&&j!==i)){toast('Esa unidad ya está en el grupo','warn');return}
  const u=DB.config.unidades.find(x=>x.id===val);
  g.unidades[i].unidad_id=val;g.unidades[i].codigo=u?u.codigo:'';
}
function changeGcFactor(i,val){
  const g=DB.config.grupos_conversion.find(x=>x.id===window.gcEdit);if(!g||!g.unidades[i])return;
  g.unidades[i].factor=val||1;
}
function removeGcUnidad(i){
  const g=DB.config.grupos_conversion.find(x=>x.id===window.gcEdit);if(!g||!g.unidades[i])return;
  if(g.unidades[i].factor===1){toast('No se puede eliminar la unidad base (factor 1)','warn');return}
  g.unidades.splice(i,1);
  refreshGcList();
}
function addGcUnidad(){
  const g=DB.config.grupos_conversion.find(x=>x.id===window.gcEdit);if(!g)return;
  const u=DB.config.unidades.find(x=>!g.unidades.some(gu=>gu.unidad_id===x.id))||DB.config.unidades[0];
  g.unidades.push({unidad_id:u.id,factor:1,codigo:u.codigo});
  refreshGcList();
}
function refreshGcList(){
  const g=DB.config.grupos_conversion.find(x=>x.id===window.gcEdit);if(!g)return;
  const el=$('gcUnitList');if(!el)return;
  el.innerHTML=g.unidades.map((ug,i)=>{
    const uOpts=DB.config.unidades.map(u=>'<option value="'+u.id+'" '+(u.id===ug.unidad_id?'selected':'')+'>'+u.codigo+' — '+u.nombre+'</option>').join('');
    const base=ug.factor===1;
    return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><select style="flex:1" onchange="changeGcUnidad('+i+',this.value)">'+uOpts+'</select><input type="number" style="width:70px" value="'+ug.factor+'" min="1" step="0.001" onchange="changeGcFactor('+i+',parseFloat(this.value)||1)"><button class="btn btn-o btn-sm" style="color:var(--danger-txt)" '+(base?'disabled':'')+' onclick="removeGcUnidad('+i+')">×</button></div>';
  }).join('');
}
function guardarGrupo(id){
  const g=DB.config.grupos_conversion.find(x=>x.id===id);if(!g)return;
  g.nombre=$('gcNomE').value.trim()||g.nombre;
  g.descripcion=$('gcDescE').value.trim();
  g.unidad_base_id=$('gcBaseE').value||g.unidad_base_id;
  closeMod();saveDB();renderCfg();toast('Grupo de conversión actualizado','ok');
}
function eliminarGrupo(id){
  if(DB.productos.some(p=>p.grupo_conversion_id===id)){toast('No se puede eliminar: tiene productos asignados','err');return}
  if(!confirm('¿Eliminar grupo?'))return;
  DB.config.grupos_conversion=DB.config.grupos_conversion.filter(x=>x.id!==id);
  saveDB();renderCfg();toast('Grupo eliminado','ok');
}
function asignarProductoAGrupo(gid,sku){
  const p=DB.productos.find(x=>x.sku===sku);if(!p)return;
  p.grupo_conversion_id=gid;
  saveDB();modalEditarGrupo(gid);
}
function desasignarProductoDeGrupo(gid,sku){
  const p=DB.productos.find(x=>x.sku===sku);if(!p)return;
  if(DB.movimientos.some(m=>m.sku===sku)){toast('No se puede cambiar: el producto tiene movimientos de stock','warn');return}
  p.grupo_conversion_id=null;
  saveDB();modalEditarGrupo(gid);
}

/* ==================== 3. UNIDADES DE MEDIDA ==================== */
function renderUnidades(){
  const rows=DB.config.unidades.map(u=>'<tr><td><b>'+u.codigo+'</b></td><td>'+u.nombre+'</td><td>'+u.tipo+'</td><td><div class="cfg-acts"><button class="cfg-edit" onclick="modalEditarUnidad(\''+u.id+'\')"><i class="ri-pencil-line"></i></button><button class="cfg-del" onclick="eliminarUnidad(\''+u.id+'\')"><i class="ri-delete-bin-line"></i></button></div></td></tr>').join('');
  return '<h3><i class="ri-ruler-line" style="color:var(--rojo)"></i> Unidades de Medida</h3><div class="sub">Catálogo maestro de unidades usadas en los grupos de conversión.</div><button class="btn btn-blue btn-sm" onclick="modalNuevaUnidad()" style="margin-bottom:10px"><i class="ri-add-line"></i> Nueva Unidad</button><table class="cfg-table"><thead><tr><th>Código</th><th>Nombre</th><th>Tipo</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
}
function modalNuevaUnidad(){
  openMod('<i class="ri-ruler-line"></i> Nueva Unidad','<div class="ff2"><div class="ff"><label>Código *</label><input id="cfgUndCod" placeholder="CAJ"></div><div class="ff"><label>Nombre *</label><input id="cfgUndNom" placeholder="Caja"></div></div><div class="ff"><label>Tipo</label><select id="cfgUndTipo"><option value="unidad">Unidad</option><option value="peso">Peso</option><option value="volumen">Volumen</option><option value="longitud">Longitud</option><option value="area">Área</option></select></div>','<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="crearUnidad()"><i class="ri-check-line"></i> Crear</button>');
}
function crearUnidad(){
  const cod=$('cfgUndCod').value.trim().toUpperCase(),nom=$('cfgUndNom').value.trim();
  if(!cod||!nom){toast('Completa código y nombre','warn');return}
  if(DB.config.unidades.find(u=>u.codigo===cod)){toast('Ya existe una unidad con ese código','warn');return}
  DB.config.unidades.push({id:'und-'+(DB.config.unidades.length+1),codigo:cod,nombre:nom,tipo:$('cfgUndTipo').value});
  closeMod();saveDB();renderCfg();toast('Unidad creada','ok');
}
function modalEditarUnidad(id){const u=DB.config.unidades.find(x=>x.id===id);if(!u)return;
  openMod('<i class="ri-ruler-line"></i> Editar Unidad','<div class="ff2"><div class="ff"><label>Código</label><input id="cfgUndCodE" value="'+u.codigo+'"></div><div class="ff"><label>Nombre</label><input id="cfgUndNomE" value="'+u.nombre+'"></div></div><div class="ff"><label>Tipo</label><select id="cfgUndTipoE"><option value="unidad" '+(u.tipo==='unidad'?'selected':'')+'>Unidad</option><option value="peso" '+(u.tipo==='peso'?'selected':'')+'>Peso</option><option value="volumen" '+(u.tipo==='volumen'?'selected':'')+'>Volumen</option><option value="longitud" '+(u.tipo==='longitud'?'selected':'')+'>Longitud</option><option value="area" '+(u.tipo==='area'?'selected':'')+'>Área</option></select></div>','<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="guardarUnidad(\''+id+'\')"><i class="ri-check-line"></i> Guardar</button>');
}
function guardarUnidad(id){const u=DB.config.unidades.find(x=>x.id===id);if(!u)return;
  u.codigo=$('cfgUndCodE').value.trim().toUpperCase()||u.codigo;u.nombre=$('cfgUndNomE').value.trim()||u.nombre;u.tipo=$('cfgUndTipoE').value||u.tipo;
  closeMod();saveDB();renderCfg();toast('Unidad actualizada','ok');
}
function eliminarUnidad(id){
  if(DB.config.grupos_conversion.some(g=>g.unidades.some(u=>u.unidad_id===id))){toast('No se puede eliminar: está en uso en un grupo de conversión','err');return}
  if(!confirm('¿Eliminar unidad?'))return;
  DB.config.unidades=DB.config.unidades.filter(x=>x.id!==id);saveDB();renderCfg();toast('Unidad eliminada','ok');
}

/* ==================== 4. CATEGORÍAS Y SUBCATEGORÍAS ==================== */
function renderCategorias(){
  const catRows=DB.config.categorias.map(c=>{const sc=DB.config.subcategorias.filter(s=>s.categoria_id===c.id);
    return '<tr><td><b>'+c.nombre+'</b></td><td>'+(c.descripcion||'—')+'</td><td>'+sc.length+'</td><td><span class="badge '+(c.activo?'bg':'bs')+'">'+(c.activo?'Activo':'Inactivo')+'</span></td><td><div class="cfg-acts"><button class="cfg-edit" onclick="modalEditarCat(\''+c.id+'\')"><i class="ri-pencil-line"></i></button><button class="cfg-del" onclick="eliminarCat(\''+c.id+'\')"><i class="ri-delete-bin-line"></i></button></div></td></tr>';
  }).join('');
  const scRows=DB.config.subcategorias.map(s=>{const cat=getCat(s.categoria_id);

}
function modalNuevaCat(){openMod('<i class="ri-grid-line"></i> Nueva Categoría','<div class="ff"><label>Nombre *</label><input id="cfgCatNom" placeholder="Ej: Pisos"></div><div class="ff"><label>Descripción</label><input id="cfgCatDesc"></div>','<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="crearCat()"><i class="ri-check-line"></i> Crear</button>');}
function crearCat(){const nom=$('cfgCatNom').value.trim();if(!nom){toast('Nombre requerido','warn');return}if(DB.config.categorias.find(c=>c.nombre.toLowerCase()===nom.toLowerCase())){toast('Ya existe','warn');return}DB.config.categorias.push({id:'cat-'+(DB.config.categorias.length+1),nombre:nom,descripcion:$('cfgCatDesc').value.trim(),activo:true});closeMod();saveDB();renderCfg();toast('Categoría creada','ok');}
function modalEditarCat(id){const c=DB.config.categorias.find(x=>x.id===id);if(!c)return;openMod('<i class="ri-grid-line"></i> Editar Categoría','<div class="ff"><label>Nombre</label><input id="cfgCatNomE" value="'+c.nombre+'"></div><div class="ff"><label>Descripción</label><input id="cfgCatDescE" value="'+(c.descripcion||'')+'"></div><div class="ff"><label>Activo</label><select id="cfgCatActE"><option value="true" '+(c.activo?'selected':'')+'>Sí</option><option value="false" '+(!c.activo?'selected':'')+'>No</option></select></div>','<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="guardarCat(\''+id+'\')"><i class="ri-check-line"></i> Guardar</button>');}
function guardarCat(id){const c=DB.config.categorias.find(x=>x.id===id);if(!c)return;c.nombre=$('cfgCatNomE').value.trim()||c.nombre;c.descripcion=$('cfgCatDescE').value.trim();c.activo=$('cfgCatActE').value==='true';closeMod();saveDB();renderCfg();toast('Actualizada','ok');}
function eliminarCat(id){if(DB.config.subcategorias.some(s=>s.categoria_id===id)){toast('No se puede: tiene subcategorías','err');return}if(!confirm('¿Eliminar?'))return;DB.config.categorias=DB.config.categorias.filter(x=>x.id!==id);saveDB();renderCfg();toast('Eliminada','ok');}
function modalNuevaSubcat(){const catOpts=DB.config.categorias.filter(c=>c.activo).map(c=>'<option value="'+c.id+'">'+c.nombre+'</option>').join('');openMod('<i class="ri-grid-line"></i> Nueva Subcategoría','<div class="ff"><label>Nombre *</label><input id="cfgScNom" placeholder="Ej: Piso Cerámico"></div><div class="ff"><label>Categoría *</label><select id="cfgScCat">'+catOpts+'</select></div><div class="ff"><label>Descripción</label><input id="cfgScDesc"></div>','<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="crearSubcat()"><i class="ri-check-line"></i> Crear</button>');}
function crearSubcat(){const nom=$('cfgScNom').value.trim(),cat=$('cfgScCat').value;if(!nom||!cat){toast('Completa','warn');return}DB.config.subcategorias.push({id:'scat-'+(DB.config.subcategorias.length+1),nombre:nom,categoria_id:cat,descripcion:$('cfgScDesc').value.trim(),activo:true});closeMod();saveDB();renderCfg();toast('Subcategoría creada','ok');}
function modalEditarSubcat(id){const s=DB.config.subcategorias.find(x=>x.id===id);if(!s)return;const catOpts=DB.config.categorias.map(c=>'<option value="'+c.id+'" '+(c.id===s.categoria_id?'selected':'')+'>'+c.nombre+'</option>').join('');openMod('<i class="ri-grid-line"></i> Editar Subcategoría','<div class="ff"><label>Nombre</label><input id="cfgScNomE" value="'+s.nombre+'"></div><div class="ff"><label>Categoría</label><select id="cfgScCatE">'+catOpts+'</select></div><div class="ff"><label>Descripción</label><input id="cfgScDescE" value="'+(s.descripcion||'')+'"></div><div class="ff"><label>Activo</label><select id="cfgScActE"><option value="true" '+(s.activo?'selected':'')+'>Sí</option><option value="false" '+(!s.activo?'selected':'')+'>No</option></select></div>','<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="guardarSubcat(\''+id+'\')"><i class="ri-check-line"></i> Guardar</button>');}
function guardarSubcat(id){const s=DB.config.subcategorias.find(x=>x.id===id);if(!s)return;s.nombre=$('cfgScNomE').value.trim()||s.nombre;s.categoria_id=$('cfgScCatE').value||s.categoria_id;s.descripcion=$('cfgScDescE').value.trim();s.activo=$('cfgScActE').value==='true';closeMod();saveDB();renderCfg();toast('Actualizada','ok');}
function eliminarSubcat(id){if(DB.productos.some(p=>p.subcategoria_id===id)){toast('No se puede: tiene productos','err');return}if(!confirm('¿Eliminar?'))return;DB.config.subcategorias=DB.config.subcategorias.filter(x=>x.id!==id);saveDB();renderCfg();toast('Eliminada','ok');}

/* ==================== 5. PREFIJOS DE DOCUMENTOS ==================== */
function renderPrefijos(){
  const rows=DB.config.prefijos.map(p=>{
    const extra=p.tipo==='factura_electronica'?'<br><small>Vig: '+p.vigencia_desde+' → '+p.vigencia_hasta+' | Rango: '+p.rango_desde+'–'+p.rango_final+'</small>':'';
    return '<tr><td><b>'+p.prefijo+'</b></td><td>'+p.tipo.replace(/_/g,' ')+'</td><td>'+p.consecutivo_inicial+'</td><td><b>'+p.consecutivo_actual+'</b></td><td>'+extra+'</td><td><span class="badge '+(p.activo?'bg':'bs')+'">'+(p.activo?'Activo':'Inactivo')+'</span></td><td><div class="cfg-acts"><button class="cfg-edit" onclick="modalEditarPrefijo(\''+p.id+'\')"><i class="ri-pencil-line"></i></button></div></td></tr>';
  }).join('');
  return '<h3><i class="ri-file-list-3-line" style="color:var(--rojo)"></i> Prefijos de Documentos</h3><div class="sub">Consecutivos automáticos para cada tipo. Usa <code>nextConsecutivo(tipo)</code> en facturación.</div><table class="cfg-table"><thead><tr><th>Prefijo</th><th>Tipo</th><th>Inicial</th><th>Actual</th><th>Extra</th><th>Estado</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
}
function modalEditarPrefijo(id){const p=DB.config.prefijos.find(x=>x.id===id);if(!p)return;
  openMod('<i class="ri-file-list-3-line"></i> Editar Prefijo: '+p.prefijo,
    '<div class="ff2"><div class="ff"><label>Prefijo</label><input id="cfgPfPf" value="'+p.prefijo+'"></div><div class="ff"><label>Consecutivo Inicial</label><input type="number" id="cfgPfCi" value="'+p.consecutivo_inicial+'"></div></div><div class="ff2"><div class="ff"><label>Consecutivo Actual</label><input type="number" id="cfgPfCa" value="'+p.consecutivo_actual+'"></div><div class="ff"><label>Activo</label><select id="cfgPfAct"><option value="true" '+(p.activo?'selected':'')+'>Sí</option><option value="false" '+(!p.activo?'selected':'')+'>No</option></select></div></div>'+
    (p.tipo==='factura_electronica'?'<div class="ff2"><div class="ff"><label>Vigencia Desde</label><input id="cfgPfVd" value="'+(p.vigencia_desde||'')+'"></div><div class="ff"><label>Vigencia Hasta</label><input id="cfgPfVh" value="'+(p.vigencia_hasta||'')+'"></div></div><div class="ff2"><div class="ff"><label>Rango Desde</label><input type="number" id="cfgPfRd" value="'+(p.rango_desde||'')+'"></div><div class="ff"><label>Rango Hasta</label><input type="number" id="cfgPfRf" value="'+(p.rango_hasta||'')+'"></div></div>':'')+
    '<div class="ff"><span style="font-size:11px;color:var(--mut)">El consecutivo se auto-incrementa al crear documentos.</span></div>',
    '<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="guardarPrefijo(\''+id+'\')"><i class="ri-check-line"></i> Guardar</button>'
  );
}
function guardarPrefijo(id){const p=DB.config.prefijos.find(x=>x.id===id);if(!p)return;p.prefijo=$('cfgPfPf').value.trim()||p.prefijo;p.consecutivo_inicial=parseInt($('cfgPfCi').value)||p.consecutivo_inicial;p.consecutivo_actual=parseInt($('cfgPfCa').value)||p.consecutivo_actual;p.activo=$('cfgPfAct').value==='true';if(p.tipo==='factura_electronica'){p.vigencia_desde=$('cfgPfVd').value||p.vigencia_desde;p.vigencia_hasta=$('cfgPfVh').value||p.vigencia_hasta;p.rango_desde=parseInt($('cfgPfRd').value)||p.rango_desde;p.rango_hasta=parseInt($('cfgPfRf').value)||p.rango_hasta;}closeMod();saveDB();renderCfg();toast('Prefijo actualizado','ok');}

/* ==================== 6. PUNTOS DE VENTA Y RESOLUCIONES ==================== */
function renderPOS(){
  const pvRows=DB.config.puntos_venta.map(p=>{const bg=DB.bodegas.find(b=>b.id===p.bodega_id);

  }).join('');

function modalNuevoPV(){const bgOpts=DB.bodegas.map(b=>'<option value="'+b.id+'">'+b.n+' ('+b.id+')</option>').join('');openMod('<i class="ri-store-2-line"></i> Nuevo PV','<div class="ff2"><div class="ff"><label>Código *</label><input id="cfgPvCod" placeholder="001"></div><div class="ff"><label>Nombre *</label><input id="cfgPvNom" placeholder="Principal"></div></div><div class="ff"><label>Bodega *</label><select id="cfgPvBg">'+bgOpts+'</select></div>','<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="crearPV()"><i class="ri-check-line"></i> Crear</button>');}

function guardarPV(id){const p=DB.config.puntos_venta.find(x=>x.id===id);if(!p)return;p.codigo=$('cfgPvCodE').value.trim()||p.codigo;p.nombre=$('cfgPvNomE').value.trim()||p.nombre;p.bodega_id=$('cfgPvBgE').value||p.bodega_id;p.activo=$('cfgPvActE').value==='true';closeMod();saveDB();renderCfg();toast('PV actualizado','ok');}
function eliminarPV(id){if(!confirm('¿Eliminar PV?'))return;DB.config.puntos_venta=DB.config.puntos_venta.filter(x=>x.id!==id);DB.config.resoluciones=DB.config.resoluciones.filter(r=>r.punto_venta_id!==id);saveDB();renderCfg();toast('PV eliminado','ok');}
function modalNuevaRes(){const pvOpts=DB.config.puntos_venta.filter(p=>p.activo).map(p=>'<option value="'+p.id+'">'+p.codigo+' — '+p.nombre+'</option>').join('');openMod('<i class="ri-file-list-3-line"></i> Nueva Resolución','<div class="ff2"><div class="ff"><label>N° Resolución *</label><input id="cfgResNum" placeholder="187600000001"></div><div class="ff"><label>Prefijo *</label><input id="cfgResPf" placeholder="FE"></div></div><div class="ff2"><div class="ff"><label>Consecutivo Inicial *</label><input type="number" id="cfgResCi" value="1"></div><div class="ff"><label>Consecutivo Final *</label><input type="number" id="cfgResCf" value="9999"></div></div><div class="ff2"><div class="ff"><label>Fecha Inicio *</label><input id="cfgResFi" value="01/01/2026"></div><div class="ff"><label>Fecha Fin *</label><input id="cfgResFf" value="31/12/2026"></div></div><div class="ff"><label>Punto de Venta *</label><select id="cfgResPv">'+pvOpts+'</select></div>','<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="crearRes()"><i class="ri-check-line"></i> Crear</button>');}
function crearRes(){const num=$('cfgResNum').value.trim(),pf=$('cfgResPf').value.trim().toUpperCase(),ci=parseInt($('cfgResCi').value),cf=parseInt($('cfgResCf').value),fi=$('cfgResFi').value,ff=$('cfgResFf').value,pv=$('cfgResPv').value;if(!num||!pf||!ci||!cf||!fi||!ff||!pv){toast('Campos obligatorios','warn');return}const sol=DB.config.resoluciones.some(r=>r.punto_venta_id===pv&&((ci>=r.consecutivo_inicial&&ci<=r.consecutivo_final)||(cf>=r.consecutivo_inicial&&cf<=r.consecutivo_final)));if(sol){toast('Rango se solapa con otra resolución del mismo PV','err');return}const id='RES-'+String(DB.config.resoluciones.length+1).padStart(3,'0');DB.config.resoluciones.push({id,numero:num,prefijo:pf,fecha_inicio:fi,fecha_fin:ff,consecutivo_inicial:ci,consecutivo_final:cf,punto_venta_id:pv});closeMod();saveDB();renderCfg();toast('Resolución creada','ok');}
function modalEditarRes(id){const r=DB.config.resoluciones.find(x=>x.id===id);if(!r)return;const pvOpts=DB.config.puntos_venta.map(p=>'<option value="'+p.id+'" '+(p.id===r.punto_venta_id?'selected':'')+'>'+p.codigo+' — '+p.nombre+'</option>').join('');openMod('<i class="ri-file-list-3-line"></i> Editar Resolución','<div class="ff2"><div class="ff"><label>N°</label><input id="cfgResNumE" value="'+r.numero+'"></div><div class="ff"><label>Prefijo</label><input id="cfgResPfE" value="'+r.prefijo+'"></div></div><div class="ff2"><div class="ff"><label>C. Inicial</label><input type="number" id="cfgResCiE" value="'+r.consecutivo_inicial+'"></div><div class="ff"><label>C. Final</label><input type="number" id="cfgResCfE" value="'+r.consecutivo_final+'"></div></div><div class="ff2"><div class="ff"><label>Fecha Inicio</label><input id="cfgResFiE" value="'+r.fecha_inicio+'"></div><div class="ff"><label>Fecha Fin</label><input id="cfgResFfE" value="'+r.fecha_fin+'"></div></div><div class="ff"><label>PV</label><select id="cfgResPvE">'+pvOpts+'</select></div>','<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="guardarRes(\''+id+'\')"><i class="ri-check-line"></i> Guardar</button>');}
function guardarRes(id){const r=DB.config.resoluciones.find(x=>x.id===id);if(!r)return;r.numero=$('cfgResNumE').value.trim()||r.numero;r.prefijo=$('cfgResPfE').value.trim().toUpperCase()||r.prefijo;r.consecutivo_inicial=parseInt($('cfgResCiE').value)||r.consecutivo_inicial;r.consecutivo_final=parseInt($('cfgResCfE').value)||r.consecutivo_final;r.fecha_inicio=$('cfgResFiE').value||r.fecha_inicio;r.fecha_fin=$('cfgResFfE').value||r.fecha_fin;r.punto_venta_id=$('cfgResPvE').value||r.punto_venta_id;closeMod();saveDB();renderCfg();toast('Resolución actualizada','ok');}
function eliminarRes(id){if(!confirm('¿Eliminar resolución?'))return;DB.config.resoluciones=DB.config.resoluciones.filter(x=>x.id!==id);saveDB();renderCfg();toast('Resolución eliminada','ok');}

/* ==================== 7. PARAMETRIZACIÓN GENERAL ==================== */
function renderGeneral(){
  const g=DB.config.general;
  return '<h3><i class="ri-settings-4-line" style="color:var(--rojo)"></i> Parametrización General</h3><div class="sub">Configuración global del sistema.</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">'+
  '<div style="border:1px solid var(--line);border-radius:10px;padding:16px"><h4 style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:12px">Empresa</h4><div class="ff"><label>Nombre</label><input id="cfgGEmp" value="'+g.empresa+'"></div><div class="ff"><label>NIT</label><input id="cfgGNit" value="'+g.nit+'"></div><div class="ff2"><div class="ff"><label>Dirección</label><input id="cfgGDir" value="'+g.direccion+'"></div><div class="ff"><label>Teléfono</label><input id="cfgGTel" value="'+g.telefono+'"></div></div></div>'+
  '<div style="border:1px solid var(--line);border-radius:10px;padding:16px"><h4 style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:12px">Parámetros</h4><div class="ff"><label>Moneda</label><select id="cfgGMon"><option value="COP" selected>COP</option><option value="USD">USD</option></select></div><div class="ff"><label>IVA (%)</label><input type="number" id="cfgGIva" value="'+g.iva+'" min="0" max="100"></div><div class="ff2"><div class="ff"><label>Decimales</label><select id="cfgGDec"><option value="0" '+(g.decimales===0?'selected':'')+'>0</option><option value="1" '+(g.decimales===1?'selected':'')+'>1</option><option value="2" '+(g.decimales===2?'selected':'')+'>2</option></select></div><div class="ff"><label>Formato fecha</label><select id="cfgGFec"><option value="DD/MM/AAAA" '+(g.fecha==='DD/MM/AAAA'?'selected':'')+'>DD/MM/AAAA</option><option value="AAAA-MM-DD" '+(g.fecha==='AAAA-MM-DD'?'selected':'')+'>AAAA-MM-DD</option></select></div></div></div></div><button class="btn btn-blue btn-sm" onclick="guardarGeneral()" style="margin-top:14px"><i class="ri-check-line"></i> Guardar</button>';
}
function guardarGeneral(){const g=DB.config.general;g.empresa=$('cfgGEmp').value.trim()||g.empresa;g.nit=$('cfgGNit').value.trim()||g.nit;g.direccion=$('cfgGDir').value.trim()||g.direccion;g.telefono=$('cfgGTel').value.trim()||g.telefono;g.iva=parseFloat($('cfgGIva').value)||g.iva;g.decimales=parseInt($('cfgGDec').value)||g.decimales;g.fecha=$('cfgGFec').value||g.fecha;saveDB();renderCfg();toast('Configuración general guardada','ok');}

renderCfg();
</script>
</body>
