<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Decorcerámica ERP — Facturación</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=6">
<style>
.f-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--line);padding-bottom:0}
.f-tab{padding:9px 18px;border:1px solid transparent;border-bottom:none;border-radius:10px 10px 0 0;cursor:pointer;font-size:12px;font-weight:600;color:var(--mut);background:none;transition:.12s;position:relative;bottom:-1px}
.f-tab:hover{color:var(--ink);background:var(--neutral-bg);border-color:var(--line)}
.f-tab.sel{color:var(--rojo);background:var(--surface);border-color:var(--line);border-bottom-color:var(--surface)}
.f-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.f-bar-item{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.f-bar-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0}
.f-bar-n{font-size:18px;font-weight:800;color:var(--ink);line-height:1.1}
.f-bar-l{font-size:10px;color:var(--mut);font-weight:500}
.f-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.f-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:.15s;border-left:4px solid}
.f-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.f-card.st-emitida{border-left-color:var(--info-txt)}
.f-card.st-anulada{border-left-color:var(--danger-txt)}
.f-card.st-pagada{border-left-color:var(--success-txt)}
.f-card.st-recibida{border-left-color:var(--info-txt)}
.f-card.st-en_disputa{border-left-color:var(--warn-txt)}
.f-card-h{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--line);background:var(--neutral-bg)}
.f-card-id{font-size:14px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:6px}
.f-card-id small{font-size:10px;font-weight:500;color:var(--mut)}
.f-card-cl{font-size:11px;color:var(--mut);margin-top:2px;display:flex;align-items:center;gap:4px}
.f-card-b{padding:10px 16px}
.f-card-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px dashed var(--line)}
.f-card-row:last-child{border-bottom:none}
.f-card-f{padding:10px 16px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.f-card-f .badge{font-size:10px;padding:3px 8px}
.f-card-f .btn{padding:5px 10px;font-size:10.5px}
.f-occ-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.occ-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;border-left:4px solid}
.occ-card.st-pendiente{border-left-color:var(--warn-txt)}
.occ-card.st-aprobada{border-left-color:var(--info-txt)}
.occ-card.st-remisionada{border-left-color:var(--success-txt)}
.occ-card.st-cancelada{border-left-color:var(--danger-txt)}
.occ-h{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--line);background:var(--neutral-bg)}
.occ-items{padding:10px 16px}
.occ-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:7px;background:var(--bg);margin-bottom:3px;font-size:12px}
.occ-foot{padding:10px 16px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;font-size:12px}
.saldos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:16px}
.saldo-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;border-left:4px solid}
.saldo-card .saldo-prov{font-size:13px;font-weight:700;color:var(--ink)}
.saldo-card .saldo-mnt{font-size:20px;font-weight:800;color:var(--danger-txt);margin-top:4px}
.saldo-card .saldo-lbl{font-size:10px;color:var(--mut)}
@media(max-width:860px){.f-bar{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="screen-app" class="screen active">
<div class="wrap">
<aside class="sidebar" id="sb">
<div class="sb-logo"><div class="sb-logo-ic"><i class="ri-building-2-line"></i></div><div class="sb-logo-t">Decorcerámica<small>ERP OPERACIÓN</small></div></div>
<div class="sb-scroll" id="sbMenu"></div>
<div class="sb-user"><div class="sb-av" id="sbAv"></div><div class="sb-ui"><div class="sb-un" id="sbNm"></div><div class="sb-ur" id="sbRl"></div></div><i class="ri-logout-circle-r-line sb-out" onclick="logout()"></i></div>
</aside>
<div class="sb-bd" id="sbBd" onclick="closeSb()"></div>
<main class="main">
<div class="topbar">
<div class="tb-l"><button class="m-tog" onclick="togSb()"><i class="ri-menu-line"></i></button><i id="tbIc" style="font-size:18px;color:var(--rojo)"></i><div><h2 id="tbTt"></h2><div class="tb-crumb" id="tbCr"></div></div></div>
<div class="tb-r"><div class="tb-btn"><i class="ri-notification-3-line"></i><span class="tb-badge" id="tbNot">0</span></div><div class="tb-prof" onclick="logout()"><div class="tb-av" id="tbAv"></div><span class="tb-n" id="tbNm"></span><i class="ri-logout-circle-r-line" style="color:var(--ph);font-size:14px"></i></div></div>
</div>
<div id="pg"></div>
</main>
</div>
</div>
<div class="mov" id="modal"><div class="mox"><div class="moh"><h3 id="mTit"></h3><span class="xb" onclick="closeMod()">&times;</span></div><div class="mob" id="mBod"></div><div class="mof" id="mFot"></div></div></div>
<div class="toast" id="toast"><i class="ri-checkbox-circle-fill"></i><span id="toastMsg"></span></div>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/helpers.js"></script>
<script src="js/operations.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
renderShell('facturas');

let factTab='occ',occBusq='',fvFiltro='todas',fvBusq='',fcFiltro='todas',fcBusq='';

function renderFact(){
  const tabs=['occ','venta','compra'].map(t=>'<span class="f-tab '+(factTab===t?'sel':'')+'" onclick="factTab=\''+t+'\';renderFact()">'+({occ:'Órdenes de Compra (Cliente)',venta:'Facturas de Venta',compra:'Facturas de Compra'})[t]+'</span>').join('');
  let body='<div class="page th-fact"><div class="hero"><div class="hero-ic"><i class="ri-file-list-3-line"></i></div><h1>Facturación</h1><p>Órdenes de compra de clientes, facturación de ventas y compras.</p></div><div class="body"><div class="f-tabs">'+tabs+'</div>';
  if(factTab==='occ')body+=renderOCC();
  else if(factTab==='venta')body+=renderFV();
  else body+=renderFC();
  body+='</div></div>';
  $('pg').innerHTML=body;
}

/* ===================== OC CLIENTE ===================== */
function renderOCC(){
  const occs=DB.ordenes_compra_cliente;
  const q=occBusq.toLowerCase();
  let items=occs;
  if(q)items=items.filter(o=>o.id.toLowerCase().includes(q)||o.cliente.toLowerCase().includes(q)||(o.cotizacionOrigen||'').toLowerCase().includes(q));

  const counts={pendiente:0,aprobada:0,remisionada:0,cancelada:0};
  occs.forEach(o=>{if(counts[o.estado]!==undefined)counts[o.estado]++});

  const bar='<div class="f-bar">'+[
    {ic:'ri-time-line',cl:'#D97706',l:'Pendientes',v:counts.pendiente},
    {ic:'ri-check-line',cl:'#0284C7',l:'Aprobadas',v:counts.aprobada},
    {ic:'ri-truck-line',cl:'#16A34A',l:'Remisionadas',v:counts.remisionada},
    {ic:'ri-close-circle-line',cl:'#EF4444',l:'Canceladas',v:counts.cancelada}
  ].map(b=>'<div class="f-bar-item"><div class="f-bar-ic" style="background:'+b.cl+'"><i class="'+b.ic+'"></i></div><div><div class="f-bar-n">'+b.v+'</div><div class="f-bar-l">'+b.l+'</div></div></div>').join('')+'</div>';

  const cards=items.map(o=>{
    const itemsHtml=o.items.map(it=>'<div class="occ-item"><span style="flex:1">'+it.n+' <small style="color:var(--mut)">('+it.sku+')</small></span><span style="font-weight:600">'+fmt(it.cant)+' '+it.u+'</span><span style="color:var(--mut)">'+money(it.cant*it.precioUnit)+'</span></div>').join('');
    let acc='';
    if(o.estado==='pendiente'){
      acc='<button class="btn btn-blue btn-sm" onclick="aprobarYRemitir(\''+o.id+'\')"><i class="ri-check-line"></i> Aprobar y Remitir</button><button class="btn btn-o btn-sm" onclick="cancelarOCC(\''+o.id+'\')"><i class="ri-close-line"></i> Cancelar</button>';
    }else if(o.estado==='aprobada'){
      acc='<span class="badge bb" style="font-size:10px"><i class="ri-truck-line"></i> En remisión</span>';
    }else if(o.estado==='remisionada'){
      acc='<span class="badge bg" style="font-size:10px"><i class="ri-checkbox-circle-line"></i> Remisionada</span>';
    }else{
      acc='<span class="badge br" style="font-size:10px"><i class="ri-forbid-line"></i> Cancelada</span>';
    }
    const origenHtml=o.cotizacionOrigen?' <small style="color:var(--mut)">desde '+o.cotizacionOrigen+'</small>':'';
    return '<div class="occ-card st-'+o.estado+'"><div class="occ-h"><div><b>'+o.id+'</b>'+origenHtml+' <small style="color:var(--mut)">'+o.fecha+'</small><br><span style="font-size:11px;color:var(--mut)"><i class="ri-user-line"></i> '+o.cliente+'</span></div><span class="badge '+occEstBadge(o.estado)+'">'+occEstLabel(o.estado)+'</span></div><div class="occ-items">'+itemsHtml+'</div><div class="occ-foot"><b>'+money(o.total)+'</b>'+acc+'</div></div>';
  }).join('')||'<div class="empty"><i class="ri-file-list-3-line"></i><h3>Sin órdenes de compra de cliente</h3><p>Las OC de Cliente se generan desde Cotizaciones aceptadas.</p><a href="cotizaciones.html" class="btn btn-blue btn-sm" style="margin-top:12px"><i class="ri-file-text-line"></i> Ir a Cotizaciones</a></div>';

  return '<div style="margin-bottom:14px"><a href="cotizaciones.html" class="btn btn-blue btn-sm"><i class="ri-file-text-line"></i> Desde Cotización</a></div><div class="note"><i class="ri-information-line"></i> Flujo: Cotización → <b>OC Cliente</b> → Remisión → Factura. Las OC pendientes pueden aprobarse para continuar el flujo.</div>'+bar+'<div class="p-search"><i class="ri-search-line" style="color:var(--ph);font-size:13px"></i><input type="text" placeholder="Buscar OC, cliente o cotización..." value="'+occBusq+'" oninput="occBusq=this.value;renderFact()">'+(occBusq?'<button class="btn btn-o btn-sm" onclick="occBusq=\'\';renderFact()"><i class="ri-close-line"></i> Limpiar</button>':'')+'</div><div class="f-occ-grid">'+cards+'</div>';
}

function aprobarYRemitir(id){
  const o=DB.ordenes_compra_cliente.find(x=>x.id===id);
  if(!o)return;
  const bgOpts=DB.bodegas.map(b=>'<option value="'+b.id+'">'+b.n+' ('+b.id+')</option>').join('');
  openMod('<i class="ri-truck-line"></i> Aprobar y Remitir — '+o.id,
    '<div class="note"><i class="ri-information-line"></i> La OC se aprobará y se creará la remisión directamente. Luego irá a bodega para despacho.</div><div class="ff"><label>Bodega de Despacho</label><select id="occRmBg">'+bgOpts+'</select></div><div class="ff2"><div><label>Fecha Origen</label><input id="occRmFecO" value="'+now().split(' ')[0]+'"></div><div><label>Fecha Entrega Est.</label><input id="occRmFecE" value="'+now().split(' ')[0]+'"></div></div><div class="ff"><label>Transportador</label><input id="occRmTransp" placeholder="Nombre del transportador"></div><div class="ff"><label>Items a remitir</label><div id="occRmItems" style="padding:10px;background:var(--bg);border-radius:8px;font-size:12px">'+
      o.items.map(it=>'<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--line)"><span>'+it.n+' <small>('+it.sku+')</small></span><span>'+fmt(it.cant)+' '+it.u+'</span></div>').join('')+
    '</div></div>',
    '<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="confirmarAprobarYRemitir(\''+id+'\')"><i class="ri-check-line"></i> Confirmar</button>'
  );
}

function confirmarAprobarYRemitir(id){
  const o=DB.ordenes_compra_cliente.find(x=>x.id===id);
  if(!o)return;
  const bg=$('occRmBg').value;
  const fecO=$('occRmFecO').value;
  const fecE=$('occRmFecE').value;
  const transp=$('occRmTransp').value.trim();
  if(!transp){toast('Ingresa el transportador','warn');return}
  o.estado='remisionada';
  const num='RM-'+RM_SEQ++;
  const items=o.items.map(i=>({sku:i.sku,n:i.n,cant:i.cant,u:i.u,precioUnit:i.precioUnit}));
  DB.remisiones.unshift({
    numero:num,occRef:o.id,cliente:o.cliente,
    fechaOrigen:fecO,fechaEntregaEst:fecE,
    bodega:bg,items,transportador:transp,estado:'pendiente'
  });
  closeMod();saveDB();renderFact();
  simularEnvioEmail('oc_cliente',{
    destinatario:o.cliente,numero:o.id,
    total:o.total,items:o.items,
    origen:'Cotización '+(o.cotizacionOrigen||'directa')
  });
  toast('OC '+id+' aprobada. Remisión '+num+' generada.','ok');
}

function cancelarOCC(id){
  if(!confirm('¿Cancelar OC '+id+'?'))return
  const o=DB.ordenes_compra_cliente.find(x=>x.id===id);
  if(!o)return;
  o.estado='cancelada';
  saveDB();renderFact();toast('OC '+id+' cancelada.','ok');
}

/* ===================== FACTURAS DE VENTA ===================== */
function renderFV(){
  const fvs=DB.facturas_venta;
  const q=fvBusq.toLowerCase();
  let items=fvs;
  if(fvFiltro!=='todas')items=items.filter(f=>f.estado===fvFiltro);
  if(q)items=items.filter(f=>f.numero.toLowerCase().includes(q)||(f.clienteNombre||getCliente(f.clienteId)?.n||'').toLowerCase().includes(q)||(f.remisionOrigen||'').toLowerCase().includes(q));

  const counts={emitida:0,anulada:0,pagada:0};
  fvs.forEach(f=>{if(counts[f.estado]!==undefined)counts[f.estado]++});
  const bar='<div class="f-bar">'+[
    {ic:'ri-file-edit-line',cl:'#0284C7',l:'Emitidas',v:counts.emitida},
    {ic:'ri-close-circle-line',cl:'#EF4444',l:'Anuladas',v:counts.anulada},
    {ic:'ri-checkbox-circle-line',cl:'#16A34A',l:'Pagadas',v:counts.pagada},
    {ic:'ri-file-list-3-line',cl:'#64748B',l:'Totales',v:fvs.length}
  ].map(b=>'<div class="f-bar-item"><div class="f-bar-ic" style="background:'+b.cl+'"><i class="'+b.ic+'"></i></div><div><div class="f-bar-n">'+b.v+'</div><div class="f-bar-l">'+b.l+'</div></div></div>').join('')+'</div>';

  const pills=['todas','emitida','pagada','anulada'].map(e=>'<span class="p-pill '+(fvFiltro===e?'sel':'')+'" onclick="fvFiltro=\''+e+'\';renderFact()">'+({todas:'Todas',emitida:'Emitidas',pagada:'Pagadas',anulada:'Anuladas'})[e]+' <span style="font-size:10px;opacity:.7">'+(e==='todas'?fvs.length:counts[e]||0)+'</span></span>').join('');

  const cards=items.map(f=>{
    const clNombre=f.clienteNombre||getCliente(f.clienteId)?.n||'—';
    const isAdmin=currentUser.r.includes('Administrador');
    let acc='';
    if(f.estado==='emitida'){
      acc='<button class="btn btn-green btn-sm" onclick="pagarFV(\''+f.numero+'\')"><i class="ri-check-line"></i> Pagar</button>';
      if(isAdmin)acc+='<button class="btn btn-o btn-sm" onclick="anularFV(\''+f.numero+'\')"><i class="ri-close-line"></i> Anular</button>';
    }else if(f.estado==='pagada'){
      acc='<span class="badge bg" style="font-size:10px"><i class="ri-checkbox-circle-line"></i> Pagada</span>';
    }else{
      acc='<span class="badge br" style="font-size:10px"><i class="ri-forbid-line"></i> Anulada</span>';
    }
    return '<div class="f-card st-'+f.estado+'"><div class="f-card-h"><div><div class="f-card-id">'+f.numero+' <small>'+f.fecha+'</small></div><div class="f-card-cl"><i class="ri-user-line"></i>'+clNombre+'</div></div><span class="badge '+fvEstBadge(f.estado)+'">'+fvEstLabel(f.estado)+'</span></div><div class="f-card-b"><div class="f-card-row"><span>Remisión</span><b>'+f.remisionOrigen+'</b></div><div class="f-card-row"><span>OC Cliente</span><b>'+f.occRef+'</b></div><div class="f-card-row"><span>Subtotal</span><b>'+money(f.subtotal)+'</b></div><div class="f-card-row"><span>IVA (19%)</span><b>'+money(f.iva)+'</b></div><div class="f-card-row"><span>Total</span><b style="font-size:15px">'+money(f.total)+'</b></div>'+(f.archivoPdf?'<div class="f-card-row"><span>PDF</span><a href="#" onclick="toast(\'PDF simulado: '+f.archivoPdf+'\',\'ok\');return false" style="color:var(--link)"><i class="ri-file-pdf-line"></i> Ver</a></div>':'')+'</div><div class="f-card-f">'+acc+'</div></div>';
  }).join('')||'<div class="empty" style="grid-column:1/-1"><i class="ri-file-list-3-line"></i><h3>Sin facturas de venta</h3><p>Las facturas se generan automáticamente al entregar una remisión.</p><a href="remisiones.html" class="btn btn-blue btn-sm" style="margin-top:12px"><i class="ri-truck-line"></i> Ir a Remisiones</a></div>';

  return '<div class="note"><i class="ri-information-line"></i> Las facturas de venta se generan <b>automáticamente</b> al marcar una remisión como entregada.</div>'+bar+'<div class="c-top">'+pills+'</div><div class="p-search"><i class="ri-search-line" style="color:var(--ph);font-size:13px"></i><input type="text" placeholder="Buscar factura, cliente o remisión..." value="'+fvBusq+'" oninput="fvBusq=this.value;renderFact()">'+(fvBusq?'<button class="btn btn-o btn-sm" onclick="fvBusq=\'\';renderFact()"><i class="ri-close-line"></i> Limpiar</button>':'')+'</div><div class="f-grid">'+cards+'</div>';
}

function pagarFV(num){
  if(!confirm('¿Marcar factura '+num+' como pagada?'))return
  const f=DB.facturas_venta.find(x=>x.numero===num);
  if(!f)return;
  f.estado='pagada';
  saveDB();renderFact();toast('Factura '+num+' marcada como pagada.','ok');
}

function anularFV(num){
  if(!confirm('¿Anular factura '+num+'? Esta acción no se puede revertir.'))return
  const f=DB.facturas_venta.find(x=>x.numero===num);
  if(!f)return;
  f.estado='anulada';
  saveDB();renderFact();toast('Factura '+num+' anulada.','ok');
}

/* ===================== FACTURAS DE COMPRA ===================== */
function renderFC(){
  const fcs=DB.facturas_compra;
  const q=fcBusq.toLowerCase();
  let items=fcs;
  if(fcFiltro!=='todas')items=items.filter(f=>f.estado===fcFiltro);
  if(q)items=items.filter(f=>f.numero.toLowerCase().includes(q)||getProv(f.proveedorId)?.n.toLowerCase().includes(q)||(f.ocRel||'').toLowerCase().includes(q));

  const counts={recibida:0,en_disputa:0,pagada:0};
  fcs.forEach(f=>{if(counts[f.estado]!==undefined)counts[f.estado]++});

  const saldos={};
  fcs.filter(f=>f.estado!=='pagada').forEach(f=>{
    const pn=getProv(f.proveedorId).n||'—';
    if(!saldos[pn])saldos[pn]=0;
    saldos[pn]+=f.total;
  });
  const saldoHtml=Object.keys(saldos).length?'<div class="saldos-grid">'+Object.keys(saldos).map(p=>'<div class="saldo-card" style="border-top:3px solid var(--danger-txt)"><div class="saldo-prov">'+p+'</div><div class="saldo-mnt">'+money(saldos[p])+'</div><div class="saldo-lbl">Pendiente de pago</div></div>').join('')+'</div>':'<div style="text-align:center;padding:20px;color:var(--mut);font-size:13px"><i class="ri-checkbox-circle-line" style="font-size:24px;display:block;margin-bottom:6px"></i>Sin saldos pendientes</div>';

  const bar='<div class="f-bar">'+[
    {ic:'ri-inbox-unarchive-line',cl:'#0284C7',l:'Recibidas',v:counts.recibida},
    {ic:'ri-alert-line',cl:'#D97706',l:'En Disputa',v:counts.en_disputa},
    {ic:'ri-checkbox-circle-line',cl:'#16A34A',l:'Pagadas',v:counts.pagada},
    {ic:'ri-file-list-3-line',cl:'#64748B',l:'Totales',v:fcs.length}
  ].map(b=>'<div class="f-bar-item"><div class="f-bar-ic" style="background:'+b.cl+'"><i class="'+b.ic+'"></i></div><div><div class="f-bar-n">'+b.v+'</div><div class="f-bar-l">'+b.l+'</div></div></div>').join('')+'</div>';

  const pills=['todas','recibida','en_disputa','pagada'].map(e=>'<span class="p-pill '+(fcFiltro===e?'sel':'')+'" onclick="fcFiltro=\''+e+'\';renderFact()">'+({todas:'Todas',recibida:'Recibidas',en_disputa:'En Disputa',pagada:'Pagadas'})[e]+' <span style="font-size:10px;opacity:.7">'+(e==='todas'?fcs.length:counts[e]||0)+'</span></span>').join('');

  const cards=items.map(f=>{
    const pv=getProv(f.proveedorId);
    let acc='';
    if(f.estado==='recibida'){
      acc='<button class="btn btn-green btn-sm" onclick="pagarFC(\''+f.numero+'\')"><i class="ri-check-line"></i> Pagar</button><button class="btn btn-orange btn-sm" onclick="disputarFC(\''+f.numero+'\')"><i class="ri-error-warning-line"></i> Disputar</button>';
    }else if(f.estado==='en_disputa'){
      acc='<button class="btn btn-green btn-sm" onclick="pagarFC(\''+f.numero+'\')"><i class="ri-check-line"></i> Pagar</button><span class="badge by" style="font-size:10px">En Disputa</span>';
    }else{
      acc='<span class="badge bg" style="font-size:10px"><i class="ri-checkbox-circle-line"></i> Pagada</span>';
    }
    return '<div class="f-card st-'+f.estado+'"><div class="f-card-h"><div><div class="f-card-id">'+f.numero+' <small>'+f.fecha+'</small></div><div class="f-card-cl"><i class="ri-truck-line"></i>'+pv.n+'</div></div><span class="badge '+fcEstBadge(f.estado)+'">'+fcEstLabel(f.estado)+'</span></div><div class="f-card-b"><div class="f-card-row"><span>OC</span><b>'+f.ocRel+'</b></div><div class="f-card-row"><span>Subtotal</span><b>'+money(f.subtotal)+'</b></div><div class="f-card-row"><span>IVA (19%)</span><b>'+money(f.iva)+'</b></div><div class="f-card-row"><span>Total</span><b style="font-size:15px">'+money(f.total)+'</b></div></div><div class="f-card-f">'+acc+'</div></div>';
  }).join('')||'<div class="empty"><i class="ri-file-list-3-line"></i><h3>Sin facturas de compra</h3><p>Crea la primera factura desde una OC reclamada.</p></div>';

  return '<div style="margin-bottom:14px"><button class="btn btn-blue btn-sm" onclick="modalNuevaFC()"><i class="ri-add-line"></i> Nueva Factura de Compra</button></div><h3 style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:8px"><i class="ri-money-dollar-circle-line"></i> Saldos Pendientes por Proveedor</h3>'+saldoHtml+bar+'<div class="c-top">'+pills+'</div><div class="p-search"><i class="ri-search-line" style="color:var(--ph);font-size:13px"></i><input type="text" placeholder="Buscar factura, proveedor u OC..." value="'+fcBusq+'" oninput="fcBusq=this.value;renderFact()">'+(fcBusq?'<button class="btn btn-o btn-sm" onclick="fcBusq=\'\';renderFact()"><i class="ri-close-line"></i> Limpiar</button>':'')+'</div><div class="f-grid">'+cards+'</div>';
}

function modalNuevaFC(){
  if(!DB.proveedores.length){toast('No hay proveedores registrados','warn');return}
  const pOpts=DB.proveedores.map(p=>'<option value="'+p.id+'">'+p.n+' ('+p.ciudad+')</option>').join('');
  const ocs=DB.compras.filter(c=>c.estado==='reclamada');
  if(!ocs.length){toast('No hay OC reclamadas disponibles para facturar','warn');return}
  const oOpts=ocs.map(c=>'<option value="'+c.id+'">'+c.id+' — '+getProv(c.provId).n+' ('+money(ocValor(c))+')</option>').join('');
  openMod('<i class="ri-file-list-3-line"></i> Nueva Factura de Compra',
    '<div class="ff"><label>Proveedor</label><select id="fcProveedor"><option value="">— Selecciona —</option>'+pOpts+'</select></div><div class="ff"><label>OC Relacionada</label><select id="fcOC" onchange="calcFC()"><option value="">— Selecciona —</option>'+oOpts+'</select></div><div id="fcCalc" style="background:var(--neutral-bg);border-radius:10px;padding:14px;margin-bottom:14px;display:none"><div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span>Subtotal</span><b id="fcSubtot">$0</b></div><div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12px"><span>IVA (19%)</span><b id="fcIva">$0</b></div><div style="display:flex;justify-content:space-between;padding:6px 0;font-size:15px;border-top:1px solid var(--line);margin-top:4px;padding-top:8px"><span>Total</span><b id="fcTotal" style="color:var(--rojo)">$0</b></div></div>',
    '<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="crearFC()"><i class="ri-check-line"></i> Registrar Factura</button>'
  );
}

function calcFC(){
  const oid=$('fcOC').value;
  if(!oid){$('fcCalc').style.display='none';return}
  const oc=DB.compras.find(c=>c.id===oid);
  if(!oc){$('fcCalc').style.display='none';return}
  const subtotal=ocValor(oc);
  const iva=Math.round(subtotal*0.19);
  const total=subtotal+iva;
  $('fcSubtot').textContent=money(subtotal);
  $('fcIva').textContent=money(iva);
  $('fcTotal').textContent=money(total);
  $('fcCalc').style.display='block';
}

function crearFC(){
  const pid=$('fcProveedor').value;
  const oid=$('fcOC').value;
  if(!pid||!oid){toast('Completa todos los campos','warn');return}
  const oc=DB.compras.find(c=>c.id===oid);
  if(!oc){toast('OC no encontrada','warn');return}
  const subtotal=ocValor(oc);
  if(subtotal<=0){toast('La OC no tiene valor','warn');return}
  const iva=Math.round(subtotal*0.19);
  const total=subtotal+iva;
  const num='FC-'+FC_SEQ++;
  DB.facturas_compra.unshift({
    numero:num,fecha:now().split(' ')[0],proveedorId:pid,ocRel:oid,
    subtotal,iva,total,estado:'recibida'
  });
  closeMod();saveDB();renderFact();toast('Factura de compra '+num+' registrada.','ok');
}

function pagarFC(num){
  if(!confirm('¿Marcar factura de compra '+num+' como pagada?'))return
  const f=DB.facturas_compra.find(x=>x.numero===num);
  if(!f)return;
  f.estado='pagada';
  saveDB();renderFact();toast('Factura '+num+' pagada.','ok');
}

function disputarFC(num){
  if(!confirm('¿Marcar factura '+num+' como "En Disputa"?'))return
  const f=DB.facturas_compra.find(x=>x.numero===num);
  if(!f)return;
  f.estado='en_disputa';
  saveDB();renderFact();toast('Factura '+num+' marcada en disputa.','ok');
}

          '<i class="ri-information-line" style="font-size:16px;flex-shrink:0"></i>'+

renderFact();
</script>
