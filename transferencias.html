<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Decorcerámica ERP — Transferencias</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="screen-app" class="screen active">
<div class="wrap">
<aside class="sidebar" id="sb">
<div class="sb-logo"><div class="sb-logo-ic"><i class="ri-building-2-line"></i></div><div class="sb-logo-t">Decorcerámica<small>ERP OPERACIÓN</small></div></div>
<div class="sb-scroll" id="sbMenu"></div>
<div class="sb-user"><div class="sb-av" id="sbAv"></div><div class="sb-ui"><div class="sb-un" id="sbNm"></div><div class="sb-ur" id="sbRl"></div></div><i class="ri-logout-circle-r-line sb-out" onclick="logout()"></i></div>
</aside>
<div class="sb-bd" id="sbBd" onclick="closeSb()"></div>
<main class="main">
<div class="topbar">
<div class="tb-l"><button class="m-tog" onclick="togSb()"><i class="ri-menu-line"></i></button><i id="tbIc" style="font-size:18px;color:var(--rojo)"></i><div><h2 id="tbTt"></h2><div class="tb-crumb" id="tbCr"></div></div></div>
<div class="tb-r"><div class="tb-btn"><i class="ri-notification-3-line"></i><span class="tb-badge" id="tbNot">0</span></div><div class="tb-prof" onclick="logout()"><div class="tb-av" id="tbAv"></div><span class="tb-n" id="tbNm"></span><i class="ri-logout-circle-r-line" style="color:#94A3B8;font-size:14px"></i></div></div>
</div>
<div id="pg"></div>
</main>
</div>
</div>
<div class="mov" id="modal"><div class="mox"><div class="moh"><h3 id="mTit"></h3><span class="xb" onclick="closeMod()">&times;</span></div><div class="mob" id="mBod"></div><div class="mof" id="mFot"></div></div></div>
<div class="toast" id="toast"><i class="ri-checkbox-circle-fill"></i><span id="toastMsg"></span></div>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/helpers.js"></script>
<script src="js/operations.js"></script>
<script src="js/draft.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
renderShell('transferencias');

function renderTr(){
  const steps=['Solicitud','Autorización','Despacho','Recepción'];
  const stateIdx={solicitada:0,autorizada:1,despachada:2,recibida:3};
  const trCards=DB.transferencias.map(tr=>{
    const idx=stateIdx[tr.estado]??0;
    const stepsH=steps.map((s,i)=>{
      const cls=i<idx?'done':i===idx?'active':'pend';
      const ln=i<steps.length-1?'<div class="step-line '+(i<idx?'sl-done':'sl-pend')+'"></div>':'';
      return '<div class="step '+cls+'"><div class="step-wrap"><div class="step-dot">'+(i<idx?'✓':(i+1))+'</div><div class="step-l">'+s+'</div></div></div>'+ln;
    }).join('');
    const boton=tr.estado==='solicitada'&&PERMS[currentUser.id].includes('usuarios')
      ?'<button class="btn btn-sm" style="background:#15803D;color:#fff" onclick="autorizarTransferencia(\''+tr.id+'\');window.location.reload()"><i class="ri-checkbox-circle-line"></i> Autorizar</button>'
      :tr.estado==='autorizada'?'<button class="btn btn-blue btn-sm" onclick="despacharTransferencia(\''+tr.id+'\');window.location.reload()"><i class="ri-send-plane-line"></i> Despachar</button>'
      :tr.estado==='despachada'?'<button class="btn btn-green btn-sm" onclick="recibirTransferencia(\''+tr.id+'\');setTimeout(function(){window.location.reload()},500)"><i class="ri-inbox-unarchive-line"></i> Recibir</button>'
      :'<span class="badge bg"><i class="ri-checkbox-circle-line"></i> Completada</span>';
    const itemsH=tr.items.map(it=>'<div style="display:flex;justify-content:space-between;font-size:12.5px;padding:5px 8px;background:#F8FAFC;border-radius:7px;margin-bottom:5px"><span>'+it.n+'</span><b>'+fmt(it.cant)+' '+it.u+'</b></div>').join('');
    return '<div class="tr-card"><div class="tr-head"><div><div class="tr-id">'+tr.id+'</div><div class="tr-route"><i class="ri-store-2-line"></i>'+(DB.bodegas.find(b=>b.id===tr.org)?.n||tr.org)+'<i class="ri-arrow-right-line"></i>'+(DB.bodegas.find(b=>b.id===tr.dst)?.n||tr.dst)+'</div></div><span class="badge '+(tr.estado==='recibida'?'bg':tr.estado==='despachada'?'bb':tr.estado==='autorizada'?'bi':'bs')+'">'+trEstLabel(tr.estado)+'</span></div><div class="stepper">'+stepsH+'</div><div class="tr-body">'+itemsH+'<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:8px"><div style="font-size:11.5px;color:var(--mut)">Solicitado por '+tr.solPor+' · '+tr.fecha+'</div>'+boton+'</div></div></div>';
  }).join('');
  $('pg').innerHTML='<div class="page th-trans"><div class="hero"><div class="hero-ic"><i class="ri-arrow-left-right-line"></i></div><h1>Transferencias entre Bodegas</h1><p>Detecta exceso en una bodega y déficit en otra → Solicita → Autoriza → Despacha → Recibe. Inventario actualizado automáticamente.</p><div class="hero-act"><button class="btn btn-light" onclick="modalNuevaTransferencia()"><i class="ri-add-line"></i> Solicitar transferencia</button></div></div><div class="body">'+(DB.transferencias.length?'<div>'+trCards+'</div>':'<div class="empty"><i class="ri-arrow-left-right-line"></i><h3>Sin transferencias</h3><p>Cuando detectes exceso en una bodega y déficit en otra, solicita una transferencia.</p></div>')+'</div></div>';
}
renderTr();

function modalNuevaTransferencia(){
  const bOpts=DB.bodegas.map(b=>'<option value="'+b.id+'">'+b.n+'</option>').join('');
  draft={items:[{sku:'',cant:1}]};
  openMod('<i class="ri-arrow-left-right-line"></i> Solicitar Transferencia entre Bodegas',
    '<div class="note"><i class="ri-information-line"></i> Detecta exceso en una bodega y solicita el traslado a la que tiene déficit.</div><div class="ff2"><div class="ff"><label>Bodega Origen</label><select id="dOrg">'+bOpts+'</select></div><div class="ff"><label>Bodega Destino</label><select id="dDst">'+bOpts+'</select></div></div><div class="ff"><label>Productos a transferir</label><div id="draftLines"></div><button class="add-line" onclick="addLine()"><i class="ri-add-line"></i> Agregar producto</button></div>',
    '<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="crearTransferencia()"><i class="ri-check-line"></i> Solicitar</button>'
  );renderLines();
}
function crearTransferencia(){
  const org=$('dOrg').value,dst=$('dDst').value;
  if(org===dst){toast('Origen y destino deben ser distintos','warn');return}
  if(!draft.items[0]?.sku){toast('Agrega al menos un producto','warn');return}
  const id='TR-'+String(TR_SEQ++).padStart(3,'0');
  const items=draft.items.filter(i=>i.sku).map(i=>{const p=getProd(i.sku);return{sku:i.sku,n:p?.n||i.sku,cant:i.cant,u:p?.u||'unid'}});
  DB.transferencias.unshift({id,org,dst,fecha:now(),estado:'solicitada',solPor:currentUser.n,autPor:null,despPor:null,recibPor:null,items});
  closeMod();saveDB();renderTr();toast('Transferencia '+id+' solicitada. Pendiente de autorización.','ok');
}
</script>
</body>
</html>
