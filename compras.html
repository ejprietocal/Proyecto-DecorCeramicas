<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Decorcerámica ERP — Órdenes de Compra</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=7">
</head>
<body>
<div id="screen-app" class="screen active">
<div class="wrap">
<aside class="sidebar" id="sb">
<div class="sb-logo"><div class="sb-logo-ic"><i class="ri-building-2-line"></i></div><div class="sb-logo-t">Decorcerámica<small>ERP OPERACIÓN</small></div></div>
<div class="sb-scroll" id="sbMenu"></div>
<div class="sb-user"><div class="sb-av" id="sbAv"></div><div class="sb-ui"><div class="sb-un" id="sbNm"></div><div class="sb-ur" id="sbRl"></div></div><i class="ri-logout-circle-r-line sb-out" onclick="logout()"></i></div>
</aside>
<div class="sb-bd" id="sbBd" onclick="closeSb()"></div>
<main class="main">
<div class="topbar">
<div class="tb-l"><button class="m-tog" onclick="togSb()"><i class="ri-menu-line"></i></button><i id="tbIc" style="font-size:18px;color:var(--rojo)"></i><div><h2 id="tbTt"></h2><div class="tb-crumb" id="tbCr"></div></div></div>
<div class="tb-r"><div class="tb-btn"><i class="ri-notification-3-line"></i><span class="tb-badge" id="tbNot">0</span></div><div class="tb-prof" onclick="logout()"><div class="tb-av" id="tbAv"></div><span class="tb-n" id="tbNm"></span><i class="ri-logout-circle-r-line" style="color:var(--ph);font-size:14px"></i></div></div>
</div>
<div id="pg"></div>
</main>
</div>
</div>
<div class="mov" id="modal"><div class="mox"><div class="moh"><h3 id="mTit"></h3><span class="xb" onclick="closeMod()">&times;</span></div><div class="mob" id="mBod"></div><div class="mof" id="mFot"></div></div></div>
<div class="toast" id="toast"><i class="ri-checkbox-circle-fill"></i><span id="toastMsg"></span></div>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/helpers.js"></script>
<script src="js/operations.js"></script>
<script src="js/draft.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<style>
.c-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.c-bar-item{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.c-bar-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0}
.c-bar-n{font-size:18px;font-weight:800;color:var(--ink);line-height:1.1}
.c-bar-l{font-size:10px;color:var(--mut);font-weight:500}
.c-top{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.c-pill{padding:5px 12px;border-radius:20px;border:1.5px solid var(--line);background:var(--surface);cursor:pointer;font-size:11px;font-weight:600;color:var(--mut);transition:.12s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.c-pill:hover{border-color:var(--line-m);background:var(--bg)}
.c-pill.sel{color:#fff;border-color:transparent}
.c-pill.sel.p-transito{background:var(--info-txt)}
.c-pill.sel.p-recibida{background:var(--warn-txt)}
.c-pill.sel.p-reclamada{background:var(--success-txt)}
.c-pill.sel.p-borrador{background:var(--neutral-txt)}
.c-pill.sel.p-todas{background:var(--slate)}
.c-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.c-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:.15s;border-left:4px solid}
.c-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.c-card.st-transito{border-left-color:var(--info-txt)}
.c-card.st-recibida{border-left-color:var(--warn-txt)}
.c-card.st-reclamada{border-left-color:var(--success-txt)}
.c-card-h{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--line);background:var(--neutral-bg)}
.c-card-id{font-size:14px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:6px}
.c-card-id small{font-size:10px;font-weight:500;color:var(--mut)}
.c-card-prov{font-size:11px;color:var(--mut);margin-top:2px;display:flex;align-items:center;gap:4px}
.c-card-b{padding:10px 16px}
.c-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;background:var(--bg);margin-bottom:4px}
.c-item:last-child{margin-bottom:0}
.c-item-info{flex:1;min-width:0}
.c-item-n{font-size:12px;font-weight:600;color:var(--ink);line-height:1.2}
.c-item-sku{font-size:10px;color:var(--mut);font-family:monospace}
.c-item-q{font-size:12px;font-weight:700;color:var(--ink);text-align:right;white-space:nowrap}
.c-item-q small{font-weight:400;color:var(--mut);font-size:10px;display:block}
.c-card-f{padding:10px 16px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.c-card-f .badge{font-size:10px;padding:3px 8px}
.c-card-f .btn{padding:5px 10px;font-size:10.5px}
.c-search{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:9px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.c-search input{flex:1;min-width:140px;padding:6px 10px 6px 26px;border:1.5px solid var(--line);border-radius:7px;font-size:12px;outline:none;background:var(--bg);color:var(--txt)}
.c-search input:focus{border-color:var(--link)}
.c-empty{text-align:center;padding:50px 20px;color:var(--mut)}
.c-empty i{font-size:36px;opacity:.4;display:block;margin-bottom:8px}
.c-empty span{font-size:13px}
.c-grp-b-hide .c-grp-b{display:none}
@media(max-width:860px){.c-bar{grid-template-columns:repeat(2,1fr)}}
</style>
<script>
renderShell('compras');

let compFiltroEstado='todas',compBusqueda='';

function renderComp(){
  const q=compBusqueda.toLowerCase();
  let items=[...DB.compras];
  if(compFiltroEstado!=='todas')items=items.filter(c=>c.estado===compFiltroEstado);
  if(q)items=items.filter(c=>c.id.toLowerCase().includes(q)||getProv(c.provId)?.n.toLowerCase().includes(q));

  const countE={transito:0,recibida:0,reclamada:0,borrador:0};
  DB.compras.forEach(c=>{if(countE[c.estado]!==undefined)countE[c.estado]++});
  const total=DB.compras.length;

  const barIcs=['ri-truck-line','ri-inbox-unarchive-line','ri-checkbox-circle-line','ri-file-edit-line'];
  const barCls=['#0369A1','#B45309','#15803D','#475569'];
  const barLbs=['En tránsito','Por reclamar','Reclamadas','Borradores'];
  const barVals=[countE.transito,countE.recibida,countE.reclamada,countE.borrador];
  const barH='<div class="c-bar">'+[0,1,2,3].map(i=>'<div class="c-bar-item"><div class="c-bar-ic" style="background:'+barCls[i]+'"><i class="'+barIcs[i]+'"></i></div><div><div class="c-bar-n">'+barVals[i]+'</div><div class="c-bar-l">'+barLbs[i]+'</div></div></div>').join('')+'</div>';

  const pills=[
    {k:'todas',l:'Todas',c:total,pl:'p-todas'},
    {k:'transito',l:'En tránsito',c:countE.transito,pl:'p-transito'},
    {k:'recibida',l:'Por reclamar',c:countE.recibida,pl:'p-recibida'},
    {k:'reclamada',l:'Reclamadas',c:countE.reclamada,pl:'p-reclamada'}
  ];
  const pillsH=pills.map(p=>'<span class="c-pill '+(compFiltroEstado===p.k?'sel '+p.pl:'')+'" onclick="compFiltroEstado=\''+p.k+'\';renderComp()">'+p.l+' <span style="font-size:10px;opacity:.7">'+p.c+'</span></span>').join('');

  const cards=items.map(oc=>{
    const pv=getProv(oc.provId);
    const val=ocValor(oc);
    const itemsH=oc.items.map(it=>'<div class="c-item"><div class="c-item-info"><div class="c-item-n">'+it.n+'</div><div class="c-item-sku">'+it.sku+'</div></div><div class="c-item-q">'+fmt(it.cant)+' '+it.u+'<small>'+money(it.cant*it.precio)+'</small></div></div>').join('');
    const badges={'transito':'bb','recibida':'by','reclamada':'bg','borrador':'bs'};
    let accion='';
    if(oc.estado==='transito'){
      accion='<button class="btn btn-blue" onclick="recibirOC(\''+oc.id+'\');window.location.reload()"><i class="ri-inbox-unarchive-line"></i> Recibir</button>';
    }else if(oc.estado==='recibida'){
      accion='<a href="reclamar.html" class="btn" style="background:var(--warn-txt);color:#fff;text-decoration:none"><i class="ri-hand-coin-line"></i> Reclamar</a>';
    }else if(oc.estado==='reclamada'){
      accion='<span class="badge bg" style="font-size:10px;padding:4px 8px"><i class="ri-checkbox-circle-line"></i> '+oc.reclPor+'</span>';
    }else{
      accion='<button class="btn btn-o btn-sm" onclick="toast(\'OC en borrador\',\'warn\')"><i class="ri-edit-line"></i> Editar</button>';
    }
    return '<div class="c-card st-'+oc.estado+'"><div class="c-card-h"><div><div class="c-card-id">'+oc.id+' <small>'+oc.fecha+'</small></div><div class="c-card-prov"><i class="ri-truck-line"></i>'+pv.n+'</div></div><span class="badge '+(badges[oc.estado]||'bs')+'" style="font-size:10.5px;padding:4px 10px">'+compEstLabel(oc.estado)+'</span></div><div class="c-card-b">'+itemsH+'</div><div class="c-card-f"><b>'+money(val)+'</b>'+accion+'</div></div>';
  }).join('');

  let body='<div class="page th-comp"><div class="hero"><div class="hero-ic"><i class="ri-shopping-cart-2-line"></i></div><h1>Órdenes de Compra</h1><p>Gestión de compras a proveedores. Flujo: OC en tránsito → Recibir → Reclamar → Stock actualizado.</p><div class="hero-act"><button class="btn btn-light" onclick="modalNuevaOC()"><i class="ri-add-line"></i> Nueva OC</button></div></div><div class="body">'+barH+'<div class="c-top">'+pillsH+'</div><div class="c-search"><i class="ri-search-line" style="color:var(--ph);font-size:13px"></i><input type="text" placeholder="Buscar OC o proveedor..." value="'+compBusqueda+'" oninput="compBusqueda=this.value;renderComp()">'+(q?'<button class="btn btn-o btn-sm" onclick="compBusqueda=\'\';renderComp()"><i class="ri-close-line"></i> Limpiar</button>':'')+'</div>'+(cards.length?'<div class="c-grid">'+cards+'</div>':'<div class="c-empty"><i class="ri-inbox-line"></i><span>'+(q?'No se encontraron OC con "'+q+'"':'No hay órdenes'+(compFiltroEstado!=='todas'?' '+compEstLabel(compFiltroEstado).toLowerCase():''))+'</span></div>')+'</div></div>';
  $('pg').innerHTML=body;
}
renderComp();

function modalNuevaOC(){
  if(!DB.proveedores.length){toast('Crea un proveedor primero','warn');return}
  draft={items:[{sku:'',cant:1}]};
  const pOpts=DB.proveedores.map(p=>'<option value="'+p.id+'">'+p.n+' ('+p.ciudad+')</option>').join('');
  openMod('<i class="ri-shopping-cart-2-line"></i> Nueva Orden de Compra',
    '<div class="note"><i class="ri-information-line"></i> Solo puedes comprarle a proveedores ya registrados.</div><div class="ff"><label>Proveedor</label><select id="dProv"><option value="">— Selecciona —</option>'+pOpts+'</select></div><div class="ff"><label>Productos a comprar</label><div id="draftLines"></div><button class="add-line" onclick="addLine()"><i class="ri-add-line"></i> Agregar producto</button></div>',
    '<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-sm" style="background:var(--rojo);color:#fff" onclick="crearOC()"><i class="ri-check-line"></i> Generar OC</button>'
  );renderLines();
}
function crearOC(){
  const provId=$('dProv').value;
  if(!provId){toast('Selecciona un proveedor','warn');return}
  if(!draft.items[0]?.sku){toast('Agrega al menos un producto','warn');return}
  const id='OC-'+OC_SEQ++;
  const items=draft.items.filter(i=>i.sku).map(i=>{const p=getProd(i.sku);return{sku:i.sku,n:p?.n||i.sku,cant:i.cant,u:p?.u||'unid',precio:p?.precio||0}});
  DB.compras.unshift({id,provId,fecha:now(),estado:'transito',recibPor:null,reclPor:null,items});
  closeMod();saveDB();renderComp();toast('OC '+id+' generada. En tránsito hacia bodega.','ok');
}
</script>
</body>
</html>
