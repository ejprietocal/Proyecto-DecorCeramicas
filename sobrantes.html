<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Decorcerámica ERP — Sobrantes</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="screen-app" class="screen active">
<div class="wrap">
<aside class="sidebar" id="sb">
<div class="sb-logo"><div class="sb-logo-ic"><i class="ri-building-2-line"></i></div><div class="sb-logo-t">Decorcerámica<small>ERP OPERACIÓN</small></div></div>
<div class="sb-scroll" id="sbMenu"></div>
<div class="sb-user"><div class="sb-av" id="sbAv"></div><div class="sb-ui"><div class="sb-un" id="sbNm"></div><div class="sb-ur" id="sbRl"></div></div><i class="ri-logout-circle-r-line sb-out" onclick="logout()"></i></div>
</aside>
<div class="sb-bd" id="sbBd" onclick="closeSb()"></div>
<main class="main">
<div class="topbar">
<div class="tb-l"><button class="m-tog" onclick="togSb()"><i class="ri-menu-line"></i></button><i id="tbIc" style="font-size:18px;color:var(--rojo)"></i><div><h2 id="tbTt"></h2><div class="tb-crumb" id="tbCr"></div></div></div>
<div class="tb-r"><div class="tb-btn"><i class="ri-notification-3-line"></i><span class="tb-badge" id="tbNot">0</span></div><div class="tb-prof" onclick="logout()"><div class="tb-av" id="tbAv"></div><span class="tb-n" id="tbNm"></span><i class="ri-logout-circle-r-line" style="color:#94A3B8;font-size:14px"></i></div></div>
</div>
<div id="pg"></div>
</main>
</div>
</div>
<div class="mov" id="modal"><div class="mox"><div class="moh"><h3 id="mTit"></h3><span class="xb" onclick="closeMod()">&times;</span></div><div class="mob" id="mBod"></div><div class="mof" id="mFot"></div></div></div>
<div class="toast" id="toast"><i class="ri-checkbox-circle-fill"></i><span id="toastMsg"></span></div>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/helpers.js"></script>
<script src="js/operations.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
renderShell('sobrantes');

function renderSob(){
  const cols=['Sin identificar','En investigación','Reintegrado'];
  const colBadge={'Sin identificar':'bp','En investigación':'by','Reintegrado':'bg'};
  const kcols=cols.map(col=>{
    const items=DB.sobrantes.filter(s=>s.estado===col);
    const kcs=items.length?items.map(s=>'<div class="kcard"><div class="kcard-t">'+s.cont+'</div><div class="kcard-m">'+s.ubic+'<br><span style="font-size:10.5px;color:#94A3B8">'+s.orig+' · '+s.det+'</span></div><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="badge bs">'+s.cant+'</span>'+(s.bodega?'<span class="badge bs">'+s.bodega+'</span>':'')+'</div>'+(col==='Sin identificar'?'<div style="margin-top:10px;display:flex;gap:7px;flex-wrap:wrap"><button class="btn btn-sm" style="background:#7C3AED;color:#fff;padding:4px 10px;font-size:11px" onclick="investigarSobrante(\''+s.id+'\');window.location.reload()"><i class="ri-search-eye-line"></i> Investigar</button></div>':'')+(col==='En investigación'&&s.sku?'<div style="margin-top:10px"><button class="btn btn-green btn-sm" style="font-size:11px" onclick="reintegrarSobrante(\''+s.id+'\');setTimeout(function(){window.location.reload()},500)"><i class="ri-arrow-go-back-line"></i> Reintegrar al inventario</button></div>':'')+'</div>').join('')
    :'<div style="text-align:center;padding:24px;color:#94A3B8;font-size:12.5px">Sin elementos</div>';
    return '<div class="kcol"><div class="kcol-h"><span>'+col+'</span><span class="badge '+colBadge[col]+'">'+items.length+'</span></div>'+kcs+'</div>';
  }).join('');
  $('pg').innerHTML='<div class="page th-sob"><div class="hero"><div class="hero-ic"><i class="ri-question-line"></i></div><h1>Sobrantes / Sin Identificar</h1><p>Productos no asignados que permanecen en bodega. Investiga, identifica y reintegra al inventario.</p></div><div class="body"><div class="kanban">'+kcols+'</div></div></div>';
}
renderSob();
</script>
</body>
</html>
