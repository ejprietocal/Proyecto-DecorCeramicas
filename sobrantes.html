<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Decorcerámica ERP — Sobrantes</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=7">
<style>
.sob-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sob-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden}
.sob-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.sob-card-tit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.sob-card-sub{font-size:10px;color:var(--mut);margin-top:1px}
.sob-card-val{font-size:22px;font-weight:800;color:var(--ink);line-height:1.1}
.sob-card-val2{font-size:12px;color:var(--mut);margin-top:2px}
</style>
</head>
<body>
<div id="screen-app" class="screen active">
<div class="wrap">
<aside class="sidebar" id="sb">
<div class="sb-logo"><div class="sb-logo-ic"><i class="ri-building-2-line"></i></div><div class="sb-logo-t">Decorcerámica<small>ERP OPERACIÓN</small></div></div>
<div class="sb-scroll" id="sbMenu"></div>
<div class="sb-user"><div class="sb-av" id="sbAv"></div><div class="sb-ui"><div class="sb-un" id="sbNm"></div><div class="sb-ur" id="sbRl"></div></div><i class="ri-logout-circle-r-line sb-out" onclick="logout()"></i></div>
</aside>
<div class="sb-bd" id="sbBd" onclick="closeSb()"></div>
<main class="main">
<div class="topbar">
<div class="tb-l"><button class="m-tog" onclick="togSb()"><i class="ri-menu-line"></i></button><i id="tbIc" style="font-size:18px;color:var(--rojo)"></i><div><h2 id="tbTt"></h2><div class="tb-crumb" id="tbCr"></div></div></div>
<div class="tb-r"><div class="tb-btn"><i class="ri-notification-3-line"></i><span class="tb-badge" id="tbNot">0</span></div><div class="tb-prof" onclick="logout()"><div class="tb-av" id="tbAv"></div><span class="tb-n" id="tbNm"></span><i class="ri-logout-circle-r-line" style="color:var(--ph);font-size:14px"></i></div></div>
</div>
<div id="pg"></div>
</main>
</div>
</div>
<div class="mov" id="modal"><div class="mox"><div class="moh"><h3 id="mTit"></h3><span class="xb" onclick="closeMod()">&times;</span></div><div class="mob" id="mBod"></div><div class="mof" id="mFot"></div></div></div>
<div class="toast" id="toast"><i class="ri-checkbox-circle-fill"></i><span id="toastMsg"></span></div>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/helpers.js"></script>
<script src="js/operations.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
renderShell('sobrantes');

/* Sobrantes unificados: incluye reservas_cliente (mercancía esperando retiro) + DB.sobrantes (devoluciones, excedentes, sin identificar) */
function getSobrantesUnificados(){
  const out=[];
  (DB.reservas_cliente||[]).filter(r=>r.estado!=='completado').forEach(r=>{
    const pr=getProd(r.sku);
    const pend=r.cantidad-(r.entregadoAcumulado||0);
    const m=(r.fechaReserva||'').match(/(\d+)\/(\d+)\/(\d+)/);
    let dias=0;if(m){dias=Math.max(0,Math.floor((Date.now()-new Date(+m[3],+m[2]-1,+m[1]).getTime())/86400000))}
    out.push({
      id:r.id, ubic:'Reserva '+r.bodega, cont:(pr?.n||r.sku)+' — reservado para '+r.clienteNombre,
      cant:fmt(pend)+' '+(pr?.u||'unid'), cant_sec:'—', costo_est:pend*(pr?.precio||0),
      det:'Hace '+dias+' días', orig:'Pedido '+r.pedidoRef+' · entrega parcial',
      estado:'Reserva activa',
      tipo:'reserva_cliente', clienteId:r.clienteId, clienteNombre:r.clienteNombre,
      sku:r.sku, add:pend, bodega:r.bodega, _isRC:true, dias
    });
  });
  DB.sobrantes.forEach(s=>{
    out.push({...s, tipo:sobranteDeriveTipo(s), dias:sobranteDiasEnEstado(s)});
  });
  return out;
}

function renderSob(){
  const all=getSobrantesUnificados();
  const reserva=all.filter(s=>s.tipo==='reserva_cliente');
  const devol=all.filter(s=>s.tipo==='devolucion');
  const excedente=all.filter(s=>s.tipo==='excedente');
  const desconocido=all.filter(s=>s.tipo==='desconocido');
  const valTotal=all.reduce((s,x)=>s+(x.costo_est||0),0);
  const valReserva=reserva.reduce((s,x)=>s+(x.costo_est||0),0);

  const cards='<div class="sob-cards">'+
    '<div class="sob-card" style="border-left:4px solid var(--warn-txt)"><div class="sob-card-top"><div><div class="sob-card-tit" style="color:var(--warn-txt)">Pendiente retiro cliente</div><div class="sob-card-sub">Mercancía ya vendida esperando que la recojan</div></div><span class="badge by"><i class="ri-archive-stack-line"></i> '+reserva.length+'</span></div><div class="sob-card-val">'+reserva.length+'</div><div class="sob-card-val2">'+money(valReserva)+' reservado</div></div>'+
    '<div class="sob-card" style="border-left:4px solid var(--info-txt)"><div class="sob-card-top"><div><div class="sob-card-tit" style="color:var(--info-txt)">Devoluciones</div><div class="sob-card-sub">Cliente devolvió — decidir destino</div></div><span class="badge bb">'+devol.length+'</span></div><div class="sob-card-val">'+devol.length+'</div><div class="sob-card-val2">'+money(devol.reduce((s,x)=>s+(x.costo_est||0),0))+'</div></div>'+
    '<div class="sob-card" style="border-left:4px solid var(--neutral-txt)"><div class="sob-card-top"><div><div class="sob-card-tit" style="color:var(--neutral-txt)">Excedente / Error compra</div><div class="sob-card-sub">Sobra por OC duplicada o exceso</div></div><span class="badge bs">'+excedente.length+'</span></div><div class="sob-card-val">'+excedente.length+'</div><div class="sob-card-val2">'+money(excedente.reduce((s,x)=>s+(x.costo_est||0),0))+'</div></div>'+
    '<div class="sob-card" style="border-left:4px solid var(--danger-txt)"><div class="sob-card-top"><div><div class="sob-card-tit" style="color:var(--danger-txt)">Sin identificar</div><div class="sob-card-sub">Origen desconocido — investigar</div></div><span class="badge br">'+desconocido.length+'</span></div><div class="sob-card-val">'+desconocido.length+'</div><div class="sob-card-val2">Valor total: '+money(valTotal)+'</div></div>'+
  '</div>';

  const cols=[
    {key:'reserva_cliente', titulo:'Pendiente retiro cliente', items:reserva, color:'var(--warn-txt)', bg:'var(--warn-bg)', bd:'var(--warn-bd)', ic:'ri-archive-stack-line', tip:'Llamar al cliente / agendar retiro'},
    {key:'devolucion',      titulo:'Devolución cliente',      items:devol,   color:'var(--info-txt)', bg:'var(--info-bg)', bd:'var(--info-bd)', ic:'ri-arrow-go-back-line', tip:'Reintegrar / nota crédito / outlet'},
    {key:'excedente',       titulo:'Excedente / Error compra', items:excedente, color:'var(--neutral-txt)', bg:'var(--neutral-bg)', bd:'var(--neutral-bd)', ic:'ri-stack-line', tip:'Devolver proveedor / vender excedente'},
    {key:'desconocido',     titulo:'Sin identificar',         items:desconocido, color:'var(--danger-txt)', bg:'var(--danger-bg)', bd:'var(--danger-bd)', ic:'ri-question-line', tip:'Investigar urgente'}
  ];
  const kcols=cols.map(c=>{
    const totalAdd=c.items.reduce((s,x)=>s+(parseInt(x.add)||0),0);
    const totalValCol=c.items.reduce((s,x)=>s+(x.costo_est||0),0);
    const kcs=c.items.length?c.items.map(s=>{
      const d=s.dias||0;
      const edadColor=sobranteEdadColor(d);
      const cliLink=s.clienteId?'<a href="cliente.html?id='+s.clienteId+'" style="color:var(--link);font-weight:700;font-size:11px">'+s.clienteNombre+' →</a>':'';
      let acciones='';
      if(s._isRC){
        acciones='<button class="btn btn-blue btn-sm" style="font-size:11px" onclick="window.location.href=\'cliente.html?id='+s.clienteId+'\'"><i class="ri-eye-line"></i> Ver cliente</button>';
      }else if(s.estado==='Sin identificar'){
        acciones='<button class="btn btn-sm" style="background:var(--rojo);color:#fff;padding:4px 10px;font-size:11px" onclick="investigarSobrante(\''+s.id+'\');setTimeout(function(){window.location.reload()},500)"><i class="ri-search-eye-line"></i> Investigar</button>';
      }else if(s.estado==='En investigación'&&s.sku){
        acciones='<button class="btn btn-green btn-sm" style="font-size:11px" onclick="reintegrarSobrante(\''+s.id+'\');setTimeout(function(){window.location.reload()},500)"><i class="ri-arrow-go-back-line"></i> Reintegrar';
        acciones+='</button>';
      }else if(s.estado==='Reintegrado'){
        acciones='<span style="font-size:11px;color:var(--success-txt);font-weight:600"><i class="ri-checkbox-circle-line"></i> Reintegrado</span>';
      }
      return '<div class="kcard" style="border-left:3px solid '+c.color+'">'+
        '<div class="kcard-t">'+s.cont+'</div>'+
        '<div class="kcard-m">'+s.ubic+'<br><span style="font-size:10.5px;color:var(--ph)">'+s.orig+'</span></div>'+
        (cliLink?'<div style="margin-bottom:6px">'+cliLink+'</div>':'')+
        '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">'+
          '<span class="badge bs">'+s.cant+'</span>'+
          (s.cant_sec&&s.cant_sec!=='—'?'<span class="badge bs">'+s.cant_sec+'</span>':'')+
          '<span class="badge bb">'+s.bodega+'</span>'+
          (s.costo_est?'<span class="badge bs">'+money(s.costo_est)+'</span>':'')+
          '<span style="font-size:10px;font-weight:800;color:'+edadColor+';background:'+(d>30?'var(--danger-bg)':d>15?'var(--warn-bg)':'var(--neutral-bg)')+';padding:2px 6px;border-radius:10px"><i class="ri-time-line"></i> '+d+'d</span>'+
        '</div>'+
        (acciones?'<div>'+acciones+'</div>':'')+
      '</div>';
    }).join(''):'<div style="text-align:center;padding:24px;color:var(--ph);font-size:12.5px">— Sin elementos —</div>';
    return '<div class="kcol" style="background:'+c.bg+';border-color:'+c.bd+'"><div class="kcol-h" style="color:'+c.color+'"><span><i class="'+c.ic+'" style="font-size:13px"></i> '+c.titulo+'</span><span class="badge bs">'+c.items.length+'</span></div><div style="font-size:10px;color:var(--mut);margin-bottom:10px;display:flex;gap:10px;justify-content:space-between"><span>'+totalAdd+' unidades</span><span>'+money(totalValCol)+'</span></div><div style="font-size:10px;color:'+c.color+';font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">Acción: '+c.tip+'</div>'+kcs+'</div>';
  }).join('');

  $('pg').innerHTML='<div class="page th-sob"><div class="hero"><div class="hero-ic"><i class="ri-question-line"></i></div><h1>Sobrantes y Mercancía Pendiente</h1><p>Cuatro categorías independientes: <b>pendiente de retiro</b> por un cliente, <b>devoluciones</b>, <b>excedentes</b> por error o sobra de compras, y <b>sin identificar</b>. La columna determina la acción a tomar.</p></div><div class="body">'+cards+'<div class="kanban" style="grid-template-columns:repeat(4,1fr)">'+kcols+'</div></div></div>';
}
renderSob();
</script>
</body>
</html>
