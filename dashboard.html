<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Decorcerámica ERP — Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=7">
</head>
<body>
<div id="screen-app" class="screen active">
<div class="wrap">
<aside class="sidebar" id="sb">
<div class="sb-logo"><div class="sb-logo-ic"><i class="ri-building-2-line"></i></div><div class="sb-logo-t">Decorcerámica<small>ERP OPERACIÓN</small></div></div>
<div class="sb-scroll" id="sbMenu"></div>
<div class="sb-user"><div class="sb-av" id="sbAv"></div><div class="sb-ui"><div class="sb-un" id="sbNm"></div><div class="sb-ur" id="sbRl"></div></div><i class="ri-logout-circle-r-line sb-out" onclick="logout()"></i></div>
</aside>
<div class="sb-bd" id="sbBd" onclick="closeSb()"></div>
<main class="main">
<div class="topbar">
<div class="tb-l"><button class="m-tog" onclick="togSb()"><i class="ri-menu-line"></i></button><i id="tbIc" style="font-size:18px;color:var(--rojo)"></i><div><h2 id="tbTt"></h2><div class="tb-crumb" id="tbCr"></div></div></div>
<div class="tb-r"><div class="tb-btn"><i class="ri-notification-3-line"></i><span class="tb-badge" id="tbNot">0</span></div><div class="tb-prof" onclick="logout()"><div class="tb-av" id="tbAv"></div><span class="tb-n" id="tbNm"></span><i class="ri-logout-circle-r-line" style="color:var(--ph);font-size:14px"></i></div></div>
</div>
<div id="pg"></div>
</main>
</div>
</div>
<div class="mov" id="modal"><div class="mox"><div class="moh"><h3 id="mTit"></h3><span class="xb" onclick="closeMod()">&times;</span></div><div class="mob" id="mBod"></div><div class="mof" id="mFot"></div></div></div>
<div class="toast" id="toast"><i class="ri-checkbox-circle-fill"></i><span id="toastMsg"></span></div>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/helpers.js"></script>
<script src="js/operations.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
renderShell('dashboard');

function renderDashboard(){
  const u=currentUser;
  if(u.id==='andrea')return renderDashAsesor();
  if(u.id==='miguel')return renderDashCajero();
  if(u.id==='jhon')return renderDashBodeguero();
  return renderDashAdmin();
}

function renderDashAsesor(){
  const cots=DB.cotizaciones;
  const borradores=cots.filter(c=>c.estado==='borrador').length;
  const enviadas=cots.filter(c=>c.estado==='enviada').length;
  const aceptadas=cots.filter(c=>c.estado==='aceptada').length;
  const vencidas=cots.filter(c=>c.estado==='vencida').length;
  const mias=cots.filter(c=>(c.creadoPor||'').toLowerCase().includes('andrea')||(c.creadoPor||'').toLowerCase().includes('asesor'));
  const topCli=DB.clientes.map(c=>({c,total:totalCompradoCliente(c.id),pend:reservasByCliente(c.id).length})).sort((a,b)=>b.total-a.total).slice(0,5);
  const topRows=topCli.map(x=>'<tr><td><a href="cliente.html?id='+x.c.id+'" style="color:var(--link);font-weight:700">'+x.c.n+'</a><div style="font-size:10px;color:var(--mut)">'+(x.c.ciudad||'—')+'</div></td><td>'+money(x.total)+'</td><td>'+(x.pend?'<span class="badge by"><i class="ri-archive-stack-line"></i> '+x.pend+'</span>':'<span class="badge bg">—</span>')+'</td></tr>').join('');
  const recientes=cots.slice(0,6).map(c=>'<tr><td><b>'+c.id+'</b></td><td>'+clienteNombre(c)+'</td><td><span class="badge '+ctEstBadge(c.estado)+'"><i class="'+(c.estado==='aceptada'?'ri-check-line':c.estado==='enviada'?'ri-send-plane-line':c.estado==='rechazada'?'ri-close-line':'ri-file-edit-line')+'"></i> '+ctEstLabel(c.estado)+'</span></td><td style="text-align:right">'+money(c.total)+'</td></tr>').join('')||'<tr><td colspan="4" style="text-align:center;color:var(--mut);padding:18px">Aún no has creado cotizaciones</td></tr>';
  return `
    <div class="page th-dash">
      <div class="hero"><div class="hero-ic"><i class="ri-user-star-line"></i></div><h1>Hola ${currentUser.n.split(' ')[0]} 👋</h1><p>Vista de Asesora de Ventas — gestiona cotizaciones, clientes activos y conversión a pedidos.</p><div class="hero-act"><a href="cotizaciones.html" class="btn btn-p"><i class="ri-add-line"></i> Nueva cotización</a><a href="cliente.html" class="btn btn-o"><i class="ri-user-search-line"></i> Buscar cliente</a></div></div>
      <div class="body">
        <div class="grid" style="margin-bottom:18px">
          <div class="stat c3"><div class="stat-ic" style="background:var(--neutral-txt)"><i class="ri-file-edit-line"></i></div><div class="stat-n">${borradores}</div><div class="stat-l">Borradores</div></div>
          <div class="stat c3"><div class="stat-ic" style="background:var(--info-txt)"><i class="ri-send-plane-line"></i></div><div class="stat-n">${enviadas}</div><div class="stat-l">Enviadas al cliente</div></div>
          <div class="stat c3"><div class="stat-ic" style="background:var(--success-txt)"><i class="ri-checkbox-circle-line"></i></div><div class="stat-n">${aceptadas}</div><div class="stat-l">Aceptadas (listas para OC)</div></div>
          <div class="stat c3"><div class="stat-ic" style="background:var(--warn-txt)"><i class="ri-time-line"></i></div><div class="stat-n">${vencidas}</div><div class="stat-l">Vencidas</div></div>
        </div>
        <div class="grid">
          <div class="card c7"><div class="ch"><div class="ct"><i class="ri-file-text-line"></i> Cotizaciones recientes</div><a href="cotizaciones.html" class="btn btn-o btn-sm">Ver todas</a></div><table class="table"><thead><tr><th>Número</th><th>Cliente</th><th>Estado</th><th style="text-align:right">Total</th></tr></thead><tbody>${recientes}</tbody></table></div>
          <div class="card c5"><div class="ch"><div class="ct"><i class="ri-vip-crown-line"></i> Clientes top</div></div><table class="table"><thead><tr><th>Cliente</th><th>Comprado</th><th>Pendiente</th></tr></thead><tbody>${topRows||'<tr><td colspan="3" style="text-align:center;color:var(--mut);padding:14px">—</td></tr>'}</tbody></table></div>
        </div>
      </div>
    </div>`;
}

function renderDashCajero(){
  const cotsAceptadas=DB.cotizaciones.filter(c=>c.estado==='aceptada');
  const occPend=DB.ordenes_compra_cliente.filter(o=>o.estado==='pendiente'||o.estado==='aprobada');
  const hoy=new Date();const hoyStr=hoy.getDate()+'/'+(hoy.getMonth()+1)+'/'+hoy.getFullYear();
  const fvHoy=DB.facturas_venta.filter(f=>f.fecha&&f.fecha.startsWith(hoy.getDate()+'/'+(hoy.getMonth()+1)));
  const totalHoy=fvHoy.reduce((s,f)=>s+(f.total||0),0);
  const fvUlt=DB.facturas_venta.slice(0,8);
  const fRows=fvUlt.map(f=>'<tr><td><b>'+f.numero+'</b></td><td>'+clienteNombre(f)+'</td><td>'+f.fecha+'</td><td><span class="badge '+fvEstBadge(f.estado)+'">'+fvEstLabel(f.estado)+'</span></td><td style="text-align:right"><b>'+money(f.total)+'</b></td></tr>').join('')||'<tr><td colspan="5" style="text-align:center;color:var(--mut);padding:18px">Sin facturas aún</td></tr>';
  const cotRows=cotsAceptadas.slice(0,5).map(c=>'<tr><td><b>'+c.id+'</b></td><td>'+clienteNombre(c)+'</td><td style="text-align:right">'+money(c.total)+'</td><td><a href="cotizaciones.html" class="btn btn-blue btn-sm"><i class="ri-bill-line"></i> Facturar</a></td></tr>').join('')||'<tr><td colspan="4" style="text-align:center;color:var(--mut);padding:14px">No hay cotizaciones por facturar</td></tr>';
  return `
    <div class="page th-dash">
      <div class="hero"><div class="hero-ic"><i class="ri-bill-line"></i></div><h1>Caja ${currentUser.n.split(' ')[0]}</h1><p>Vista de Cajero — facturar cotizaciones aceptadas, emitir notas y revisar ventas del día.</p><div class="hero-act"><a href="cotizaciones.html" class="btn btn-p"><i class="ri-bill-line"></i> Facturar cotización</a><a href="facturas.html" class="btn btn-o"><i class="ri-file-list-3-line"></i> Ver facturas</a></div></div>
      <div class="body">
        <div class="grid" style="margin-bottom:18px">
          <div class="stat c3"><div class="stat-ic" style="background:var(--warn-txt)"><i class="ri-file-text-line"></i></div><div class="stat-n">${cotsAceptadas.length}</div><div class="stat-l">Cotizaciones por facturar</div></div>
          <div class="stat c3"><div class="stat-ic" style="background:var(--info-txt)"><i class="ri-file-list-3-line"></i></div><div class="stat-n">${occPend.length}</div><div class="stat-l">OC sin remisión</div></div>
          <div class="stat c3"><div class="stat-ic" style="background:var(--success-txt)"><i class="ri-bill-line"></i></div><div class="stat-n">${fvHoy.length}</div><div class="stat-l">Facturas hoy</div></div>
          <div class="stat c3"><div class="stat-ic" style="background:var(--link)"><i class="ri-money-dollar-circle-line"></i></div><div class="stat-n" style="font-size:18px">${money(totalHoy)}</div><div class="stat-l">Total facturado hoy</div></div>
        </div>
        <div class="grid">
          <div class="card c7"><div class="ch"><div class="ct"><i class="ri-bill-line"></i> Últimas facturas</div><a href="facturas.html" class="btn btn-o btn-sm">Ver todas</a></div><table class="table"><thead><tr><th>N°</th><th>Cliente</th><th>Fecha</th><th>Estado</th><th style="text-align:right">Total</th></tr></thead><tbody>${fRows}</tbody></table></div>
          <div class="card c5"><div class="ch"><div class="ct"><i class="ri-flashlight-line"></i> Por facturar (cotizaciones aceptadas)</div></div><table class="table"><thead><tr><th>N°</th><th>Cliente</th><th style="text-align:right">Total</th><th></th></tr></thead><tbody>${cotRows}</tbody></table></div>
        </div>
      </div>
    </div>`;
}

function renderDashBodeguero(){
  const reservas=(DB.reservas_cliente||[]).filter(r=>r.estado!=='completado');
  const reservasOrd=reservas.map(r=>{const m=(r.fechaReserva||'').match(/(\d+)\/(\d+)\/(\d+)/);let dias=0;if(m){dias=Math.max(0,Math.floor((Date.now()-new Date(+m[3],+m[2]-1,+m[1]).getTime())/86400000))}return{...r,dias}}).sort((a,b)=>b.dias-a.dias);
  const llegHoy=reservasOrd.slice(0,6);
  const pedAsig=DB.pedidos.filter(p=>p.estado==='asignado'||p.estado==='parcial_despachado');
  const ocTransito=DB.compras.filter(c=>c.estado==='transito').length;
  const ocRecibidas=DB.compras.filter(c=>c.estado==='recibida').length;
  const lowStock=[];DB.productos.forEach(p=>{let t=0;DB.bodegas.forEach(b=>t+=DB.stock[b.id][p.sku]||0);if(t<=20)lowStock.push({n:p.n,sku:p.sku,t,u:p.u})});lowStock.sort((a,b)=>a.t-b.t);
  const llegRows=llegHoy.map(r=>{const pr=getProd(r.sku);const pend=r.cantidad-(r.entregadoAcumulado||0);return '<tr><td><b>'+r.clienteNombre+'</b><div style="font-size:10px;color:var(--mut)">'+r.pedidoRef+'</div></td><td>'+(pr?.n||r.sku)+'</td><td><b>'+fmt(pend)+'</b> '+(pr?.u||'unid')+'</td><td><span class="badge bb">'+r.bodega+'</span></td><td><span style="color:'+sobranteEdadColor(r.dias)+';font-weight:800">'+r.dias+' d</span></td></tr>'}).join('')||'<tr><td colspan="5" style="text-align:center;color:var(--mut);padding:18px">No hay clientes esperando retirar mercancía 🎉</td></tr>';
  const pedRows=pedAsig.slice(0,6).map(p=>{const pct=pedidoPorcentaje(p);return '<tr><td><b>'+p.id+'</b></td><td>'+clienteNombre(p)+'</td><td><span class="badge '+pedEstBadge(p.estado)+'"><i class="'+pedEstIcon(p.estado)+'"></i> '+pedEstLabel(p.estado)+'</span></td><td><div class="pd-progress"><div class="bar"><span style="width:'+pct+'%;background:'+(pct===100?'var(--success-txt)':pct>0?'var(--warn-txt)':'var(--info-txt)')+'"></span></div><span class="pd-progress-l">'+pct+'%</span></div></td></tr>'}).join('')||'<tr><td colspan="4" style="text-align:center;color:var(--mut);padding:14px">Sin pedidos por despachar</td></tr>';
  const lowRows=lowStock.slice(0,5).map(s=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:'+(s.t===0?'var(--danger-bg)':'var(--warn-bg)')+';color:'+(s.t===0?'var(--danger-txt)':'var(--warn-txt)')+';border-radius:8px;margin-bottom:5px;font-size:11.5px"><span style="font-weight:600">'+s.n+'</span><b>'+(s.t===0?'AGOTADO':fmt(s.t)+' '+s.u)+'</b></div>').join('')||'<div style="text-align:center;color:var(--mut);padding:14px;font-size:12px">Stock saludable ✓</div>';
  return `
    <div class="page th-dash">
      <div class="hero"><div class="hero-ic"><i class="ri-archive-2-line"></i></div><h1>Bodega — ${currentUser.n.split(' ')[0]}</h1><p>Vista de Operario de Despacho — clientes esperando retiro, stock crítico, pedidos a despachar y OC entrando.</p><div class="hero-act"><a href="pedidos.html" class="btn btn-p"><i class="ri-send-plane-line"></i> Ver pedidos a despachar</a><a href="reclamar.html" class="btn btn-o"><i class="ri-inbox-unarchive-line"></i> Reclamar OC</a></div></div>
      <div class="body">
        <div class="grid" style="margin-bottom:18px">
          <div class="stat c3"><div class="stat-ic" style="background:var(--warn-txt)"><i class="ri-archive-stack-line"></i></div><div class="stat-n">${reservas.length}</div><div class="stat-l">Clientes esperando retiro</div></div>
          <div class="stat c3"><div class="stat-ic" style="background:var(--rojo)"><i class="ri-send-plane-line"></i></div><div class="stat-n">${pedAsig.length}</div><div class="stat-l">Pedidos por despachar</div></div>
          <div class="stat c3"><div class="stat-ic" style="background:var(--info-txt)"><i class="ri-truck-line"></i></div><div class="stat-n">${ocTransito}</div><div class="stat-l">OC en tránsito</div></div>
          <div class="stat c3"><div class="stat-ic" style="background:var(--success-txt)"><i class="ri-inbox-unarchive-line"></i></div><div class="stat-n">${ocRecibidas}</div><div class="stat-l">OC para reclamar</div></div>
        </div>
        <div class="grid">
          <div class="card c8"><div class="ch"><div class="ct"><i class="ri-archive-stack-line" style="color:var(--warn-txt)"></i> Mercancía esperando retiro (Llegadas)</div><a href="sobrantes.html" class="btn btn-o btn-sm">Ver sobrantes</a></div><table class="table"><thead><tr><th>Cliente</th><th>Producto</th><th>Pendiente</th><th>Bodega</th><th>Esperando</th></tr></thead><tbody>${llegRows}</tbody></table></div>
          <div class="card c4"><div class="ch"><div class="ct"><i class="ri-alert-line"></i> Stock crítico</div></div>${lowRows}</div>
        </div>
        <div class="grid" style="margin-top:14px">
          <div class="card c12"><div class="ch"><div class="ct"><i class="ri-send-plane-line"></i> Pedidos por despachar</div><a href="pedidos.html" class="btn btn-o btn-sm">Ver todos</a></div><table class="table"><thead><tr><th>Pedido</th><th>Cliente</th><th>Estado</th><th style="width:30%">Avance</th></tr></thead><tbody>${pedRows}</tbody></table></div>
        </div>
      </div>
    </div>`;
}

function renderDashAdmin(){
  const pend=DB.pedidos.filter(p=>p.estado==='pendiente').length;
  const asig=DB.pedidos.filter(p=>p.estado==='asignado'||p.estado==='parcial_asignado').length;
  const res=DB.pedidos.filter(p=>p.estado==='resagado'||p.estado==='parcial_resagado').length;
  const desp=DB.pedidos.filter(p=>p.estado==='despachado').length;
  const activeOC=DB.compras.filter(c=>c.estado!=='reclamada').length;
  const expiringLots=DB.vencimientos.filter(v=>v.dias<=15).length;
  const unresolvedLeftovers=DB.sobrantes.filter(s=>s.estado!=='Reintegrado').length;
  const leftoverCost=DB.sobrantes.filter(s=>s.estado!=='Reintegrado').reduce((sum,s)=>sum+s.costo_est,0);

  let totalUnits=0;
  let activeSKUs=new Set();
  Object.values(DB.stock).forEach(wh=>{
    Object.keys(wh).forEach(sku=>{
      const qty=wh[sku]||0;
      if(qty>0){
        totalUnits+=qty;
        activeSKUs.add(sku);
      }
    });
  });

  const capacities={BGA:30000,BGB:15000,BGC:5000,BGD:4000};
  const totalMaxCap=54000;
  const globalOccupancy=Math.min(100,Math.round((totalUnits/totalMaxCap)*100));

  const bdgRows=DB.bodegas.map(b=>{
    const units=Object.values(DB.stock[b.id]||{}).reduce((s,v)=>s+v,0);
    const max=capacities[b.id]||10000;
    const pct=Math.min(100,Math.round((units/max)*100));
    let statusClass='verde';
    let statusLabel='Óptimo';
    if(pct>=90){
      statusClass='rojo';
      statusLabel='Saturado';
    }else if(pct>=75){
      statusClass='amarillo';
      statusLabel='Atención';
    }
    return `
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;font-weight:600">
          <div>
            <span style="font-weight:700;color:var(--ink)">${b.id}</span>
            <span style="color:var(--mut);font-size:11px;margin-left:4px">${b.n}</span>
          </div>
          <div style="color:var(--ink)">${fmt(units)} / ${fmt(max)} <span style="color:var(--mut);font-size:10px;font-weight:500">(${pct}%)</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="bar" style="flex:1;height:6px;background:var(--neutral-bg);border-radius:4px;overflow:hidden">
            <span style="display:block;height:100%;border-radius:4px;background:var(--${statusClass==='verde'?'success-txt':statusClass==='amarillo'?'warn-txt':'danger-txt'});width:${pct}%"></span>
          </div>
          <span class="badge ${statusClass==='verde'?'bg':statusClass==='amarillo'?'by':'br'}" style="font-size:9px;padding:1px 6px;font-weight:700">${statusLabel}</span>
        </div>
      </div>
    `;
  }).join('');

  const donutTotal = pend + asig + res + desp;
  let svgDonut = '';
  const donutSlices = [
    { label: 'Pendiente', count: pend, color: 'var(--link)' },
    { label: 'Asignado', count: asig, color: 'var(--success-txt)' },
    { label: 'Resagado', count: res, color: 'var(--warn-txt)' },
    { label: 'Despachado', count: desp, color: 'var(--neutral-txt)' }
  ];
  if(donutTotal===0){
    svgDonut = '<circle cx="50" cy="50" r="38" fill="transparent" stroke="var(--line)" stroke-width="12"/>';
  }else{
    const circ = 2 * Math.PI * 38;
    let accumulatedPercent = 0;
    donutSlices.forEach(slice=>{
      if(slice.count>0){
        const pct = slice.count / donutTotal;
        const strokeLength = pct * circ;
        const offset = (accumulatedPercent / donutTotal) * circ;
        svgDonut += `<circle cx="50" cy="50" r="38" fill="transparent" stroke="${slice.color}" stroke-width="10" stroke-dasharray="${strokeLength} ${circ}" stroke-dashoffset="-${offset}" transform="rotate(-90 50 50)"/>`;
        accumulatedPercent += slice.count;
      }
    });
  }

  const donutLegend = donutSlices.map(s => {
    const pct = donutTotal ? Math.round((s.count / donutTotal) * 100) : 0;
    return `
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:11.5px;padding:4px 0;border-bottom:1px dashed var(--line)">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:7px;height:7px;border-radius:50%;background:${s.color}"></div>
          <span style="color:var(--txt);font-weight:500">${s.label}</span>
        </div>
        <div style="font-weight:700;color:var(--ink)">${s.count} <span style="font-size:9.5px;color:var(--mut);font-weight:500">(${pct}%)</span></div>
      </div>
    `;
  }).join('');

  const lowStockItems = [];
  DB.productos.forEach(p => {
    let tot = 0;
    DB.bodegas.forEach(b => {
      tot += (DB.stock[b.id][p.sku] || 0);
    });
    if (tot <= 20) {
      lowStockItems.push({ sku: p.sku, n: p.n, total: tot, u: p.u });
    }
  });
  lowStockItems.sort((a,b) => a.total - b.total);
  const alertsHtml = lowStockItems.slice(0, 4).map(item => {
    const isZero = item.total === 0;
    return `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;background:var(--neutral-bg);margin-bottom:6px;border-left:3px solid var(--${isZero ? 'danger-txt' : 'warn-txt'})">
        <div style="min-width:0;flex:1;margin-right:8px">
          <div style="font-size:11.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${item.n}">${item.n}</div>
          <div style="font-size:9.5px;color:var(--mut)">SKU: ${item.sku}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:11.5px;font-weight:800;color:var(--${isZero ? 'danger-txt' : 'warn-txt'})">${item.total === 0 ? 'AGOTADO' : fmt(item.total) + ' ' + item.u}</div>
          <div style="font-size:9px;color:var(--mut)">Stock Total</div>
        </div>
      </div>
    `;
  }).join('') || '<div style="text-align:center;color:var(--mut);padding:20px;font-size:12px">Sin alertas de stock bajo</div>';

  const movs=DB.movimientos.slice(0,5).map(m=>'<tr><td><b>'+m.n+'</b></td><td><span class="badge '+(m.tipo==='Entrada'?'bg':m.tipo==='Salida'?'bb':m.tipo==='Transferencia'?'bi':'bp')+'">'+m.tipo+'</span></td><td>'+fmt(m.cant)+' '+m.u+'</td><td>'+m.bodega+'</td><td>'+m.resp+'</td><td style="color:var(--mut)">'+m.f+'</td></tr>').join('');

  return `
    <div class="page th-dash">
      <div class="hero">
        <div class="hero-ic"><i class="ri-dashboard-line"></i></div>
        <h1>Dashboard Operativo</h1>
        <p>Visibilidad total del inventario en todas las bodegas — Ciclo continuo de atención a pedidos</p>
      </div>
      <div class="body">
        
        <!-- KPI Cards Grid -->
        <div class="grid" style="margin-bottom:20px">
          
          <div class="stat c3">
            <div class="stat-ring" style="background:var(--link)"></div>
            <div class="stat-ic" style="background:var(--link)"><i class="ri-database-2-line"></i></div>
            <div class="stat-n">${fmt(totalUnits)}</div>
            <div class="stat-l">Stock Total Global (${activeSKUs.size} SKUs)</div>
            <div class="pbar" style="margin-top:8px">
              <div class="bar" style="height:6px;background:var(--neutral-bg);border-radius:4px;overflow:hidden">
                <span style="display:block;height:100%;border-radius:4px;background:var(--link);width:${globalOccupancy}%"></span>
              </div>
              <span style="font-size:10px;font-weight:700;color:var(--ink)">${globalOccupancy}% Ocupado</span>
            </div>
          </div>

          <div class="stat c3">
            <div class="stat-ring" style="background:var(--success-txt)"></div>
            <div class="stat-ic" style="background:var(--success-txt)"><i class="ri-truck-line"></i></div>
            <div class="stat-n">${desp}</div>
            <div class="stat-l">Pedidos Despachados</div>
            <div class="pbar" style="margin-top:8px">
              <div class="bar" style="height:6px;background:var(--neutral-bg);border-radius:4px;overflow:hidden">
                <span style="display:block;height:100%;border-radius:4px;background:var(--success-txt);width:${donutTotal ? Math.round(((asig+desp)/donutTotal)*100) : 0}%"></span>
              </div>
              <span style="font-size:10px;font-weight:700;color:var(--ink)">${donutTotal ? Math.round(((asig+desp)/donutTotal)*100) : 0}% Procesado</span>
            </div>
          </div>

          <div class="stat c3">
            <div class="stat-ring" style="background:var(--warn-txt)"></div>
            <div class="stat-ic" style="background:var(--warn-txt)"><i class="ri-shopping-bag-line"></i></div>
            <div class="stat-n">${activeOC}</div>
            <div class="stat-l">Órdenes de Compra Activas</div>
            <div style="display:flex;align-items:center;gap:4px;margin-top:8px;font-size:11px;color:var(--danger-txt);font-weight:600">
              <i class="ri-alarm-warning-line"></i> ${expiringLots} lotes vencen pronto
            </div>
          </div>

          <div class="stat c3">
            <div class="stat-ring" style="background:var(--danger-txt)"></div>
            <div class="stat-ic" style="background:var(--danger-txt)"><i class="ri-scales-line"></i></div>
            <div class="stat-n">${unresolvedLeftovers}</div>
            <div class="stat-l">Sobrantes Pendientes</div>
            <div style="font-size:11px;color:var(--mut);margin-top:8px;font-weight:600">
              Valor Est: <span style="color:var(--ink);font-weight:700">${money(leftoverCost)}</span>
            </div>
          </div>

        </div>

        <!-- Charts Grid (Warehouses Capacity vs Sales Orders Donut) -->
        <div class="grid" style="margin-bottom:20px">
          
          <!-- Warehouse Capacity Card -->
          <div class="card c6">
            <div class="ch">
              <div class="ct"><i class="ri-building-2-line"></i> Capacidad y Distribución de Bodegas</div>
              <span class="badge bg" style="font-size:10px;font-weight:700">Total Cap: ${fmt(totalMaxCap)} u</span>
            </div>
            <div style="display:flex;flex-direction:column;gap:2px">
              ${bdgRows}
            </div>
          </div>

          <!-- Sales Orders Donut Card -->
          <div class="card c6">
            <div class="ch">
              <div class="ct"><i class="ri-pie-chart-2-line"></i> Estado General de Pedidos</div>
              <span class="badge bi" style="font-size:10px;font-weight:700">Total: ${donutTotal}</span>
            </div>
            <div style="display:flex;align-items:center;justify-content:center;gap:24px;height:160px;margin-top:8px">
              <div style="position:relative;width:115px;height:115px;flex-shrink:0">
                <svg viewBox="0 0 100 100" width="115" height="115">
                  ${svgDonut}
                </svg>
                <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
                  <div style="font-size:20px;font-weight:800;color:var(--ink);line-height:1">${donutTotal}</div>
                  <div style="font-size:9px;color:var(--mut);text-transform:uppercase;font-weight:700;letter-spacing:0.5px">Pedidos</div>
                </div>
              </div>
              <div style="flex:1;min-width:0">
                ${donutLegend}
              </div>
            </div>
          </div>

        </div>

        <!-- Facturación modules -->
        <div class="grid" style="margin-bottom:20px">
          <div class="card c12">
            <div class="ch">
              <div class="ct"><i class="ri-file-list-3-line" style="color:var(--rojo)"></i> Módulos de Facturación</div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">
              <a href="facturas.html" class="stat" style="text-decoration:none;cursor:pointer;border:1px solid var(--line);border-radius:10px;padding:12px">
                <div class="stat-ic" style="background:var(--link);width:32px;height:32px;font-size:14px;margin-bottom:6px"><i class="ri-file-list-3-line"></i></div>
                <div class="stat-n" style="font-size:16px">Facturación</div>
                <div class="stat-l">Facturas Venta/Compra</div>
              </a>
              <a href="notas.html" class="stat" style="text-decoration:none;cursor:pointer;border:1px solid var(--line);border-radius:10px;padding:12px">
                <div class="stat-ic" style="background:var(--warn-txt);width:32px;height:32px;font-size:14px;margin-bottom:6px"><i class="ri-swap-2-line"></i></div>
                <div class="stat-n" style="font-size:16px">Notas</div>
                <div class="stat-l">Crédito / Débito</div>
              </a>
              <a href="cotizaciones.html" class="stat" style="text-decoration:none;cursor:pointer;border:1px solid var(--line);border-radius:10px;padding:12px">
                <div class="stat-ic" style="background:var(--success-txt);width:32px;height:32px;font-size:14px;margin-bottom:6px"><i class="ri-file-text-line"></i></div>
                <div class="stat-n" style="font-size:16px">Cotizaciones</div>
                <div class="stat-l">Proformas y presupuestos</div>
              </a>
              <a href="remisiones.html" class="stat" style="text-decoration:none;cursor:pointer;border:1px solid var(--line);border-radius:10px;padding:12px">
                <div class="stat-ic" style="background:var(--info-txt);width:32px;height:32px;font-size:14px;margin-bottom:6px"><i class="ri-truck-line"></i></div>
                <div class="stat-n" style="font-size:16px">Remisiones</div>
                <div class="stat-l">Albaranes y traslados</div>
              </a>
            </div>
          </div>
        </div>

        <!-- Configuración module -->
        <div class="grid" style="margin-bottom:20px">
          <div class="card c12">
            <div class="ch">
              <div class="ct"><i class="ri-settings-3-line" style="color:var(--rojo)"></i> Configuración del Sistema</div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">
              <a href="configuracion.html" class="stat" style="text-decoration:none;cursor:pointer;border:1px solid var(--line);border-radius:10px;padding:12px">
                <div class="stat-ic" style="background:var(--link);width:32px;height:32px;font-size:14px;margin-bottom:6px"><i class="ri-settings-3-line"></i></div>
                <div class="stat-n" style="font-size:16px">Configuración</div>
                <div class="stat-l">Parámetros del sistema</div>
              </a>
              <a href="usuarios.html" class="stat" style="text-decoration:none;cursor:pointer;border:1px solid var(--line);border-radius:10px;padding:12px">
                <div class="stat-ic" style="background:var(--success-txt);width:32px;height:32px;font-size:14px;margin-bottom:6px"><i class="ri-shield-user-line"></i></div>
                <div class="stat-n" style="font-size:16px">Usuarios</div>
                <div class="stat-l">Roles y permisos</div>
              </a>
            </div>
          </div>
        </div>

        <!-- Lower Grid (Latest movements & Critical stock alerts) -->
        <div class="grid">
          
          <!-- Movements Table -->
          <div class="card c8">
            <div class="ch">
              <div class="ct"><i class="ri-swap-box-line"></i> Últimos movimientos</div>
              <a href="movimientos.html" class="btn btn-o btn-sm">Ver todos</a>
            </div>
            <table class="table">
              <thead>
                <tr>
                  <th>Producto</th>
                  <th>Tipo</th>
                  <th>Cantidad</th>
                  <th>Bodega</th>
                  <th>Responsable</th>
                  <th>Fecha</th>
                </tr>
              </thead>
              <tbody>
                ${movs || '<tr><td colspan="6" style="text-align:center;color:var(--mut);padding:20px">Sin movimientos aún</td></tr>'}
              </tbody>
            </table>
          </div>

          <!-- Critical Stock Alerts -->
          <div class="card c4">
            <div class="ch">
              <div class="ct"><i class="ri-alert-line"></i> Alertas de Stock Crítico</div>
              <span class="badge br" style="font-size:10px;font-weight:700">Crítico</span>
            </div>
            <div style="display:flex;flex-direction:column;gap:2px">
              ${alertsHtml}
            </div>
          </div>

        </div>

      </div>
    </div>
  `;
}

$('pg').innerHTML=renderDashboard();
</script>
</body>
</html>
