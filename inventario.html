<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Decorcerámica ERP — Inventario</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="screen-app" class="screen active">
<div class="wrap">
<aside class="sidebar" id="sb">
<div class="sb-logo"><div class="sb-logo-ic"><i class="ri-building-2-line"></i></div><div class="sb-logo-t">Decorcerámica<small>ERP OPERACIÓN</small></div></div>
<div class="sb-scroll" id="sbMenu"></div>
<div class="sb-user"><div class="sb-av" id="sbAv"></div><div class="sb-ui"><div class="sb-un" id="sbNm"></div><div class="sb-ur" id="sbRl"></div></div><i class="ri-logout-circle-r-line sb-out" onclick="logout()"></i></div>
</aside>
<div class="sb-bd" id="sbBd" onclick="closeSb()"></div>
<main class="main">
<div class="topbar">
<div class="tb-l"><button class="m-tog" onclick="togSb()"><i class="ri-menu-line"></i></button><i id="tbIc" style="font-size:18px;color:var(--rojo)"></i><div><h2 id="tbTt"></h2><div class="tb-crumb" id="tbCr"></div></div></div>
<div class="tb-r"><div class="tb-btn"><i class="ri-notification-3-line"></i><span class="tb-badge" id="tbNot">0</span></div><div class="tb-prof" onclick="logout()"><div class="tb-av" id="tbAv"></div><span class="tb-n" id="tbNm"></span><i class="ri-logout-circle-r-line" style="color:#94A3B8;font-size:14px"></i></div></div>
</div>
<div id="pg"></div>
</main>
</div>
</div>
<div class="mov" id="modal"><div class="mox"><div class="moh"><h3 id="mTit"></h3><span class="xb" onclick="closeMod()">&times;</span></div><div class="mob" id="mBod"></div><div class="mof" id="mFot"></div></div></div>
<div class="toast" id="toast"><i class="ri-checkbox-circle-fill"></i><span id="toastMsg"></span></div>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/helpers.js"></script>
<script src="js/operations.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
renderShell('inventario');

function renderInv(){
  const tabs=DB.bodegas.map(b=>'<div class="inv-tab '+(b.id===selBodega?'sel':'')+'" onclick="selBodega=\''+b.id+'\';renderInv()"><div class="dot '+b.estado+'"></div><div><div class="inv-tab-n">'+b.id+'</div><div class="inv-tab-d">'+(b.n.split(' - ')[1]||'')+'</div></div></div>').join('');
  const bg=DB.bodegas.find(b=>b.id===selBodega);
  const cards=DB.productos.map(p=>{
    const stk=stockBodega(selBodega,p.sku);const tot=stockTotal(p.sku);
    const pct=tot>0?Math.round(stk/tot*100):0;
    const est=stk===0?['br','Agotado']:stk<100?['by','Bajo stock']:['bg','Disponible'];
    const conv=p.caja?'<div style="font-size:10.5px;color:var(--ph);margin:2px 0 0">~'+fmt(Math.round(stk/p.caja))+' '+p.cajaN+' · <span style="color:var(--mut)">1 '+p.cajaN+' = '+p.caja+' '+p.u+'</span></div>':'';
    return '<div class="pc"><div class="pc-thumb" style="background:'+p.grad+'"><i class="'+p.ic+'"></i></div><div class="pc-body"><div class="pc-n">'+p.n+'</div><div class="pc-sku">'+p.sku+'</div><div class="pc-stock">'+fmt(stk)+'</div><div class="pc-sl">'+p.u+' en '+selBodega+' · Total: '+fmt(tot)+' '+p.u+'</div>'+conv+'<div style="margin-top:8px"><div class="bar"><span style="width:'+pct+'%;background:'+(stk===0?'var(--danger-txt)':stk<100?'var(--warn-txt)':'var(--success-txt)')+'"></span></div></div><div class="pc-f"><span class="badge '+est[0]+'">'+est[1]+'</span><button class="btn btn-sm" style="background:var(--rojo);color:#fff;padding:4px 9px;font-size:11px" onclick="modalAjusteInventario(\''+selBodega+'\',\''+p.sku+'\')"><i class="ri-scales-line"></i> Ajustar</button></div></div></div>';
  }).join('');
  $('pg').innerHTML='<div class="page th-inv"><div class="hero"><div class="hero-ic"><i class="ri-archive-2-line"></i></div><h1>Inventario</h1><p>Stock en tiempo real por bodega. Detecta diferencias y aplica castigos o registra excedentes directamente desde cada producto.</p><div class="hero-act"><button class="btn btn-light" onclick="renderInv()" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)"><i class="ri-refresh-line"></i> Actualizar</button></div></div><div class="body"><div class="inv-wrap"><div class="inv-bodegas">'+tabs+'</div><div style="flex:1"><div style="margin-bottom:14px;padding:12px 16px;background:var(--success-bg);border:1px solid var(--success-bd);border-radius:12px;display:flex;align-items:center;gap:10px"><div class="dot '+bg.estado+'"></div><div style="flex:1"><b style="font-size:14px">'+bg.n+'</b> <span style="font-size:12px;color:var(--mut)"> · '+bg.dir+' · '+bg.area+' m²</span></div></div><div style="background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:var(--warn-txt);display:flex;gap:8px"><i class="ri-error-warning-line" style="margin-top:1px;flex-shrink:0"></i><span>Dolor principal: alta rotación de personal genera descontrol. Usa <b>Ajustar</b> en cada producto para registrar el conteo físico real y castigar diferencias. Cada ajuste queda en el historial de Movimientos.</span></div><div class="inv-grid">'+cards+'</div></div></div></div></div>';
}
renderInv();
</script>
</body>
</html>
