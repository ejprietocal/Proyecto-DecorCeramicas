<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Decorcerámica ERP — Inventario</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=6">
<style>
.inv-wrap{background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.inv-table{width:100%}
.inv-th,.inv-tr{display:grid;grid-template-columns:44px 90px minmax(100px,1fr) 70px 80px 60px 60px 60px 60px 20px;align-items:center;gap:0}
.inv-th{background:var(--neutral-bg);font-size:9.5px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--line)}
.inv-th>span{padding:9px 6px}
.inv-tr{border-bottom:1px solid #F1F5F9;transition:.1s;font-size:12px}
.inv-tr:hover{background:#FAFBFC}
.inv-tr>div{padding:8px 6px;display:flex;align-items:center;gap:5px}
.inv-tr .td-img{width:44px;height:44px;flex-shrink:0;padding:0;overflow:hidden}
.inv-tr .td-sku{font-size:10.5px;color:var(--ph);font-weight:600;font-family:monospace}
.inv-tr .td-n{font-weight:600;color:var(--ink);font-size:12px}
.inv-tr .td-cat{font-size:9px;font-weight:600;color:var(--ph);background:var(--neutral-bg);padding:2px 6px;border-radius:4px;white-space:nowrap}
.inv-tr .td-det{font-size:9.5px;color:var(--mut);line-height:1.3}
.inv-tr .td-q{font-size:13px;font-weight:800;color:var(--ink)}
.inv-tr .td-q2{font-size:10.5px;color:var(--ph)}
.inv-tr .td-cost{font-size:11px;font-weight:600;color:var(--ink)}
.inv-tr .td-acts{display:flex;gap:3px;position:sticky;right:0;background:inherit;padding:6px!important}
.inv-tr .td-acts button{width:26px;height:26px;border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.12s}
.td-edit{background:var(--rojo-l);color:var(--rojo)}.td-edit:hover{background:var(--rojo);color:#fff}
.td-detail{background:var(--info-bg);color:var(--info-txt)}.td-detail:hover{background:var(--info-txt);color:#fff}
.inv-bar{height:3px;background:var(--neutral-bg);border-radius:2px;overflow:hidden;min-width:40px}
.inv-bar span{display:block;height:100%;border-radius:2px}
.inv-tag{font-size:9px;font-weight:600;background:var(--neutral-bg);padding:2px 6px;border-radius:4px;white-space:nowrap;color:var(--ph)}
.filter-tag{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;border:1.5px solid var(--line);background:var(--surface);cursor:pointer;font-size:12px;font-weight:600;color:var(--ink);transition:.12s}
.filter-tag:hover{border-color:var(--rojo);background:var(--rojo-l);color:var(--rojo)}
</style>
</head>
<body>
<div id="screen-app" class="screen active">
<div class="wrap">
<aside class="sidebar" id="sb">
<div class="sb-logo"><div class="sb-logo-ic"><i class="ri-building-2-line"></i></div><div class="sb-logo-t">Decorcerámica<small>ERP OPERACIÓN</small></div></div>
<div class="sb-scroll" id="sbMenu"></div>
<div class="sb-user"><div class="sb-av" id="sbAv"></div><div class="sb-ui"><div class="sb-un" id="sbNm"></div><div class="sb-ur" id="sbRl"></div></div><i class="ri-logout-circle-r-line sb-out" onclick="logout()"></i></div>
</aside>
<div class="sb-bd" id="sbBd" onclick="closeSb()"></div>
<main class="main">
<div class="topbar">
<div class="tb-l"><button class="m-tog" onclick="togSb()"><i class="ri-menu-line"></i></button><i id="tbIc" style="font-size:18px;color:var(--rojo)"></i><div><h2 id="tbTt"></h2><div class="tb-crumb" id="tbCr"></div></div></div>
<div class="tb-r"><div class="tb-btn"><i class="ri-notification-3-line"></i><span class="tb-badge" id="tbNot">0</span></div><div class="tb-prof" onclick="logout()"><div class="tb-av" id="tbAv"></div><span class="tb-n" id="tbNm"></span><i class="ri-logout-circle-r-line" style="color:var(--ph);font-size:14px"></i></div></div>
</div>
<div id="pg"></div>
</main>
</div>
</div>
<div class="mov" id="modal"><div class="mox"><div class="moh"><h3 id="mTit"></h3><span class="xb" onclick="closeMod()">&times;</span></div><div class="mob" id="mBod"></div><div class="mof" id="mFot"></div></div></div>
<div class="toast" id="toast"><i class="ri-checkbox-circle-fill"></i><span id="toastMsg"></span></div>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/helpers.js"></script>
<script src="js/operations.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
renderShell('inventario');
let selCat='Todos',editSku=null;

function renderInv(){
  const bg=DB.bodegas.find(b=>b.id===selBodega);
  const cats=[...new Set(DB.productos.map(p=>p.cat))];
  const filtered=selCat==='Todos'?DB.productos:DB.productos.filter(p=>p.cat===selCat);
  const bgName=DB.bodegas.find(b=>b.id===selBodega)?.n||selBodega;

  const agotados=filtered.filter(p=>stockBodega(selBodega,p.sku)===0);
  const bajoStock=filtered.filter(p=>{const s=stockBodega(selBodega,p.sku);return s>0&&s<100});
  const alarmHtml=(agotados.length||bajoStock.length)?'<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">'+
    (agotados.length?'<div style="display:flex;align-items:center;gap:7px;background:var(--danger-bg);border:1px solid var(--danger-bd);border-radius:8px;padding:7px 11px;cursor:pointer" onclick="toast(\'Agotados: '+agotados.map(p=>p.n).join(', ')+'\',\'warn\')"><span style="font-size:16px;color:var(--danger-txt)"><i class="ri-close-circle-line"></i></span><span style="font-size:16px;font-weight:800;color:var(--danger-txt)">'+agotados.length+'</span><span style="font-size:10px;font-weight:600;color:var(--danger-txt)">agotado'+(agotados.length>1?'s':'')+'</span></div>':'')+
    (bajoStock.length?'<div style="display:flex;align-items:center;gap:7px;background:var(--warn-bg);border:1px solid var(--warn-bd);border-radius:8px;padding:7px 11px;cursor:pointer" onclick="toast(\'Stock bajo: '+bajoStock.map(p=>p.n+' ('+fmt(stockBodega(selBodega,p.sku))+' '+p.u+')').join(', ')+'\',\'warn\')"><span style="font-size:16px;color:var(--warn-txt)"><i class="ri-alert-line"></i></span><span style="font-size:16px;font-weight:800;color:var(--warn-txt)">'+bajoStock.length+'</span><span style="font-size:10px;font-weight:600;color:var(--warn-txt)">stock bajo</span></div>':'')+
  '</div>':'';

  const totalStk=filtered.reduce((s,p)=>s+stockBodega(selBodega,p.sku),0);
  const convCount=filtered.filter(p=>p.caja).length;
  const totalVal=filtered.reduce((s,p)=>s+stockBodega(selBodega,p.sku)*(p.costo||0),0);
  const bgStocks=DB.bodegas.map(b=>{return{id:b.id,st:filtered.reduce((a,p)=>a+stockBodega(b.id,p.sku),0)}});
  const bgTotal=bgStocks.reduce((s,b)=>s+b.st,0);

  // Chart 1: Bar Chart for Stock by Warehouse
  const maxBgStock = bgTotal > 0 ? Math.max(...bgStocks.map(b => b.st)) : 0;
  const bgBars = bgStocks.map(b => {
    const pct = maxBgStock > 0 ? Math.round((b.st / maxBgStock) * 100) : 0;
    const bgInfo = DB.bodegas.find(x => x.id === b.id);
    return `
      <div style="margin-bottom: 5px">
        <div style="display:flex;justify-content:space-between;align-items:center;font-size:9.5px;margin-bottom:2px">
          <span style="font-weight:700;color:var(--txt)">${b.id} <span style="font-weight:400;color:var(--mut)">(${bgInfo.n.split(' - ')[1] || ''})</span></span>
          <span style="font-weight:700;color:var(--ink)">${fmt(b.st)}</span>
        </div>
        <div class="bar" style="height:5px;background:var(--neutral-bg);border-radius:3px;overflow:hidden">
          <span style="display:block;height:100%;border-radius:3px;background:var(--rojo);width:${pct}%;transition:width 0.3s ease;"></span>
        </div>
      </div>
    `;
  }).join('');

  // Chart 2: SVG Donut Chart for Categories
  const catCounts = cats.map(c => ({
    cat: c,
    cnt: DB.productos.filter(p => p.cat === c).length
  })).filter(c => c.cnt > 0)
     .sort((a, b) => b.cnt - a.cnt);

  const totalProdsCount = catCounts.reduce((s, c) => s + c.cnt, 0);

  let catSlices = [];
  if (catCounts.length > 0) {
    let topCats = [];
    let otherCount = 0;
    catCounts.forEach((c, idx) => {
      if (idx < 4) {
        topCats.push(c);
      } else {
        otherCount += c.cnt;
      }
    });
    if (otherCount > 0) {
      topCats.push({ cat: 'Otros', cnt: otherCount });
    }

    const catColors = ['var(--rojo)', '#F59E0B', '#10B981', '#3B82F6', '#8B5CF6'];
    catSlices = topCats.map((c, i) => ({
      label: c.cat,
      count: c.cnt,
      color: catColors[i % catColors.length]
    }));
  }

  let catDonutSvg = '';
  if (totalProdsCount === 0) {
    catDonutSvg = '<circle cx="50" cy="50" r="38" fill="transparent" stroke="var(--line)" stroke-width="10"/>';
  } else {
    const circ = 2 * Math.PI * 38;
    let accumulatedPercent = 0;
    catSlices.forEach(slice => {
      const pct = slice.count / totalProdsCount;
      const strokeLength = pct * circ;
      const offset = (accumulatedPercent / totalProdsCount) * circ;
      catDonutSvg += `<circle cx="50" cy="50" r="38" fill="transparent" stroke="${slice.color}" stroke-width="9" stroke-dasharray="${strokeLength} ${circ}" stroke-dashoffset="-${offset}" transform="rotate(-90 50 50)"/>`;
      accumulatedPercent += slice.count;
    });
  }

  const catLegendHtml = catSlices.map(s => {
    const pct = totalProdsCount ? Math.round((s.count / totalProdsCount) * 100) : 0;
    return `
      <div style="display:flex;align-items:center;justify-content:space-between;font-size:9.5px;margin-bottom:3.5px;gap:8px">
        <div style="display:flex;align-items:center;gap:4px;min-width:0">
          <div style="width:6px;height:6px;border-radius:50%;background:${s.color};flex-shrink:0"></div>
          <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;color:var(--txt)">${s.label}</span>
        </div>
        <span style="font-weight:700;color:var(--ink)">${pct}%</span>
      </div>
    `;
  }).join('');

  const summary='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px">'+
    '<div style="background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;border-radius:7px;background:var(--slate);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;flex-shrink:0"><i class="ri-box-3-line"></i></div><div><div style="font-size:16px;font-weight:800;color:var(--ink);line-height:1.1">'+filtered.length+'</div><div style="font-size:9px;color:var(--mut)">de '+DB.productos.length+' total</div></div></div>'+
    '<div style="background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;border-radius:7px;background:var(--info-txt);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;flex-shrink:0"><i class="ri-store-2-line"></i></div><div><div style="font-size:16px;font-weight:800;color:var(--ink);line-height:1.1">'+fmt(totalStk)+'</div><div style="font-size:9px;color:var(--mut)">stock en '+selBodega+'</div></div></div>'+
    '<div style="background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;border-radius:7px;background:var(--link);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;flex-shrink:0"><i class="ri-exchange-line"></i></div><div><div style="font-size:16px;font-weight:800;color:var(--ink);line-height:1.1">'+convCount+'</div><div style="font-size:9px;color:var(--mut)">conversiones</div></div></div>'+
    '<div style="background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;border-radius:7px;background:var(--success-txt);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;flex-shrink:0"><i class="ri-money-dollar-circle-line"></i></div><div><div style="font-size:16px;font-weight:800;color:var(--ink);line-height:1.1">'+money(totalVal)+'</div><div style="font-size:9px;color:var(--mut)">valor inventario</div></div></div>'+
  '</div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">'+
    '<div style="background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:10px 12px"><div style="font-size:8.5px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px"><i class="ri-store-2-line"></i> Ocupación por bodega (Unidades)</div>'+
      bgBars+
    '</div>'+
    '<div style="background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:10px 12px"><div style="font-size:8.5px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px"><i class="ri-grid-line"></i> Productos por categoría (Distribución)</div>'+
      `<div style="display:flex;align-items:center;gap:16px;padding:2px 0">
        <div style="position:relative;width:68px;height:68px;flex-shrink:0">
          <svg viewBox="0 0 100 100" width="68" height="68">
            ${catDonutSvg}
          </svg>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">
            <div style="font-size:11px;font-weight:800;color:var(--ink);line-height:1">${totalProdsCount}</div>
            <div style="font-size:6px;color:var(--mut);text-transform:uppercase;font-weight:700">SKUs</div>
          </div>
        </div>
        <div style="flex:1;min-width:0">
          ${catLegendHtml}
        </div>
      </div>`+
    '</div>'+
  '</div>';

  const filterTag='<span class="filter-tag" onclick="modalFiltros()"><i class="ri-store-2-line"></i> '+selBodega+' <span style="opacity:.6">· '+(selCat==='Todos'?'Todo':selCat)+'</span> <i class="ri-arrow-down-s-line"></i></span>';

  const rows=filtered.map(p=>{
    const stk=stockBodega(selBodega,p.sku);const tot=stockTotal(p.sku);
    const pct=tot>0?Math.round(stk/tot*100):0;
    const conv=p.caja?'<span style="display:block">~'+fmt(Math.round(stk/p.caja))+' '+p.cajaN+'</span><span style="color:var(--ph)">1 '+p.cajaN+' = '+p.caja+' '+p.u+'</span>':'<span style="color:var(--ph)">Sin conversión</span>';
    const barCol=stk===0?'var(--danger-txt)':stk<100?'var(--warn-txt)':'var(--success-txt)';
    const bar='<div class="inv-bar"><span style="width:'+pct+'%;background:'+barCol+'"></span></div>';
    const imgSrc='https://picsum.photos/seed/'+p.sku+'/44/44';
    const expItems='<div class="inv-exp"><span><i class="ri-price-tag-3-line"></i>'+money(p.costo||0)+'</span><span><i class="ri-exchange-line"></i>'+(p.caja?'1 '+p.cajaN+' = '+p.caja+' '+p.u:'Sin conv.')+'</span><span><i class="ri-stack-line"></i>'+p.cat+'</span><span><i class="ri-box-3-line"></i>'+fmt(Math.round(stk/(p.caja||1)))+' '+(p.cajaN||'—')+'</span></div>';
    return '<div class="inv-tr" onclick="this.classList.toggle(\'open\')"><div class="td-img"><img src="'+imgSrc+'" onerror="this.style.display=\'none\';this.parentNode.style.background=\'var(--rojo)\'" style="width:44px;height:44px;object-fit:cover;border-radius:0 6px 6px 0" loading="lazy"></div><div class="td-sku">'+p.sku+'</div><div style="flex-direction:column;align-items:flex-start;gap:1px"><span class="td-n">'+p.n+'</span>'+bar+'</div><div class="td-cat"><span class="inv-tag">'+p.cat+'</span></div><div class="td-det" style="flex-direction:column;align-items:flex-start;gap:1px">'+conv+'</div><div style="flex-direction:column;align-items:flex-start;gap:0"><span class="td-q">'+fmt(stk)+'</span><span style="font-size:9px;color:var(--mut)">'+p.u+'</span></div><div class="td-q2">'+fmt(Math.round(stk/(p.caja||1)))+' <span style="font-size:9px;color:var(--mut)">'+(p.cajaN||'—')+'</span></div><div class="td-cost" style="flex-direction:column;align-items:flex-start;gap:0"><span>'+money(p.costo||0)+'</span><span style="font-size:9px;color:var(--ph)">'+((p.precio&&p.costo)?' margen '+Math.round((1-p.costo/p.precio)*100)+'%':'')+'</span></div><div class="td-acts"><button class="td-edit" onclick="event.stopPropagation();modalEditarProducto(\''+p.sku+'\')" title="Editar"><i class="ri-pencil-line"></i></button><button class="td-detail" onclick="event.stopPropagation();verDetalleProducto(\''+p.sku+'\')" title="Detalle"><i class="ri-eye-line"></i></button></div><div class="td-chev" style="display:none"><i class="ri-arrow-down-s-line"></i></div><div class="td-expand" style="display:none">'+expItems+'</div></div>';
  }).join('');
  const remPend=DB.remisiones.filter(r=>r.estado==='en_proceso'||r.estado==='pendiente');
  const remHtml=remPend.length?'<div style="background:var(--surface);border:2px solid var(--rojo);border-radius:12px;padding:14px;margin-bottom:16px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--rojo)"><i class="ri-truck-line"></i> Remisiones por Despachar <span class="badge br" style="font-size:10px">'+remPend.length+'</span></div><a href="remisiones.html" class="btn btn-o btn-sm"><i class="ri-external-link-line"></i> Ver todas</a></div>'+
    remPend.map(r=>{
      const itemsHtml=r.items.slice(0,3).map(it=>'<span style="font-size:10.5px;display:flex;gap:4px"><span style="color:var(--mut)">'+it.n.split(' ').slice(0,2).join(' ')+'</span><b>'+fmt(it.cant)+' '+it.u+'</b></span>').join('');
      const extras=r.items.length>3?' <span style="font-size:10px;color:var(--mut)">+'+ (r.items.length-3) +' más</span>':'';
      const btn=r.estado==='pendiente'?
        '<button class="btn btn-blue btn-sm" onclick="procesarRemDesdeInv(\''+r.numero+'\')"><i class="ri-refresh-line"></i> Iniciar</button>':
        '<button class="btn btn-orange btn-sm" onclick="despacharRemDesdeInv(\''+r.numero+'\')"><i class="ri-truck-line"></i> Despachar</button>'+
        '<button class="btn btn-green btn-sm" onclick="entregarRemDesdeInv(\''+r.numero+'\')"><i class="ri-check-line"></i> Entregar</button>';
      return '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:8px;margin-bottom:6px;border-left:4px solid '+(r.estado==='pendiente'?'var(--warn-txt)':'var(--info-txt)')+'"><div style="min-width:0;flex:1"><div style="font-size:12px;font-weight:700;color:var(--ink)">'+r.numero+' <small style="font-weight:400;color:var(--mut)">OC: '+r.occRef+' | '+r.cliente+' | Bg: '+r.bodega+'</small></div><div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap">'+itemsHtml+extras+'</div></div><div style="display:flex;gap:4px;flex-shrink:0">'+btn+'</div></div>';
    }).join('')+'</div>':'';

  $('pg').innerHTML='<div class="page th-inv"><div class="hero"><div class="hero-ic"><i class="ri-archive-2-line"></i></div><h1>Inventario</h1><p>'+DB.productos.length+' productos · Gestión por unidad base con conversión a unidad secundaria de despacho</p><div class="hero-act"><button class="btn btn-light" onclick="renderInv()" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)"><i class="ri-refresh-line"></i> Actualizar</button><button class="btn btn-light" onclick="modalEditarProducto()" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)"><i class="ri-add-line"></i> Nuevo Producto</button><button class="btn" onclick="modalAjusteCategoria()" style="background:#fff;color:var(--rojo);border:2px solid var(--rojo);font-weight:800"><i class="ri-scales-line"></i> Ajustar inventario</button></div></div><div class="body">'+alarmHtml+remHtml+summary+'<div class="inv-top" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px">'+filterTag+'<span style="font-size:11px;color:var(--mut)">'+filtered.length+' producto'+(filtered.length!==1?'s':'')+'</span></div></div>'+(rows?'<div class="inv-wrap"><div class="inv-table"><div class="inv-th"><span>Foto</span><span>SKU</span><span>Producto</span><span class="td-cat">Categoría</span><span class="td-det">Conversión</span><span>Stock</span><span class="td-q2">Stock sec.</span><span class="td-cost">Costo</span><span>Acción</span><span class="td-chev"></span></div>'+rows+'</div></div>':'<div class="empty" style="padding:30px"><i class="ri-inbox-line"></i><h3>Sin productos</h3><p>No hay productos en esta categoría. Crea uno nuevo.</p></div>')+'</div></div>';
}
renderInv();

function modalFiltros(){

function modalEditarProducto(sku){
  const p=sku?DB.productos.find(x=>x.sku===sku):null;
  editSku=sku||null;
  const t=p?'<i class="ri-pencil-line"></i> Editar Producto':'<i class="ri-add-box-line"></i> Nuevo Producto';
  const cats=['Pisos','Azulejos','Revestimientos','Grifería','Adhesivos','Morteros','Herrería','Eléctricos','Pinturas','Sanitarios','Herramientas','Seguridad','Iluminación','Ventilación','Ferretería','General'];
  const catOpts=cats.map(c=>'<option value="'+c+'"'+(p&&p.cat===c?' selected':'')+'>'+c+'</option>').join('');
  const uOpts='<option value="m²"'+(p&&p.u==='m²'?' selected':'')+'>m² (metros cuadrados)</option><option value="lb"'+(p&&p.u==='lb'?' selected':'')+'>lb (libras)</option>';
  const cajaNOpts=['caja','pale','paquete','bulto','rollo','galón'].map(c=>'<option value="'+c+'"'+(p&&p.cajaN===c?' selected':'')+'>'+c.charAt(0).toUpperCase()+c.slice(1)+'</option>').join('');

  openMod(t,
    '<div style="background:var(--info-bg);border:1px solid var(--info-bd);border-radius:10px;padding:10px 13px;margin-bottom:14px;font-size:11.5px;color:var(--info-txt);display:flex;gap:8px"><i class="ri-information-line" style="margin-top:1px;flex-shrink:0"></i><span>Los campos mostrados son una <b>referencia demo</b>. Todos los datos son personalizables según las necesidades reales del inventario de Decorcerámica.</span></div>'+
    '<div class="ff"><label>Nombre del producto</label><input id="npNombre" value="'+(p?p.n:'')+'" placeholder="Ej: Piso Cerámico 45×45"></div>'+
    '<div class="ff2"><div class="ff"><label>SKU</label><input id="npSku" value="'+(p?p.sku:'')+'" placeholder="Ej: PC-4545-BE"></div><div class="ff"><label>Categoría</label><select id="npCat">'+catOpts+'</select></div></div>'+
    '<div class="ff2"><div class="ff"><label>Precio unitario ($)</label><input id="npPrecio" type="number" min="0" value="'+(p?p.precio:'')+'" placeholder="28500"></div><div class="ff"><label>Costo unitario ($)</label><input id="npCosto" type="number" min="0" value="'+(p?p.costo:'')+'" placeholder="18000"></div></div>'+
    '<div class="ff2"><div class="ff"><label>% Descuento máximo</label><input id="npDesc" type="number" min="0" max="100" value="'+(p?p.descuento_max:'')+'" placeholder="15"></div><div class="ff"><label>Unidad base</label><select id="npU">'+uOpts+'</select></div></div>'+
    '<div class="ff"><label>Grupo de Conversión</label><select id="npGrupo"><option value="">— Sin grupo —</option>'+DB.config.grupos_conversion.map(g=>'<option value="'+g.id+'" '+(p&&p.grupo_conversion_id===g.id?'selected':'')+'>'+g.nombre+' ('+g.unidades.map(u=>u.codigo).join(', ')+')</option>').join('')+'</select></div>'+
    '<div style="background:var(--rojo-l);border:1px solid var(--rojo);border-radius:10px;padding:14px;margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:var(--rojo);margin-bottom:8px;display:flex;align-items:center;gap:6px"><i class="ri-exchange-line"></i> Factor de conversión</div><p style="font-size:11.5px;color:var(--mut);margin-bottom:10px;line-height:1.5">Define la equivalencia entre la <b>unidad base</b> del inventario (m² o lb) y la <b>unidad secundaria</b> de despacho. Ej: si 1 caja = 1.44 m², ingresa <b>1.44</b> en el factor y selecciona <b>caja</b>.</p><div class="ff2"><div class="ff"><label>Factor (1 unidad secundaria = X base)</label><input id="npCaja" type="number" step="0.01" min="0" value="'+(p?p.caja:'')+'" placeholder="1.44"></div><div class="ff"><label>Unidad secundaria</label><select id="npCajaN"><option value="">— Sin conversión —</option>'+cajaNOpts+'</select></div></div></div>',
    '<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-sm" style="background:var(--rojo);color:#fff" onclick="'+fn+'"><i class="ri-check-line"></i> '+btnT+'</button>'
  );

function crearProducto(){
  const n=$('npNombre').value.trim();if(!n){toast('Ingresa el nombre del producto','warn');return}
  const sku=$('npSku').value.trim();if(!sku){toast('Ingresa el SKU','warn');return}
  if(DB.productos.find(p=>p.sku===sku)){toast('Ya existe un producto con ese SKU','warn');return}
  const cat=$('npCat').value;
  const precio=parseFloat($('npPrecio').value)||0;
  const costo=parseFloat($('npCosto').value)||0;
  const desc=parseInt($('npDesc').value)||0;
  const u=$('npU').value;
  const caja=parseFloat($('npCaja').value);
  const cajaN=$('npCajaN').value;
  const grupo=$('npGrupo').value;
  const colList=['#D9383A','#0369A1','#15803D','#B45309','#7C3AED','#2D3748','#0E7C66','#BE185D'];
  const icList=['ri-grid-line','ri-layout-grid-line','ri-stack-line','ri-drop-line','ri-paint-fill','ri-building-line','ri-flashlight-line','ri-palette-line'];
  const icIdx=DB.productos.length%icList.length;
  const prod={sku,n,ic:icList[icIdx],cat,precio,costo,descuento_max:desc,u,grad:'linear-gradient(135deg,'+colList[icIdx]+',#0A1929)'};
  if(caja>0&&cajaN)prod.caja=caja;prod.cajaN=cajaN||'caja';prod.cajaN=cajaN;
  if(grupo)prod.grupo_conversion_id=grupo;
  DB.productos.push(prod);
  Object.keys(DB.stock).forEach(bg=>{DB.stock[bg][sku]=0});
  closeMod();saveDB();renderInv();toast('Producto '+n+' creado con SKU '+sku,'ok');
}
function actualizarProducto(){
  const p=DB.productos.find(x=>x.sku===editSku);if(!p){toast('Error: producto no encontrado','err');return}
  const n=$('npNombre').value.trim();if(!n){toast('Ingresa el nombre','warn');return}
  const sku=$('npSku').value.trim();if(!sku){toast('Ingresa el SKU','warn');return}
  if(sku!==editSku&&DB.productos.find(x=>x.sku===sku)){toast('Ya existe otro producto con ese SKU','warn');return}
  const oldSku=editSku;p.sku=sku;p.n=n;p.cat=$('npCat').value;
  p.precio=parseFloat($('npPrecio').value)||0;p.costo=parseFloat($('npCosto').value)||0;
  p.descuento_max=parseInt($('npDesc').value)||0;p.u=$('npU').value;
  const caja=parseFloat($('npCaja').value);const cajaN=$('npCajaN').value;
  if(caja>0&&cajaN){p.caja=caja;p.cajaN=cajaN}else{delete p.caja;delete p.cajaN}
  const grupo=$('npGrupo').value;
  if(grupo)p.grupo_conversion_id=grupo;else delete p.grupo_conversion_id;
  if(sku!==oldSku){Object.keys(DB.stock).forEach(bg=>{const v=DB.stock[bg][oldSku];delete DB.stock[bg][oldSku];DB.stock[bg][sku]=v||0})}
  closeMod();saveDB();editSku=null;renderInv();toast('Producto '+n+' actualizado','ok');
}
function verDetalleProducto(sku){
  const p=DB.productos.find(x=>x.sku===sku);if(!p)return;
  const stkRows=DB.bodegas.map(b=>{
    const s=stockBodega(b.id,sku);const bar=s>0?(100*s/stockTotal(sku)):0;
    return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0"><div class="dot '+b.estado+'"></div><span style="flex:1;font-size:12px;font-weight:600">'+b.id+'</span><span style="font-size:13px;font-weight:800;width:60px;text-align:right">'+fmt(s)+'</span><span style="font-size:10px;color:var(--mut);width:30px">'+p.u+'</span><div class="inv-bar" style="flex:1"><span style="width:'+bar+'%;background:'+(s===0?'var(--danger-txt)':'var(--success-txt)')+'"></span></div></div>';
  }).join('');
  const convHtml=p.caja?'<div style="padding:8px 0;font-size:12px;color:var(--txt)"><span style="font-weight:600">Factor de conversión:</span> 1 '+p.cajaN+' = '+p.caja+' '+p.u+'</div>':'';
  const margen=(p.precio&&p.costo)?Math.round((1-p.costo/p.precio)*100):0;
  openMod('<i class="ri-eye-line"></i> '+p.n,
    '<div style="background:var(--neutral-bg);border-radius:10px;padding:12px 14px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px"><div><span style="color:var(--mut)">SKU</span><br><b>'+p.sku+'</b></div><div><span style="color:var(--mut)">Categoría</span><br><b>'+p.cat+'</b></div><div><span style="color:var(--mut)">Precio unitario</span><br><b>'+money(p.precio)+'</b></div><div><span style="color:var(--mut)">Costo unitario</span><br><b>'+money(p.costo)+'</b></div><div><span style="color:var(--mut)">Margen</span><br><b style="color:'+(margen>=20?'var(--success-txt)':'var(--warn-txt)')+'">'+margen+'%</b></div><div><span style="color:var(--mut)">Dto. máx.</span><br><b>'+p.descuento_max+'%</b></div></div>'+
    '<div style="font-size:12px;font-weight:700;color:var(--ink);margin-bottom:6px"><i class="ri-store-2-line"></i> Stock por bodega</div>'+stkRows+'<div style="margin-top:8px;padding:8px 0;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-size:13px"><span style="font-weight:700">Total</span><span style="font-weight:800">'+fmt(stockTotal(sku))+' '+p.u+'</span></div>'+convHtml,
    '<button class="btn btn-o btn-sm" onclick="closeMod()">Cerrar</button>'
  );
}
let acFilter='';

function renderAcPills(){
  return DB.bodegas.map(b=>'<span class="inv-pill '+(b.id===selBodega?'sel':'')+'" onclick="selBodega=\''+b.id+'\';renderAcRows()">'+b.id+'</span>').join('');
}
function renderAcRows(){
  const pils=$('acPills');
  if(pils)pils.innerHTML=renderAcPills();
  const prods=selCat==='Todos'?DB.productos:DB.productos.filter(p=>p.cat===selCat);
  const q=acFilter.toLowerCase();
  const filtered=q?prods.filter(p=>p.n.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q)):prods;
  if(!filtered.length){
    $('acBody').innerHTML='<div style="text-align:center;padding:30px;color:var(--mut);font-size:12px"><i class="ri-inbox-line" style="font-size:28px;display:block;margin-bottom:6px;opacity:.4"></i>No se encontraron productos con "'+q+'"</div>';
    return;
  }
  const bodega=selBodega;
  const rows=filtered.map((p,i)=>{
    const stk=stockBodega(bodega,p.sku);
    const sec=p.caja?Math.round(stk/p.caja):null;
    const secInp=p.caja?'<input id="acSec_'+i+'" type="number" min="0" value="'+sec+'" style="width:100%;padding:2px 4px;border:1.5px solid var(--line);border-radius:4px;font-size:11px;text-align:center;background:var(--bg);outline:none;box-sizing:border-box" oninput="syncBaseFromSec_('+i+','+p.caja+')" placeholder="'+p.cajaN+'">':'-';
    return '<div style="display:grid;grid-template-columns:1fr 55px 65px 60px 55px;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--line)">'+
      '<div style="min-width:0"><div style="font-size:11px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+p.n+'</div><div style="font-size:9px;color:var(--mut);font-family:monospace">'+p.sku+'</div></div>'+
      '<span style="font-size:11px;font-weight:700;color:var(--ink);text-align:right">'+fmt(stk)+' <span style="font-weight:400;color:var(--mut);font-size:9px">'+p.u+'</span></span>'+
      '<input id="acBase_'+i+'" type="number" min="0" value="'+stk+'" style="width:100%;padding:3px 5px;border:1.5px solid var(--line);border-radius:5px;font-size:12px;text-align:center;background:var(--bg);outline:none;box-sizing:border-box" oninput="syncSecFromBase_('+i+','+p.caja+')">'+
      secInp+
      '<span id="acDiff_'+i+'" style="font-size:11px;font-weight:800;text-align:right;color:var(--mut)">0</span></div>';
  }).join('');
  $('acBody').innerHTML=rows;
  const total=prods.length;
  const vis=filtered.length;
  document.querySelector('.ac-info').textContent=vis+' de '+total+' producto'+(total!==1?'s':'');
}

function modalAjusteCategoria(){
  acFilter='';
  const prods=selCat==='Todos'?DB.productos:DB.productos.filter(p=>p.cat===selCat);
  if(!prods.length){toast('No hay productos','warn');return}
  $('modal').querySelector('.mox').style.maxWidth='900px';
  openMod('<i class="ri-scales-line"></i> Ajustar Inventario',
    '<div style="background:var(--rojo-l);border:1px solid var(--rojo);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:11px;color:var(--rojo);display:flex;gap:8px;line-height:1.5"><i class="ri-information-line" style="font-size:15px;flex-shrink:0;margin-top:1px"></i><span>Ingresa el conteo físico real. El sistema calcula diferencias y registra movimientos. <b>Los campos en blanco se ignoran.</b></span></div>'+
    '<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">'+
      '<span style="font-size:9px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.4px">Bodega:</span><span id="acPills" style="display:flex;gap:5px;flex-wrap:wrap">'+renderAcPills()+'</span>'+
      '<span style="flex:1"></span>'+
      '<i class="ri-search-line" style="color:var(--ph);font-size:12px"></i>'+
      '<input type="text" placeholder="Buscar producto..." value="" style="width:180px;padding:5px 8px;border:1.5px solid var(--line);border-radius:6px;font-size:11px;outline:none;background:var(--bg)" oninput="acFilter=this.value;renderAcRows()">'+
      '<span class="ac-info" style="font-size:10px;color:var(--mut)"></span>'+
    '</div>'+
    '<div style="background:var(--neutral-bg);border-radius:6px;padding:4px 8px;margin-bottom:6px;display:grid;grid-template-columns:1fr 55px 65px 60px 55px;align-items:center;gap:6px;font-size:8.5px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.4px"><span style="text-align:left">Producto</span><span style="text-align:right">Actual</span><span style="text-align:center">Conteo</span><span style="text-align:center">Sec.</span><span style="text-align:right">Diff</span></div>'+
    '<div id="acBody" style="max-height:300px;overflow-y:auto"></div>'+
    '<div class="ff" style="margin-top:8px"><label>Observación</label><input id="acObs" placeholder="Ej: Conteo mensual mayo 2026"></div>',
    '<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-sm" style="background:var(--rojo);color:#fff" onclick="aplicarAjusteCategoria()"><i class="ri-check-line"></i> Aplicar ajustes</button>'
  );
  renderAcRows();
}
function syncSecFromBase_(i,factor){
  const v=parseFloat($('acBase_'+i).value);
  if(!isNaN(v)&&factor){$('acSec_'+i).value=Math.round(v/factor)}else if($('acSec_'+i))$('acSec_'+i).value=''
  upDiff_(i);
}
function syncBaseFromSec_(i,factor){
  const v=parseFloat($('acSec_'+i).value);
  if(!isNaN(v)&&factor){$('acBase_'+i).value=Math.round(v*factor)}else if($('acBase_'+i))$('acBase_'+i).value=''
  upDiff_(i);
}
function upDiff_(i){
  const prods=(selCat==='Todos'?DB.productos:DB.productos.filter(p=>p.cat===selCat)).filter(p=>{
    const q=acFilter.toLowerCase();return q?p.n.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q):true});
  const p=prods[i];if(!p)return;
  const actual=stockBodega(selBodega,p.sku);
  const v=parseFloat($('acBase_'+i).value);
  if(isNaN(v)){$('acDiff_'+i).textContent='—';return}
  const d=v-actual;
  $('acDiff_'+i).textContent=(d>=0?'+':'')+fmt(d)+' '+p.u;
  $('acDiff_'+i).style.color=d>0?'var(--success-txt)':d<0?'var(--danger-txt)':'var(--mut)';
}
function aplicarAjusteCategoria(){
  const prods=(selCat==='Todos'?DB.productos:DB.productos.filter(p=>p.cat===selCat)).filter(p=>{
    const q=acFilter.toLowerCase();return q?p.n.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q):true});
  const obs=$('acObs').value||'Conteo físico '+(selCat==='Todos'?'general':selCat);
  let applied=0;
  prods.forEach((p,i)=>{
    const v=parseInt($('acBase_'+i).value);
    if(isNaN(v)||v<0)return;
    const actual=stockBodega(selBodega,p.sku);
    const diff=v-actual;
    if(diff===0)return;
    if(!DB.stock[selBodega])DB.stock[selBodega]={};
    DB.stock[selBodega][p.sku]=v;
    const secDiff=p.caja?Math.round(v/p.caja)-Math.round(actual/p.caja):null;
    var notaStr=diff>0?' · Excedente +'+fmt(diff)+' '+p.u+(secDiff?' (+'+secDiff+' '+p.cajaN+')':''):' · Castigo '+fmt(Math.abs(diff))+' '+p.u+(secDiff?' ('+Math.abs(secDiff)+' '+p.cajaN+')':'');
    DB.movimientos.unshift({f:now(),sku:p.sku,n:p.n,tipo:'Ajuste',cant:Math.abs(diff),u:p.u,resp:currentUser.n,ref:'AJ-'+selCat,bodega:selBodega,est:'Completado',nota:obs+notaStr});
    applied++;
  });
  if(!applied){toast('No hay diferencias que ajustar','warn');return}
  DB.pedidos.filter(p=>p.estado==='resagado').forEach(p=>asignarStock(p.id));
  closeMod();saveDB();renderInv();toast(applied+' producto'+(applied>1?'s':'')+' ajustado'+(applied>1?'s':'')+' en '+selBodega,'ok');
}
function procesarRemDesdeInv(num){
  if(!confirm('¿Enviar remisión '+num+' a despacho? Se creará una orden de venta en Pedidos.'))return
  const r=DB.remisiones.find(x=>x.numero===num);
  if(!r)return;
  r.estado='en_proceso';
  r.pedidoId='PD-'+PD_SEQ++;
  const items=r.items.map(i=>({sku:i.sku,cant:i.cant,bodega:r.bodega,asig:i.cant,falt:0,entregado:0}));
  DB.pedidos.unshift({
    id:r.pedidoId,cliente:r.cliente+' (OC: '+r.occRef+')',fecha:r.fechaOrigen,
    estado:'pendiente',despPor:null,items,remisionOrigen:r.numero
  });
  saveDB();renderInv();toast('Remisión '+num+' enviada. Pedido '+r.pedidoId+' creado en Pedidos.','ok');
}
function despacharRemDesdeInv(num){
  if(!confirm('¿Despachar remisión '+num+'?'))return
  const r=DB.remisiones.find(x=>x.numero===num);
  if(!r)return;
  r.estado='despachada';
  saveDB();renderInv();toast('Remisión '+num+' despachada.','ok');
}
function entregarRemDesdeInv(num){
  if(!confirm('¿Marcar remisión '+num+' como entregada? Se generará la factura automáticamente.'))return
  const r=DB.remisiones.find(x=>x.numero===num);
  if(!r)return;
  r.estado='entregada';
  const subtotal=r.items.reduce((s,i)=>s+i.cant*(i.precioUnit||0),0);
  const iva=Math.round(subtotal*0.19);
  const total=subtotal+iva;
  const fvNum='FV-'+FV_SEQ++;
  DB.facturas_venta.unshift({
    numero:fvNum,fecha:now().split(' ')[0],
    clienteId:null,clienteNombre:r.cliente,
    remisionOrigen:num,occRef:r.occRef,
    subtotal,iva,total,estado:'emitida',archivoPdf:'facturas/'+fvNum+'.pdf'
  });
  saveDB();renderInv();toast('Remisión '+num+' entregada. Factura '+fvNum+' generada.','ok');
}
</script>
