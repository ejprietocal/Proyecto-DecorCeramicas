<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Decorcerámica ERP — Inventario</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="screen-app" class="screen active">
<div class="wrap">
<aside class="sidebar" id="sb">
<div class="sb-logo"><div class="sb-logo-ic"><i class="ri-building-2-line"></i></div><div class="sb-logo-t">Decorcerámica<small>ERP OPERACIÓN</small></div></div>
<div class="sb-scroll" id="sbMenu"></div>
<div class="sb-user"><div class="sb-av" id="sbAv"></div><div class="sb-ui"><div class="sb-un" id="sbNm"></div><div class="sb-ur" id="sbRl"></div></div><i class="ri-logout-circle-r-line sb-out" onclick="logout()"></i></div>
</aside>
<div class="sb-bd" id="sbBd" onclick="closeSb()"></div>
<main class="main">
<div class="topbar">
<div class="tb-l"><button class="m-tog" onclick="togSb()"><i class="ri-menu-line"></i></button><i id="tbIc" style="font-size:18px;color:var(--rojo)"></i><div><h2 id="tbTt"></h2><div class="tb-crumb" id="tbCr"></div></div></div>
<div class="tb-r"><div class="tb-btn"><i class="ri-notification-3-line"></i><span class="tb-badge" id="tbNot">0</span></div><div class="tb-prof" onclick="logout()"><div class="tb-av" id="tbAv"></div><span class="tb-n" id="tbNm"></span><i class="ri-logout-circle-r-line" style="color:#94A3B8;font-size:14px"></i></div></div>
</div>
<div id="pg"></div>
</main>
</div>
</div>
<div class="mov" id="modal"><div class="mox"><div class="moh"><h3 id="mTit"></h3><span class="xb" onclick="closeMod()">&times;</span></div><div class="mob" id="mBod"></div><div class="mof" id="mFot"></div></div></div>
<div class="toast" id="toast"><i class="ri-checkbox-circle-fill"></i><span id="toastMsg"></span></div>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/helpers.js"></script>
<script src="js/operations.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
renderShell('inventario');
let selCat='Todos';

function renderInv(){
  const bg=DB.bodegas.find(b=>b.id===selBodega);
  const bgPills=DB.bodegas.map(b=>'<div class="inv-pill '+(b.id===selBodega?'sel':'')+'" onclick="selBodega=\''+b.id+'\';selCat=\'Todos\';renderInv()"><div class="dot '+b.estado+'"></div>'+b.id+' <small>'+(b.n.split(' - ')[1]||'')+'</small></div>').join('');
  const cats=[...new Set(DB.productos.map(p=>p.cat))];
  const catPills='<div class="inv-cat '+(selCat==='Todos'?'sel':'')+'" onclick="selCat=\'Todos\';renderInv()">Todos</div>'+cats.map(c=>'<div class="inv-cat '+(c===selCat?'sel':'')+'" onclick="selCat=\''+c+'\';renderInv()">'+c+'</div>').join('');
  const filtered=selCat==='Todos'?DB.productos:DB.productos.filter(p=>p.cat===selCat);
  const pctColor=(stk,tot)=>{const r=tot>0?stk/tot:0;return r===0?'var(--danger-txt)':r<0.2?'var(--warn-txt)':'var(--success-txt)'};
  const estLabel=(stk,tot)=>{const r=tot>0?stk/tot:0;return r===0?'Agotado':r<0.2?'Bajo stock':'Disponible'};
  const bdCols=['#D9383A','#0369A1','#15803D','#B45309','#7C3AED','#2D3748','#0E7C66','#BE185D'];
  const cards=filtered.map((p,i)=>{
    const stk=stockBodega(selBodega,p.sku);const tot=stockTotal(p.sku);
    const pct=tot>0?Math.round(stk/tot*100):0;
    const bd=bdCols[i%bdCols.length];
    const conv=p.caja?'<div class="pc-conv"><i class="ri-exchange-line" style="font-size:8px"></i> ~'+fmt(Math.round(stk/p.caja))+' '+p.cajaN+' <span style="color:var(--mut)">· 1 '+p.cajaN+' = '+p.caja+' '+p.u+'</span></div>':'';
    return '<div class="pc" style="border-top-color:'+bd+'"><div class="pc-body"><div class="pc-row1"><div class="pc-n">'+p.n+'</div><div class="pc-cat">'+p.cat+'</div></div><div class="pc-sku">'+p.sku+'</div><div class="pc-row2"><span class="pc-stock">'+fmt(stk)+'</span><span class="pc-sl">'+p.u+'</span></div>'+conv+'<div class="pc-row3"><div class="pc-bar"><span style="width:'+pct+'%;background:'+pctColor(stk,tot)+'"></span></div><span class="pc-badge" style="background:var('+(stk===0?'--danger-bg':stk<100?'--warn-bg':'--success-bg')+');color:var('+(stk===0?'--danger-txt':stk<100?'--warn-txt':'--success-txt')+')">'+estLabel(stk,tot)+'</span><button class="pc-btn" onclick="modalAjusteInventario(\''+selBodega+'\',\''+p.sku+'\')"><i class="ri-scales-line"></i></button></div></div></div>';
  }).join('');
  const convCount=DB.productos.filter(p=>p.caja).length;
  $('pg').innerHTML='<div class="page th-inv"><div class="hero"><div class="hero-ic"><i class="ri-archive-2-line"></i></div><h1>Inventario</h1><p>Stock en tiempo real · '+DB.productos.length+' productos · '+convCount+' con factor de conversión</p><div class="hero-act"><button class="btn btn-light" onclick="renderInv()" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)"><i class="ri-refresh-line"></i> Actualizar</button><button class="btn btn-light" onclick="modalNuevoProducto()" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25)"><i class="ri-add-line"></i> Nuevo Producto</button></div></div><div class="body"><div class="inv-top"><div class="inv-pills">'+bgPills+'</div></div><div class="inv-cats">'+catPills+'</div>'+(cards?'<div class="inv-grid">'+cards+'</div>':'<div class="empty" style="padding:30px"><i class="ri-inbox-line"></i><h3>Sin productos</h3><p>No hay productos en esta categoría. Crea uno nuevo.</p></div>')+'</div></div>';
}
renderInv();

function modalNuevoProducto(){
  const cats=['Pisos','Azulejos','Revestimientos','Grifería','Adhesivos','Morteros','Herrería','Eléctricos','Pinturas','General'];
  const catOpts=cats.map(c=>'<option value="'+c+'">'+c+'</option>').join('');
  openMod('<i class="ri-add-box-line"></i> Nuevo Producto',
    '<div class="ff"><label>Nombre del producto</label><input id="npNombre" placeholder="Ej: Piso Cerámico 45×45"></div><div class="ff2"><div class="ff"><label>SKU</label><input id="npSku" placeholder="Ej: PC-4545-BE"></div><div class="ff"><label>Categoría</label><select id="npCat">'+catOpts+'</select></div></div><div class="ff2"><div class="ff"><label>Precio unitario ($)</label><input id="npPrecio" type="number" min="0" placeholder="28500"></div>    <div class="ff"><label>Unidad base</label><select id="npU"><option value="m²">m² (metros cuadrados)</option><option value="lb">lb (libras)</option></select></div></div><div style="background:var(--info-bg);border:1px solid var(--info-bd);border-radius:10px;padding:14px;margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:var(--info-txt);margin-bottom:8px;display:flex;align-items:center;gap:6px"><i class="ri-exchange-line"></i> Factor de conversión</div><p style="font-size:11.5px;color:var(--mut);margin-bottom:10px;line-height:1.5">Define la equivalencia entre la <b>unidad base</b> del inventario y la <b>unidad secundaria</b> de despacho. Ej: si 1 caja = 1.44 m², ingresa <b>1.44</b> en el factor y <b>caja</b> como unidad secundaria.</p><div class="ff2"><div class="ff"><label>Factor (1 unidad secundaria = X base)</label><input id="npCaja" type="number" step="0.01" min="0" placeholder="1.44"></div>    <div class="ff"><label>Nombre unidad secundaria</label><select id="npCajaN"><option value="">— Selecciona —</option><option value="caja">Caja</option><option value="pale">Pale / Palet</option><option value="paquete">Paquete</option><option value="bulto">Bulto</option><option value="rollo">Rollo</option><option value="galón">Galón</option></select></div></div></div>',
    '<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-sm" style="background:var(--rojo);color:#fff" onclick="crearProducto()"><i class="ri-check-line"></i> Crear producto</button>'
  );
}
function crearProducto(){
  const n=$('npNombre').value.trim();if(!n){toast('Ingresa el nombre del producto','warn');return}
  const sku=$('npSku').value.trim();if(!sku){toast('Ingresa el SKU','warn');return}
  if(DB.productos.find(p=>p.sku===sku)){toast('Ya existe un producto con ese SKU','warn');return}
  const cat=$('npCat').value;
  const precio=parseFloat($('npPrecio').value)||0;
  const u=$('npU').value;
  const caja=parseFloat($('npCaja').value);
  const cajaN=$('npCajaN').value.trim();
  const colList=['#D9383A','#0369A1','#15803D','#B45309','#7C3AED','#2D3748','#0E7C66','#BE185D'];
  const icList=['ri-grid-line','ri-layout-grid-line','ri-stack-line','ri-drop-line','ri-paint-fill','ri-building-line','ri-flashlight-line','ri-palette-line'];
  const icIdx=DB.productos.length%icList.length;
  const prod={sku,n:sku+'-'+n,ic:icList[icIdx],cat,precio,u,grad:'linear-gradient(135deg,'+colList[icIdx]+',#0A1929)'};
  if(caja>0&&cajaN)prod.caja=caja;prod.cajaN=cajaN||'caja';
  prod.n=n;
  DB.productos.push(prod);
  Object.keys(DB.stock).forEach(bg=>{DB.stock[bg][sku]=0});
  closeMod();saveDB();renderInv();toast('Producto '+n+' creado con SKU '+sku,'ok');
}
</script>
</body>
</html>
