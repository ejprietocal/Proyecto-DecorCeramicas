<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Decorcerámica ERP — Pedidos de Venta</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css?v=7">
<style>
.p-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
.p-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.p-bar-item{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
.p-bar-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0}
.p-bar-n{font-size:18px;font-weight:800;color:var(--ink);line-height:1.1}
.p-bar-l{font-size:10px;color:var(--mut);font-weight:500}
.p-search{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.p-search input{flex:1;min-width:160px;padding:7px 10px 7px 28px;border:1.5px solid var(--line);border-radius:7px;font-size:12.5px;outline:none;background:var(--bg);color:var(--txt)}
.p-search input:focus{border-color:var(--link)}
.p-pills{display:flex;gap:4px;flex-wrap:wrap}
.p-pill{padding:5px 11px;border-radius:20px;border:1.5px solid var(--line);background:var(--surface);cursor:pointer;font-size:11px;font-weight:600;color:var(--mut);transition:.12s;white-space:nowrap;display:flex;align-items:center;gap:4px}
.p-pill:hover{border-color:var(--line-m);background:var(--bg)}
.p-pill.sel{background:var(--rojo-l);border-color:var(--rojo);color:var(--rojo)}
.p-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;transition:.15s;border-left:4px solid}
.p-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.06)}
.p-card.st-pendiente{border-left-color:var(--mut)}
.p-card.st-asignado{border-left-color:var(--link)}
.p-card.st-parcial_asignado{border-left-color:var(--info-txt)}
.p-card.st-resagado{border-left-color:var(--warn-txt)}
.p-card.st-parcial_resagado{border-left-color:var(--warn-txt)}
.p-card.st-despachado{border-left-color:var(--success-txt)}
.p-card-h{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--line);background:var(--neutral-bg)}
.p-card-h-l{flex:1}
.p-card-id{font-size:14px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:6px}
.p-card-id small{font-size:10px;font-weight:500;color:var(--mut)}
.p-card-cl{font-size:11px;color:var(--mut);margin-top:2px;display:flex;align-items:center;gap:4px}
.p-pie{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.p-pie::after{content:'';width:24px;height:24px;background:var(--surface);border-radius:50%;position:absolute;z-index:1}
.p-pie-val{position:relative;z-index:2;font-size:9px;font-weight:800;color:var(--ink)}
.p-card-b{padding:10px 16px}
.p-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;background:var(--bg);margin-bottom:4px}
.p-item:last-child{margin-bottom:0}
.p-item-ic{font-size:14px;flex-shrink:0;width:16px;text-align:center}
.p-item-info{flex:1;min-width:0}
.p-item-n{font-size:12px;font-weight:600;color:var(--ink);line-height:1.2}
.p-item-sku{font-size:10px;color:var(--mut);font-family:monospace}
.p-item-q{font-size:12px;font-weight:700;color:var(--ink);text-align:right;white-space:nowrap}
.p-item-q small{font-weight:400;color:var(--mut);font-size:10px;display:block}
.p-item-badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.p-card-f{padding:10px 16px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.p-card-f .badge{font-size:10px;padding:3px 8px}
.p-card-f .btn{padding:5px 10px;font-size:10.5px}
@media(max-width:860px){.p-bar{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="screen-app" class="screen active">
<div class="wrap">
<aside class="sidebar" id="sb">
<div class="sb-logo"><div class="sb-logo-ic"><i class="ri-building-2-line"></i></div><div class="sb-logo-t">Decorcerámica<small>ERP OPERACIÓN</small></div></div>
<div class="sb-scroll" id="sbMenu"></div>
<div class="sb-user"><div class="sb-av" id="sbAv"></div><div class="sb-ui"><div class="sb-un" id="sbNm"></div><div class="sb-ur" id="sbRl"></div></div><i class="ri-logout-circle-r-line sb-out" onclick="logout()"></i></div>
</aside>
<div class="sb-bd" id="sbBd" onclick="closeSb()"></div>
<main class="main">
<div class="topbar">
<div class="tb-l"><button class="m-tog" onclick="togSb()"><i class="ri-menu-line"></i></button><i id="tbIc" style="font-size:18px;color:var(--rojo)"></i><div><h2 id="tbTt"></h2><div class="tb-crumb" id="tbCr"></div></div></div>
<div class="tb-r"><div class="tb-btn"><i class="ri-notification-3-line"></i><span class="tb-badge" id="tbNot">0</span></div><div class="tb-prof" onclick="logout()"><div class="tb-av" id="tbAv"></div><span class="tb-n" id="tbNm"></span><i class="ri-logout-circle-r-line" style="color:var(--ph);font-size:14px"></i></div></div>
</div>
<div id="pg"></div>
</main>
</div>
</div>
<div class="mov" id="modal"><div class="mox"><div class="moh"><h3 id="mTit"></h3><span class="xb" onclick="closeMod()">&times;</span></div><div class="mob" id="mBod"></div><div class="mof" id="mFot"></div></div></div>
<div class="toast" id="toast"><i class="ri-checkbox-circle-fill"></i><span id="toastMsg"></span></div>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/helpers.js"></script>
<script src="js/operations.js"></script>
<script src="js/draft.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script>
renderShell('pedidos');

let filterStatus = 'Todos';
let searchQuery = '';

function renderPedidosScreen(){
  const numPend = DB.pedidos.filter(p=>p.estado==='pendiente').length;
  const numAsig = DB.pedidos.filter(p=>p.estado==='asignado'||p.estado==='parcial_asignado').length;
  const numParcial = DB.pedidos.filter(p=>p.estado==='parcial_despachado').length;
  const numRes = DB.pedidos.filter(p=>p.estado==='resagado'||p.estado==='parcial_resagado').length;
  const numDesp = DB.pedidos.filter(p=>p.estado==='despachado').length;

  const barIcs=['ri-time-line','ri-check-double-line','ri-archive-stack-line','ri-alert-line','ri-checkbox-circle-line'];
  const barCls=['#64748B','#3B82F6','#EA580C','#B45309','#15803D'];
  const barLbs=['Pendientes','Asignados','Despacho parcial','Rezagos','Entregados'];
  const barVals=[numPend,numAsig,numParcial,numRes,numDesp];
  const headerStats='<div class="p-bar" style="grid-template-columns:repeat(5,1fr)">'+[0,1,2,3,4].map(i=>'<div class="p-bar-item"><div class="p-bar-ic" style="background:'+barCls[i]+'"><i class="'+barIcs[i]+'"></i></div><div><div class="p-bar-n">'+barVals[i]+'</div><div class="p-bar-l">'+barLbs[i]+'</div></div></div>').join('')+'</div>';

  const searchAndFilter='<div class="p-search"><i class="ri-search-line" style="color:var(--ph);font-size:14px"></i><input type="text" id="pedSearch" placeholder="Buscar por cliente o pedido..." oninput="updateSearch(this.value)" value="'+searchQuery+'"><div class="p-pills" id="filterStatusPills">'+['Todos','Pendiente','Asignado','Parcial','Rezago','Despachado'].map(s=>renderFilterPill(s,s==='Todos'?DB.pedidos.length:s==='Pendiente'?numPend:s==='Asignado'?numAsig:s==='Parcial'?numParcial:s==='Rezago'?numRes:numDesp)).join('')+'</div></div>';

  $('pg').innerHTML = `
    <div class="page th-pedidos">
      <div class="hero">
        <h1>Pedidos de Venta</h1>
        <p>Gestión de pedidos de venta. El sistema verifica stock, asigna bodega óptima y controla despachos.</p>
        <div class="hero-ic"><i class="ri-send-plane-line"></i></div>
        <div class="hero-act">
          <button class="btn btn-light" onclick="modalNuevoPedido()"><i class="ri-add-line"></i> Nuevo Pedido</button>
          <button class="btn btn-light" onclick="simularLlegadaPedido()" style="background:#fff;color:var(--rojo);border:1px solid var(--rojo);font-weight:800"><i class="ri-flashlight-line"></i> Simular Llegada</button>
        </div>
      </div>
      <div class="body">
        ${headerStats}
        ${searchAndFilter}
        <div id="ticketsContainer" class="p-grid"></div>
      </div>
    </div>
  `;
  renderTickets();
}

function renderFilterPill(status, count){
  const isSel = filterStatus === status ? 'sel' : '';
  return '<span class="p-pill '+(isSel||'')+'" onclick="setFilterStatus(\''+status+'\')">'+status+' <span style="font-weight:400;opacity:.7">('+count+')</span></span>';
}

function setFilterStatus(status){
  filterStatus = status;
  renderPedidosScreen();
}

function updateSearch(val){
  searchQuery = val.trim().toLowerCase();
  renderTickets();
}

function renderTickets(){
  let filtered = DB.pedidos;
  
  if (filterStatus !== 'Todos') {
    if (filterStatus === 'Pendiente') {
      filtered = filtered.filter(p=>p.estado==='pendiente');
    } else if (filterStatus === 'Asignado') {
      filtered = filtered.filter(p=>p.estado==='asignado'||p.estado==='parcial_asignado');
    } else if (filterStatus === 'Parcial') {
      filtered = filtered.filter(p=>p.estado==='parcial_despachado');
    } else if (filterStatus === 'Rezago') {
      filtered = filtered.filter(p=>p.estado==='resagado'||p.estado==='parcial_resagado');
    } else if (filterStatus === 'Despachado') {
      filtered = filtered.filter(p=>p.estado==='despachado');
    }
  }

  if (searchQuery) {
    filtered = filtered.filter(p => p.id.toLowerCase().includes(searchQuery) || clienteNombre(p).toLowerCase().includes(searchQuery));
  }

  const html = filtered.map(pd=>{
    const totalCant = pd.items.reduce((s, it) => s + it.cant, 0);
    const totalEntregado = pd.items.reduce((s, it) => s + (it.entregado || 0), 0);
    const totalPend = totalCant - totalEntregado;
    const pct = totalCant > 0 ? Math.round((totalEntregado / totalCant) * 100) : 0;
    const cliId = pd.clienteId;
    const cliLink = cliId?'<a href="cliente.html?id='+cliId+'" style="color:var(--link);text-decoration:none" title="Ver 360°"><i class="ri-user-line"></i>'+clienteNombre(pd)+' <i class="ri-external-link-line" style="font-size:10px"></i></a>':'<span><i class="ri-user-line"></i>'+pd.cliente+'</span>';
    const barColor = pct===100?'var(--success-txt)':pct>0?'var(--warn-txt)':'var(--info-txt)';

    let pieChartStyle = '';
    if (pct === 100) {
      pieChartStyle = 'background: var(--success-txt);';
    } else if (pct === 0) {
      pieChartStyle = 'background: #e2e8f0;';
    } else {
      pieChartStyle = `background: conic-gradient(var(--success-txt) 0% ${pct}%, #e2e8f0 ${pct}% 100%);`;
    }

    const itemsH = pd.items.map(it=>{
      const pr = getProd(it.sku) || {n:it.sku, u:'unid', ic:'ri-grid-line'};
      const entregado = it.entregado || 0;
      const asig = it.asig || 0;
      const falt = it.falt || 0;

      let checkIcon = '';
      if (entregado === it.cant) {
        checkIcon = '<i class="ri-checkbox-circle-fill" style="color:var(--success-txt)"></i>';
      } else if (entregado > 0) {
        checkIcon = '<i class="ri-time-fill" style="color:var(--link)"></i>';
      } else if (pd.estado === 'pendiente') {
        checkIcon = '<i class="ri-question-line" style="color:var(--ph)"></i>';
      } else {
        checkIcon = '<i class="ri-checkbox-blank-circle-line" style="color:var(--mut)"></i>';
      }

      let allocHtml = '';
      if (entregado < it.cant) {
        if (asig > 0) {
          allocHtml += '<span class="badge bb" style="font-size:8px;padding:1px 4px"><i class="ri-store-2-line"></i> Listo: '+fmt(asig)+' en '+it.bodega+'</span>';
        }
        if (falt > 0) {
          allocHtml += '<span class="badge br" style="font-size:8px;padding:1px 4px"><i class="ri-alert-line"></i> Falta: '+fmt(falt)+'</span>';
        }
      }

      return '<div class="p-item"><div class="p-item-ic">'+checkIcon+'</div><div class="p-item-info"><div class="p-item-n">'+pr.n+'</div><div class="p-item-sku">'+it.sku+'</div>'+(allocHtml?'<div class="p-item-badges">'+allocHtml+'</div>':'')+'</div><div class="p-item-q">'+fmt(it.cant)+' '+pr.u+'<small>Recibido: '+fmt(entregado)+'</small></div></div>';
    }).join('');

    let acciones = '';
    const hasAssigned = pd.items.some(it => it.asig > 0);
    const hasFaltante = pd.items.some(it => it.falt > 0);

    if (pd.estado === 'despachado') {
      acciones = '<span style="font-size:10px;font-weight:700;color:var(--success-txt);display:flex;align-items:center;gap:3px"><i class="ri-checkbox-circle-line"></i> Despachado por '+(pd.despPor||'—')+'</span>';
    } else {
      let bActions = [];
      if (hasAssigned) {
        bActions.push('<button class="btn btn-green btn-sm" onclick="modalDespacharPedido(\''+pd.id+'\')"><i class="ri-send-plane-line"></i> Despachar</button>');
      }
      if (hasFaltante) {
        bActions.push('<button class="btn btn-orange btn-sm" onclick="solicitarTransferenciaAutomatica(\''+pd.id+'\')" title="Trasladar stock de otra bodega"><i class="ri-arrow-left-right-line"></i> Trasladar</button>');
      }
      bActions.push('<button class="btn btn-o btn-sm" onclick="revisarStockPedido(\''+pd.id+'\')" title="Re-evaluar"><i class="ri-refresh-line"></i></button>');
      acciones = bActions.join(' ');
    }

    const pendAlert = (pd.estado==='parcial_despachado'||pd.estado==='parcial_asignado'||pd.estado==='parcial_resagado')&&totalPend>0
      ? '<div class="pd-pending-alert"><i class="ri-archive-stack-line"></i> Cliente debe retirar '+fmt(totalPend)+' unid. pendientes</div>'
      : '';
    const progress = '<div class="pd-progress"><div class="bar"><span style="width:'+pct+'%;background:'+barColor+'"></span></div><span class="pd-progress-l">'+fmt(totalEntregado)+' / '+fmt(totalCant)+' ('+pct+'%)</span></div>';
    const creadoMeta = pd.creadoPor?'<div style="font-size:10px;color:var(--mut);margin-top:4px;display:flex;align-items:center;gap:4px"><i class="ri-user-add-line"></i> Creado por '+pd.creadoPor+'</div>':'';
    return '<div class="p-card st-'+pd.estado+'"><div class="p-card-h"><div class="p-card-h-l"><div class="p-card-id">'+pd.id+' <small>'+pd.fecha+'</small></div><div class="p-card-cl">'+cliLink+'</div>'+creadoMeta+progress+pendAlert+'</div><div class="p-pie" style="'+pieChartStyle+'"><div class="p-pie-val">'+pct+'%</div></div></div><div class="p-card-b">'+itemsH+'</div><div class="p-card-f"><span class="badge '+pedEstBadge(pd.estado)+'"><i class="'+pedEstIcon(pd.estado)+'"></i> '+pedEstLabel(pd.estado)+'</span>'+acciones+'</div></div>';
  }).join('');

  $('ticketsContainer').innerHTML = html || '<div class="empty" style="grid-column: 1 / -1; padding:30px"><i class="ri-send-plane-line"></i><h3>Sin pedidos</h3><p>No se encontraron pedidos con el filtro actual.</p></div>';
}

renderPedidosScreen();

function modalNuevoPedido(){
  draft={items:[{sku:'',cant:1}]};
  openMod('<i class="ri-send-plane-line"></i> Nuevo Pedido de Venta',
    '<div class="note"><i class="ri-information-line"></i> El sistema buscará stock disponible y asignará la bodega óptima automáticamente al crear el pedido.</div><div class="ff">'+clienteAutocompleteHtml('Cliente')+'</div><div class="ff"><label>Productos del pedido</label><div id="draftLines"></div><button class="add-line" onclick="addLine()"><i class="ri-add-line"></i> Agregar producto</button></div>',
    '<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button><button class="btn btn-blue btn-sm" onclick="crearPedido()"><i class="ri-check-line"></i> Crear pedido</button>'
  );
  renderLines();
}

function crearPedido(){
  const cl=$('dCliente').value.trim();
  const cliIdEl=$('dClienteId');
  let clienteId=cliIdEl?cliIdEl.value:null;
  if(!cl){toast('Selecciona o ingresa el nombre del cliente','warn');return}
  if(!clienteId){const m=findClienteByNombre(cl);if(m)clienteId=m.id;}
  if(!draft.items.length||!draft.items[0].sku){toast('Agrega al menos un producto','warn');return}
  const id='PD-'+PD_SEQ++;
  const items=draft.items.filter(i=>i.sku).map(i=>({sku:i.sku,cant:i.cant,bodega:null,asig:0,falt:0,entregado:0}));
  DB.pedidos.unshift({id,clienteId,cliente:cl,fecha:now().split(' ')[0],creadoPor:currentUser.n,creadoEn:now(),estado:'pendiente',despPor:null,occRef:null,cotizacionRef:null,items});
  asignarStock(id);
  if(typeof logEvent==='function')logEvent('pedidos','crear','pedido',id,'Pedido '+id+' creado para '+cl);
  closeMod();
  saveDB();
  toast(id+' creado en estado: '+pedEstLabel(DB.pedidos[0].estado),'ok');
  setTimeout(function(){window.location.reload()},600);
}

function simularLlegadaPedido(){
  const clientes = ["Constructora Ipiales", "Remodelaciones Sur", "Hogar & Diseño", "Cerámicas del Norte", "Ferretería Central", "Consorcio Vial Nariño", "Pisos Ipiales Ltda"];
  const cliente = clientes[Math.floor(Math.random() * clientes.length)];
  const numItems = Math.floor(Math.random() * 3) + 1; // 1 to 3 items
  const items = [];
  
  const availableProds = [...DB.productos];
  for(let i=0; i<numItems; i++){
    if(availableProds.length === 0) break;
    const idx = Math.floor(Math.random() * availableProds.length);
    const prod = availableProds.splice(idx, 1)[0];
    
    let cant = 10;
    if (prod.u === 'm²') {
      cant = (Math.floor(Math.random() * 6) + 1) * 100; // 100 a 600
    } else if (prod.u === 'sacos') {
      cant = (Math.floor(Math.random() * 4) + 1) * 10;  // 10 a 40
    } else {
      cant = Math.floor(Math.random() * 15) + 5;        // 5 a 20
    }
    
    items.push({
      sku: prod.sku,
      cant: cant,
      bodega: null,
      asig: 0,
      falt: 0,
      entregado: 0
    });
  }
  
  const id = 'PD-' + PD_SEQ++;
  DB.pedidos.unshift({
    id,
    cliente,
    fecha: now().split(' ')[0],
    estado: 'pendiente',
    despPor: null,
    items
  });
  
  asignarStock(id);
  saveDB();
  toast('Simulación: Nuevo pedido ' + id + ' recibido de ' + cliente, 'ok');
  setTimeout(function(){window.location.reload()},800);
}

function modalDespacharPedido(pdId){
  const pd = DB.pedidos.find(p=>p.id===pdId);
  if(!pd) return;
  
  const rows = pd.items.map((it, idx) => {
    if (it.entregado === it.cant) {
      return `
        <div style="padding:8px 0; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center">
          <div>
            <div style="font-weight:600; font-size:12px; color:var(--mut)">${getProd(it.sku)?.n || it.sku}</div>
            <div style="font-size:10.5px; color:var(--success-txt)"><i class="ri-checkbox-circle-line"></i> Totalmente entregado</div>
          </div>
          <span style="font-weight:600; font-size:12px; color:var(--mut)">${fmt(it.cant)} / ${fmt(it.cant)}</span>
        </div>
      `;
    }
    
    const maxDesp = it.asig;
    const pr = getProd(it.sku) || {u:'unid'};
    const stockLoc = stockBodega(it.bodega, it.sku);
    
    return `
      <div style="padding:8px 0; border-bottom:1px solid var(--line)">
        <div style="display:flex; justify-content:space-between; align-items:flex-start">
          <div>
            <div style="font-weight:700; font-size:12px; color:var(--ink)">${pr.n} <small style="font-family:monospace; color:var(--mut)">(${it.sku})</small></div>
            <div style="font-size:10.5px; color:var(--mut); margin-top:2px">
              Asignado en <b style="color:var(--ink)">${it.bodega}</b>: ${fmt(it.asig)} ${pr.u} (Stock físico: ${fmt(stockLoc)})
            </div>
          </div>
          <div style="text-align:right">
            <span style="font-size:10.5px; color:var(--mut); display:block">Entregado: ${fmt(it.entregado || 0)}/${fmt(it.cant)}</span>
          </div>
        </div>
        <div style="display:flex; align-items:center; justify-content:flex-end; gap:6px; margin-top:6px">
          <label style="font-size:10.5px; font-weight:700; color:var(--slate)">Despachar ahora:</label>
          <input type="number" id="despCant_${idx}" value="${maxDesp}" min="0" max="${maxDesp}" style="width:70px; padding:3px 5px; border:1.5px solid var(--line); border-radius:5px; font-size:11.5px; text-align:center">
          <span style="font-size:10.5px; color:var(--mut); width:28px">${pr.u}</span>
        </div>
      </div>
    `;
  }).join('');

  const tieneRemision = pd && pd.remisionOrigen ? true : false;
  const checkHtml = tieneRemision ? `
    <div style="margin-top:10px;padding:10px 14px;background:var(--info-bg);border:1px solid var(--info-bd);border-radius:8px;display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="chkFacturarCompleto" style="width:16px;height:16px;accent-color:var(--rojo);flex-shrink:0">
      <label for="chkFacturarCompleto" style="font-size:11.5px;font-weight:600;cursor:pointer;color:var(--ink)">Facturar completo (generar factura por el total del pedido aunque el despacho sea parcial)</label>
    </div>` : '';
  openMod(`<i class="ri-send-plane-line"></i> Gestionar Despacho — ${pdId}`,
    `<div class="note"><i class="ri-information-line"></i> Confirma las cantidades que saldrán físicamente de bodega en este despacho. Se restarán del stock de la bodega asignada.</div>
     <div style="max-height:260px; overflow-y:auto; padding-right:4px">${rows}</div>${checkHtml}`,
    `<button class="btn btn-o btn-sm" onclick="closeMod()">Cancelar</button>
     <button class="btn btn-green btn-sm" onclick="confirmarDespachoPedidoParcial('${pdId}')"><i class="ri-check-line"></i> Confirmar Despacho</button>`
  );
}

function confirmarDespachoPedidoParcial(pdId){
  const pd = DB.pedidos.find(p=>p.id===pdId);
  if(!pd) return;
  
  let totalDispatched = 0;
  
  for(let idx=0; idx<pd.items.length; idx++){
    const it = pd.items[idx];
    if ((it.entregado || 0) === it.cant) continue;
    
    const el = $(`despCant_${idx}`);
    if (!el) continue;
    
    const v = parseInt(el.value);
    if (isNaN(v) || v < 0 || v > it.asig) {
      toast('Ingresa una cantidad válida a despachar (entre 0 y ' + it.asig + ')', 'warn');
      return;
    }
    
    if (v > 0) {
      // Deduct stock from assigned warehouse
      if (!DB.stock[it.bodega]) DB.stock[it.bodega] = {};
      DB.stock[it.bodega][it.sku] = (DB.stock[it.bodega][it.sku] || 0) - v;
      if (DB.stock[it.bodega][it.sku] < 0) DB.stock[it.bodega][it.sku] = 0;
      
      // Update delivered
      if (it.entregado === undefined) it.entregado = 0;
      it.entregado += v;
      
      // Register movement
      const pr = getProd(it.sku) || {n:it.sku, u:'unid'};
      DB.movimientos.unshift({
        f: now(),
        sku: it.sku,
        n: pr.n,
        tipo: 'Salida',
        cant: v,
        u: pr.u || 'unid',
        resp: currentUser.n,
        ref: pd.id,
        bodega: it.bodega,
        est: 'Completado'
      });
      
      totalDispatched += v;
    }
  }
  
  if (totalDispatched === 0) {
    toast('No seleccionaste cantidades para despachar', 'warn');
    return;
  }
  
  // Reassign remaining
  asignarStock(pd.id);
  if (pd.estado === 'despachado') {
    pd.despPor = currentUser.n;
  }
  // Crear reservas para items con saldo pendiente (entrega parcial)
  if(pd.clienteId&&(pd.estado==='parcial_despachado'||pd.estado==='parcial_resagado')){
    pd.items.forEach(it=>{
      const pendiente=(it.cant||0)-(it.entregado||0);
      if(pendiente<=0)return;
      const yaR=(DB.reservas_cliente||[]).some(r=>r.pedidoRef===pd.id&&r.sku===it.sku&&r.estado!=='completado');
      if(yaR)return;
      crearReservaCliente(pd.clienteId,clienteNombre(pd),it.sku,pendiente,it.bodega||'BGA',pd.id);
    });
  }
  if(typeof logEvent==='function'){
    const accion=pd.estado==='despachado'?'despacho_total':'despacho_parcial';
    logEvent('pedidos',accion,'pedido',pd.id,'Despacho '+(accion==='despacho_total'?'total':'parcial')+' de '+pd.id+' ('+totalDispatched+' unid.)');
  }

  closeMod();
  // Determinar si se debe generar factura (una sola vez)
  const facturaExistente = DB.facturas_venta.find(f=>f.remisionOrigen===pd.remisionOrigen);
  if(!facturaExistente && pd.remisionOrigen){
    const facturarCompleto = document.getElementById('chkFacturarCompleto')?.checked || false;
    const entregaTotal = pd.items.every(it => (it.entregado||0) >= it.cant);
    if(entregaTotal || facturarCompleto){
      const rm=DB.remisiones.find(r=>r.numero===pd.remisionOrigen);
      if(rm){
        rm.estado='despachada';
        const subtotal=rm.items.reduce((s,i)=>s+i.cant*(i.precioUnit||0),0);
        const iva=Math.round(subtotal*0.19);
        const total=subtotal+iva;
        const fvNum='FV-'+FV_SEQ++;
        DB.facturas_venta.unshift({
          numero:fvNum,fecha:now().split(' ')[0],
          clienteId:null,clienteNombre:rm.cliente,
          remisionOrigen:pd.remisionOrigen,occRef:rm.occRef,
          subtotal,iva,total,estado:'emitida',archivoPdf:'facturas/'+fvNum+'.pdf'
        });
        toast('Factura '+fvNum+' generada desde remisión '+pd.remisionOrigen+'.','ok');
      }
    }
  }
  saveDB();
  setTimeout(function(){window.location.reload()},800);
}

function solicitarTransferenciaAutomatica(pdId){
  const pd = DB.pedidos.find(p=>p.id===pdId);
  if (!pd) return;
  
  const faltantes = pd.items.filter(it=>it.falt>0);
  if (!faltantes.length) {
    toast('No hay productos con faltante en este pedido', 'warn');
    return;
  }
  
  let creadas = 0;
  faltantes.forEach(it => {
    let maxBg = null;
    let maxVal = 0;
    DB.bodegas.forEach(b => {
      const s = stockBodega(b.id, it.sku);
      if (s > maxVal) {
        maxVal = s;
        maxBg = b.id;
      }
    });
    
    const dstBg = 'BGA'; // BGA es donde usualmente centralizamos stock para despachos
    const srcBg = maxBg;
    
    if (srcBg && srcBg !== dstBg && maxVal > 0) {
      const trId = 'TR-' + String(TR_SEQ++).padStart(3, '0');
      const pr = getProd(it.sku);
      const cantTrans = Math.min(it.falt, maxVal);
      
      DB.transferencias.unshift({
        id: trId,
        org: srcBg,
        dst: dstBg,
        fecha: now().split(' ')[0],
        estado: 'solicitada',
        solPor: currentUser.n,
        autPor: null,
        despPor: null,
        recibPor: null,
        items: [{
          sku: it.sku,
          n: pr?.n || it.sku,
          cant: cantTrans,
          u: pr?.u || 'unid'
        }]
      });
      creadas++;
    }
  });
  
  if (creadas > 0) {
    saveDB();
    toast('Se crearon ' + creadas + ' solicitudes de transferencia para suplir faltantes. Redirigiendo...', 'ok');
    setTimeout(() => {
      window.location.href = 'transferencias.html';
    }, 1500);
  } else {
    toast('No se encontró stock excedente en otras bodegas para solicitar transferencias', 'warn');
  }
}

function revisarStockPedido(pdId){
  asignarStock(pdId);
  saveDB();
  toast('Existencias re-evaluadas para el pedido ' + pdId, 'ok');
  setTimeout(function(){window.location.reload()},500);
}
</script>
